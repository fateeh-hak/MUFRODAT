                <button 
                  type="submit" 
                  className="w-full bg-emerald-600 text-white py-4 md:py-5 rounded-xl md:rounded-2xl font-black text-base md:text-lg shadow-xl hover:bg-emerald-700 transition-all active:scale-95"
                >
                  Masuk Sekarang
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="app-shell min-h-screen bg-[#0F172A] flex text-slate-800 font-sans relative">
          
          {toast && (
            <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[110] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm animate-in fade-in">
              {toast}
            </div>
          )}

          {showLockModal && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
              <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 text-center border border-slate-100">
                <div className="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
                  <Lock size={28} className="text-slate-500" />
                </div>
                <h2 className="text-xl font-black text-slate-900 mb-3">Materi Belum Terbuka</h2>
                <p className="text-slate-500 text-sm font-medium mb-8 leading-relaxed">
                  Silakan selesaikan Hari sebelumnya terlebih dahulu untuk membuka materi ini.
                </p>
                <button
                  onClick={() => setShowLockModal(false)}
                  className="w-full bg-emerald-600 text-white py-4 rounded-xl font-black hover:bg-emerald-700 transition-colors"
                >
                  Saya Mengerti
                </button>
              </div>
            </div>
          )}

          {showIosHint && (
            <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-6 py-4 rounded-2xl shadow-2xl z-[100] font-bold text-xs md:text-sm text-center w-[90%] max-w-sm border-2 border-blue-400 transition-all">
              📱 Pengguna Safari/iPhone:<br/>Pastikan <b>Tombol Mute/Hening</b> di samping HP Anda <b>dimatikan</b> agar suara mufrodat terdengar!
            </div>
          )}

          <aside className={`nav-sidebar hidden md:flex ${isSidebarOpen ? '' : 'collapsed'} flex-col no-print transition-all duration-300`}>
            <div className="p-5 flex items-center space-x-3 border-b border-white/5">
              <div className="w-10 h-10 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-lg shrink-0">
                A
              </div>
              <div className={!isSidebarOpen ? 'hidden' : ''}>
                <span className="text-lg font-black text-white tracking-tight block">ALFAL.ID</span>
                <span className="text-[9px] text-slate-400 font-medium">Platform Belajar Bahasa Arab</span>
              </div>
            </div>
            
            <nav className="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
              <SidebarItem id="home" icon={Home} label="Beranda" />
              <SidebarItem id="materi" icon={BookOpen} label="Materi" />
              <SidebarItem id="flashcard" icon={Layers} label="Flashcard" />
              <SidebarItem id="quiz" icon={Award} label="Kuis" />
              <SidebarItem id="review" icon={RefreshCw} label="Review" />
              <SidebarItem id="daily" icon={Target} label="Tantangan" />
              <SidebarItem id="rekam" icon={Mic} label="Hafalan" />
              <SidebarItem id="profile" icon={User} label="Profil" />
              <SidebarItem id="achievements" icon={Medal} label="Prestasi" />
              <SidebarItem id="leaderboard" icon={Trophy} label="Leaderboard" />
              <SidebarItem id="certificate" icon={GraduationCap} label="Sertifikat" />
              <SidebarItem id="riwayat" icon={History} label="Riwayat" />
              {isMusyrif && <SidebarItem id="musyrif" icon={Shield} label="Musyrif" />}
            </nav>
            
            <div className="p-3 border-t border-white/5 space-y-2">
              {sidebarProfile}
              <button 
                onClick={handleLogout} 
                className="nav-sidebar-item w-full py-2.5 rounded-xl text-red-400 flex justify-center items-center space-x-2 font-bold text-sm hover:bg-red-500/10"
              >
                <LogOut size={18} />
                <span className={!isSidebarOpen ? 'hidden' : ''}>Keluar</span>
              </button>
              <button 
                onClick={() => setIsSidebarOpen(!isSidebarOpen)} 
                className="w-full py-2 rounded-xl text-slate-500 flex justify-center hover:text-emerald-400 transition-colors"
              >
                <ChevronRight size={18} className={`transition-transform ${isSidebarOpen ? 'rotate-180' : ''}`} />
              </button>
            </div>
          </aside>

          <nav className="md:hidden fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur border-t border-slate-100 flex justify-around px-1 pt-2 pb-safe z-50 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)] no-print overflow-x-auto">
            {[
              { id: 'home', icon: Home, label: 'Home' },
              { id: 'materi', icon: BookOpen, label: 'Materi' },
              { id: 'flashcard', icon: Layers, label: 'Kartu' },
              { id: 'quiz', icon: Award, label: 'Kuis' },
              { id: 'review', icon: RefreshCw, label: 'Review' },
              { id: 'profile', icon: User, label: 'Profil' },
              { id: 'leaderboard', icon: Trophy, label: 'Rank' },
            ].map(item => {
              const IconComponent = item.icon;
              const isActive = activeTab === item.id;
              return (
                <button
                  key={item.id}
                  onClick={() => handleTabChange(item.id)}
                  className={`flex flex-col items-center p-2 rounded-xl transition-all ${isActive ? 'text-emerald-600' : 'text-slate-400 hover:text-emerald-500'}`}
                >
                  <div className={`p-1.5 rounded-lg mb-1 flex items-center justify-center ${isActive ? 'bg-emerald-50' : ''}`}>
                    <IconComponent size={20} />
                  </div>
                  <span className="text-[10px] font-black">{item.label}</span>
                </button>
              );
            })}
          </nav>

          <main className={`flex-1 flex flex-col min-h-0 relative ${activeTab === 'home' ? 'overflow-hidden p-0 pb-0' : 'h-screen overflow-y-auto p-4 md:p-10 pb-24 md:pb-10 bg-[#F8FAFC]'}`}>
            
            {activeTab !== 'home' && (
            <header className="flex justify-between items-center mb-8 md:mb-10 no-print">
              <div className="flex items-center space-x-3 md:space-x-4">
                <div className="w-10 h-10 md:w-12 md:h-12 bg-emerald-100 rounded-xl md:rounded-2xl flex items-center justify-center text-emerald-700 font-black text-lg md:text-xl border border-emerald-200 shadow-sm shrink-0">
                  {(participantName?.[0] || '?').toUpperCase()}
                </div>
                <div>
                  <h1 className="text-xl md:text-2xl font-black text-slate-900 tracking-tight leading-tight">Ahlan, {(participantName || 'Santri').split(' ')[0]}!</h1>
                  <p className="text-xs md:text-sm text-slate-500 font-medium">Hari ini belajar apa kita?</p>
                </div>
              </div>
              <div className="hidden md:flex items-center bg-white border border-slate-100 px-4 py-2 rounded-2xl shadow-sm space-x-3">
                 <Calendar size={18} className="text-emerald-600" />
                 <span className="text-xs font-black text-slate-700 uppercase tracking-widest">
                   Misi Aktif: Hari {selectedDay}
                 </span>
              </div>
              <button onClick={handleLogout} className="md:hidden flex items-center justify-center p-2.5 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-colors">
                <LogOut size={18} />
              </button>
            </header>
            )}

            {activeTab === 'home' && (
              <SafeModule name="Beranda">
                <JourneyMap
                  progress={progress}
                  selectedDay={selectedDay}
                  totalDays={TOTAL_DAYS}
                  profile={profile}
                  playerName={participantName}
                  onNodeClick={handleJourneyNodeClick}
                  onLockedClick={() => setShowLockModal(true)}
                />
              </SafeModule>
            )}

            {activeTab === 'profile' && (
              <SafeModule name="Profil">
              <ProfilePage
                name={participantName}
                profile={profile}
                progress={progress}
                myScores={myScores}
                onUpdateAvatar={(id) => setProfile((p) => { const np = { ...p, avatar: id }; saveProfileState(np); return np; })}
                onUpdateMeta={(k, v) => setProfile((p) => { const np = { ...p, [k]: v }; saveProfileState(np); return np; })}
              />
              </SafeModule>
            )}

            {activeTab === 'achievements' && (
              <SafeModule name="Prestasi">
              <AchievementsPage profile={profile} progress={progress} myScores={myScores} />
              </SafeModule>
            )}

            {activeTab === 'leaderboard' && (
              <SafeModule name="Leaderboard">
              <LeaderboardPage filter={lbFilter} setFilter={setLbFilter} filterValue={lbFilterValue} setFilterValue={setLbFilterValue} currentName={participantName} />
              </SafeModule>
            )}

            {activeTab === 'daily' && (
              <SafeModule name="Tantangan Harian">
              <div className="max-w-md mx-auto"><DailyChallengeCard profile={profile} onClaim={claimDailyChallenge} /></div>
              </SafeModule>
            )}

            {activeTab === 'review' && (
              <SafeModule name="Review">
              <SmartReviewPage profile={profile} playAudio={(t) => playAudioAdvanced(t)} onReview={(day, wordId, ok) => { markWordLearned(day, wordId, ok); saveProfileState(AE().recordSRS({ ...profile }, day, wordId, ok)); }} />
              </SafeModule>
            )}

            {activeTab === 'certificate' && (
              <SafeModule name="Sertifikat">
              <div>
                {(() => {
                  const cert = AE().generateCertificate(participantName, profile, progress);
                  if (!cert) return (
                    <div className="card-premium p-12 text-center max-w-md mx-auto">
                      <Lock size={48} className="text-slate-300 mx-auto mb-4" />
                      <h2 className="text-xl font-black text-slate-800">Sertifikat Terkunci</h2>
                      <p className="text-slate-500 mt-2">Selesaikan 30 hari belajar untuk mendapatkan sertifikat.</p>
                      <p className="text-primary font-black mt-4">{completedDaysCount}/30 Hari</p>
                    </div>
                  );
                  return (
                    <div>
                      <div className="no-print card-premium p-8 max-w-lg mx-auto text-center mb-6">
                        <GraduationCap size={48} className="text-primary mx-auto mb-4" />
                        <h2 className="text-2xl font-black">Selamat! Sertifikat Siap</h2>
                        <button onClick={() => window.print()} className="mt-6 w-full py-4 bg-primary text-white rounded-2xl font-black">Export PDF (Print)</button>
                      </div>
                      <CertificateView cert={cert} name={participantName} />
                    </div>
                  );
                })()}
              </div>
              </SafeModule>
            )}

            {activeTab === 'musyrif' && isMusyrif && (
              <SafeModule name="Dashboard Musyrif">
              <MusyrifDashboard leaderboard={AE().getLeaderboard('all') || []} />
              </SafeModule>
            )}

            {activeTab === 'flashcard' && isDayUnlocked(selectedDay, progress) && (
              <SafeModule name="Flashcard">
              <div className="space-y-6">
                <div className="text-center">
                  <h2 className="text-2xl font-black text-slate-900">Flashcard Hari {selectedDay}</h2>
                  <p className="text-slate-500 text-sm">{selectedDayMeta.title}</p>
                </div>
                <FlashcardMode words={currentMufrodatList} onLearn={(id) => markWordLearned(selectedDay, id)} playAudio={(t) => playAudioAdvanced(t)} />
              </div>
              </SafeModule>
            )}

            {activeTab === 'materi' && isDayUnlocked(selectedDay, progress) && (
              <SafeModule name="Materi">
              <div className="space-y-4 md:space-y-6 animate-in fade-in duration-500">
                <div className="grid grid-cols-1 sm:grid-cols-3 items-center bg-emerald-50 p-5 md:p-6 rounded-[2rem] md:rounded-3xl border border-emerald-100 mb-4 md:mb-6 gap-4">
                  
                  <div className="flex flex-col justify-start sm:self-start gap-2">
                    <h2 className="text-xs md:text-sm font-black text-emerald-700 uppercase tracking-widest bg-emerald-100/70 px-3 py-1.5 rounded-lg border border-emerald-200">
                      Materi Hari {selectedDay}
                    </h2>
                    <span className={`inline-block w-fit px-2.5 py-1 rounded-lg text-[9px] font-black uppercase ${getDayBadge(selectedDay, progress, selectedDay).className}`}>
                      {getDayBadge(selectedDay, progress, selectedDay).text}
                    </span>
                  </div>
                  
                  <div className="flex flex-col items-center text-center">
                    <span className="font-arabic font-bold text-4xl md:text-5xl text-emerald-900 mb-2" dir="rtl">
                      {selectedDayMeta.titleAr}
                    </span>
                    <p className="text-base md:text-lg text-emerald-700 font-bold">
                      {selectedDayMeta.title}
                    </p>
                    <p className="text-[10px] font-black text-emerald-600 mt-2 uppercase tracking-widest">
                      {(progress[selectedDay]?.wordsLearned?.length || 0)}/10 Kosakata Dipelajari
                    </p>
                  </div>
                  
                  <div className="flex justify-end sm:self-center mt-2 sm:mt-0">
                    <button 
                      onClick={() => { handleTabChange('rekam'); window.scrollTo(0,0); }} 
                      className="w-full sm:w-auto bg-emerald-600 text-white px-6 py-3.5 md:py-3 rounded-xl font-black text-sm shadow-lg hover:bg-emerald-700 transition-all active:scale-95 text-center flex justify-center items-center gap-2"
                    >
                      <Mic size={18}/> Setor Hafalan
                    </button>
                  </div>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                  {currentMufrodatList.map((item, idx) => {
                    const isLearned = (progress[selectedDay]?.wordsLearned || []).includes(item.id);
                    return (
                    <div key={idx} className={`relative rounded-[1.5rem] md:rounded-[2rem] p-6 md:p-8 border shadow-sm hover:shadow-lg transition-all group ${isLearned ? 'bg-emerald-50/50 border-emerald-200' : 'bg-white border-slate-100'}`}>
                      <div className="flex justify-between items-start mb-2 md:mb-4">
                        <div className={`w-8 h-8 md:w-10 md:h-10 rounded-lg md:rounded-xl flex items-center justify-center font-black text-xs transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-400 group-hover:bg-emerald-50 group-hover:text-emerald-600'}`}>
                          {isLearned ? <CheckCircle size={16} /> : idx + 1}
                        </div>
                        <button 
                          onClick={() => { playAudioAdvanced(item.arab, item.latin); markWordLearned(selectedDay, item.id); }}
                          className="flex items-center justify-center p-2.5 md:p-3 bg-emerald-50 text-emerald-600 rounded-full hover:bg-emerald-100 hover:text-emerald-700 hover:scale-110 active:scale-95 transition-all shadow-sm"
                          title="Dengarkan & Tandai Dipelajari"
                        >
                          <Volume2 size={20} className="md:w-6 md:h-6" />
                        </button>
                        <div className="flex gap-1 mt-2 justify-end">
                          <button onClick={() => playAudioAdvanced(item.arab, item.latin)} className="p-1.5 rounded-lg bg-slate-100" title="Play">{speechState === 'playing' ? <Pause size={14} /> : <Play size={14} />}</button>
                          <button onClick={() => repeatAudio(item.arab, item.latin)} className="p-1.5 rounded-lg bg-slate-100" title="Repeat"><Repeat size={14} /></button>
                        </div>
                      </div>
                      <div className="text-center mb-6 md:mb-8">
                        <h1 className="text-4xl md:text-5xl font-arabic text-emerald-900 mb-3 md:mb-4 leading-normal">{item.arab}</h1>
                        <h2 className="text-xl md:text-2xl font-black text-slate-700 tracking-tight">{item.latin}</h2>
                        <p className="text-emerald-600 font-bold text-base md:text-lg">{item.arti}</p>
                        {isLearned && <p className="text-[10px] font-black text-emerald-500 uppercase mt-2 tracking-widest">✅ Dipelajari</p>}
                      </div>
                      <div className="bg-slate-50 p-4 md:p-6 rounded-xl md:rounded-2xl border border-slate-100">
                        <p className="text-xl md:text-2xl font-arabic text-slate-700 text-right leading-relaxed mb-2 tracking-wide" dir="rtl">
                          {item.contoh}
                        </p>
                        <p className="text-[10px] md:text-xs text-slate-400 italic font-medium">"{item.deskripsi}"</p>
                      </div>
                    </div>
                  );})}
                </div>
              </div>
              </SafeModule>
            )}

            {activeTab === 'rekam' && isDayUnlocked(selectedDay, progress) && (
              <SafeModule name="Rekam Hafalan">
              <div className="max-w-2xl mx-auto pb-10">
                {rekamStep === 0 && voiceQuizList.length > 0 && (
                  <div className="bg-white p-8 md:p-12 rounded-[2.5rem] md:rounded-[3.5rem] border border-slate-100 shadow-xl md:shadow-2xl text-center relative overflow-hidden animate-in fade-in duration-500">
                    
                    <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-100">
                       <div className="h-full bg-blue-500 transition-all duration-500 ease-out" style={{ width: `${((currentVoiceQuestion) / 5) * 100}%` }}></div>
                    </div>

                    <div className="flex justify-between items-center mb-6 mt-2 text-slate-400 font-black text-[10px] md:text-xs uppercase tracking-widest">
                       <span>Pemanasan {currentVoiceQuestion + 1} / 5</span>
                       <span className="text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">Ucapkan Arabnya</span>
                    </div>
                    
                    <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-2">Latihan Pengucapan</h2>
                    <p className="text-slate-500 text-sm md:text-base font-medium mb-8 max-w-md mx-auto">
                      Ketuk mikrofon di bawah dan ucapkan bahasa Arab dari kata berikut:
                    </p>
                    
                    <h3 className="text-3xl md:text-4xl font-black text-blue-600 mb-10 tracking-tight">
                      "{voiceQuizList[currentVoiceQuestion].arti}"
                    </h3>

                    <div className="flex flex-col items-center justify-center gap-6 mb-10">
                      <button
                        onClick={startListeningVoiceQuiz}
                        disabled={isListeningQuiz}
                        className={`w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center text-white transition-all shadow-xl
                          ${isListeningQuiz 
                            ? 'bg-red-500 animate-pulse ring-8 ring-red-500/30 scale-105' 
                            : 'bg-gradient-to-br from-blue-500 to-blue-700 hover:scale-105 shadow-blue-200'}`}
                      >
                        {isListeningQuiz ? <Square size={32} /> : <Mic size={40} />}
                      </button>
                      
                      <div className="h-20 flex flex-col items-center justify-center">
                        {isListeningQuiz && <p className="text-sm font-bold text-red-500 animate-pulse">Mendengarkan suaramu...</p>}
                        {!isListeningQuiz && !recognizedText && <p className="text-sm font-bold text-slate-400">Ketuk untuk bicara</p>}
                        
                        {recognizedText && (
                           <div className="animate-in fade-in zoom-in duration-300">
                             <p className="text-2xl md:text-3xl font-arabic font-bold text-slate-800" dir="rtl">{recognizedText}</p>
                             {voiceQuizFeedback === 'correct' && <p className="text-emerald-500 font-bold text-sm md:text-base mt-2">⭐ Mumtaz! Pengucapan tepat.</p>}
                             {voiceQuizFeedback === 'wrong' && <p className="text-red-500 font-bold text-sm md:text-base mt-2">Kurang tepat, ayo coba lagi!</p>}
                             {voiceQuizFeedback === 'error' && <p className="text-orange-500 font-bold text-sm md:text-base mt-2">Suara tidak terdengar jelas.</p>}
                           </div>
                        )}
                      </div>
                    </div>

                    <button 
                      onClick={() => setRekamStep(1)} 
                      className="text-slate-400 text-xs md:text-sm font-bold underline hover:text-slate-600 transition-colors"
                    >
                      Lewati Pemanasan & Langsung Setor Hafalan
                    </button>
                  </div>
                )}

                {rekamStep === 1 && (
                  <div className="bg-white p-8 md:p-12 rounded-[2.5rem] md:rounded-[3.5rem] border border-slate-100 shadow-xl md:shadow-2xl text-center animate-in fade-in duration-500">
                    <div className="w-20 h-20 md:w-24 md:h-24 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 md:mb-8 shadow-inner ring-8 ring-emerald-50">
                      <Mic size={40} className="md:w-[48px] md:h-[48px]" />
                    </div>
                    <h2 className="text-3xl md:text-4xl font-black mb-6 md:mb-8 tracking-tight">Setor Hafalan Hari {selectedDay}</h2>
                    <div className="mb-8 md:mb-12 flex flex-col items-center gap-2">
                      <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-2">Tema</p>
                      <h3 className="font-arabic font-bold text-3xl md:text-4xl text-emerald-700" dir="rtl">{selectedDayMeta.titleAr}</h3>
                      <p className="text-slate-600 font-bold text-lg md:text-xl">{selectedDayMeta.title}</p>
                      <p className="text-slate-500 mt-6 text-sm md:text-base px-2 md:px-6">Tekan tombol rekam di bawah ini dan bacakan 10 hafalan mufrodat bahasa Arab beserta artinya dengan lantang!</p>
                    </div>

                    {!audioUrl ? (
                      <div className="flex flex-col items-center justify-center gap-6">
                        <button
                          onClick={isRecording ? stopRecording : startRecording}
                          className={`w-24 h-24 md:w-28 md:h-28 rounded-[2rem] flex items-center justify-center text-white shadow-xl transition-all ${isRecording ? 'bg-red-500 animate-pulse scale-110 shadow-red-200' : 'bg-emerald-600 hover:bg-emerald-700 hover:scale-105 shadow-emerald-200'}`}
                        >
                          {isRecording ? <Square size={32} className="md:w-10 md:h-10" /> : <Mic size={40} className="md:w-12 md:h-12" />}
                        </button>
                        <p className="text-sm md:text-base font-bold text-slate-400">
                          {isRecording ? "Sedang merekam... Tekan kotak untuk berhenti." : "Tekan ikon Mikrofon untuk mulai merekam"}
                        </p>
                      </div>
                    ) : (
                      <div className="flex flex-col items-center justify-center gap-6 w-full animate-in zoom-in-95">
                        <div className="bg-slate-50 p-4 rounded-2xl w-full max-w-md border border-slate-200 shadow-sm">
                           <audio src={audioUrl} controls className="w-full h-12" />
                        </div>
                        
                        {!isAudioSent ? (
                          <div className="flex flex-col sm:flex-row gap-4 w-full max-w-md">
                             <button onClick={deleteRecording} disabled={isProcessing} className="flex-1 py-3 md:py-4 bg-white border border-slate-200 text-slate-600 rounded-xl md:rounded-2xl font-black hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-colors flex justify-center items-center gap-2 disabled:opacity-50">
                               <Trash2 size={18} /> Ulangi
                             </button>
                             <button onClick={submitHafalan} disabled={isProcessing} className="flex-[2] py-3 md:py-4 bg-emerald-600 text-white rounded-xl md:rounded-2xl font-black shadow-lg hover:bg-emerald-700 transition-colors flex justify-center items-center gap-2 disabled:opacity-50">
                               {isProcessing ? "Mengirim..." : "Kirim Rekaman"} <ArrowRight size={18}/>
                             </button>
                          </div>
                        ) : (
                          <div className="flex flex-col gap-4 w-full max-w-md fade-in-up">
                             <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-4 rounded-xl font-bold flex justify-center items-center gap-2 shadow-sm">
                                <CheckCircle size={24} /> Rekaman Berhasil Dikirim!
                             </div>
                             <button onClick={() => { handleTabChange('quiz'); setQuizStep(0); setCurrentQuestion(0); setScore(0); window.scrollTo(0,0); }} className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold shadow-lg hover:bg-emerald-600 transition-colors flex justify-center items-center gap-2 mt-2">
                               Lanjut ke Kuis <ArrowRight size={18}/>
                             </button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>
              </SafeModule>
            )}

            {activeTab === 'quiz' && isDayUnlocked(selectedDay, progress) && (
              <SafeModule name="Kuis">
              <div className="max-w-2xl mx-auto pb-10">
                {quizStep === 0 && (
                   <div className="bg-white p-8 md:p-12 rounded-[2.5rem] md:rounded-[3.5rem] border border-slate-100 shadow-xl md:shadow-2xl text-center animate-in fade-in duration-500">
                     <div className="w-20 h-20 md:w-24 md:h-24 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 md:mb-8 shadow-inner ring-8 ring-orange-50">
                       <Trophy size={40} className="md:w-[48px] md:h-[48px]" />
                     </div>
                     <h2 className="text-3xl md:text-4xl font-black mb-6 md:mb-8 tracking-tight">Kuis Hari {selectedDay}</h2>
                     <div className="mb-8 md:mb-12 flex flex-col items-center gap-2">
                       <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-2">Tema</p>
                       <h3 className="font-arabic font-bold text-3xl md:text-4xl text-emerald-700" dir="rtl">{selectedDayMeta.titleAr}</h3>
                       <p className="text-slate-600 font-bold text-lg md:text-xl">{selectedDayMeta.title}</p>
                       <p className="text-slate-500 mt-4 text-sm md:text-base px-2 md:px-6">Selesaikan 10 soal tantangan campuran.</p>
                     </div>
                     <div className="flex flex-col gap-3">
                     <button 
                       onClick={startPremiumQuiz} 
                       className="w-full bg-gradient-to-r from-primary to-secondary text-white py-5 md:py-6 rounded-2xl md:rounded-[2rem] font-black text-lg md:text-xl shadow-xl hover:opacity-90 transition-all active:scale-95"
                     >
                       🎮 Kuis Premium (4 Mode)
                     </button>
                     <button 
                       onClick={() => { setQuizStep(1); setScore(0); setCurrentQuestion(0); }} 
                       className="w-full bg-white border-2 border-slate-100 text-slate-700 py-4 rounded-2xl font-black text-base hover:bg-slate-50 transition-all"
                     >
                       Kuis Klasik
                     </button>
                     </div>
                   </div>
                )}

                {quizStep === 4 && premiumQuestions[premiumQIndex] && (
                  <div className="card-premium p-6 md:p-10">
                    <div className="flex justify-between mb-6 text-xs font-black text-slate-400 uppercase">
                      <span>Premium {premiumQIndex + 1}/{premiumQuestions.length}</span>
                      <span className="text-primary capitalize">{premiumQuestions[premiumQIndex].type === 'mc' ? 'Pilihan Ganda' : premiumQuestions[premiumQIndex].type === 'match' ? 'Matching' : premiumQuestions[premiumQIndex].type === 'typing' ? 'Mengetik' : 'Listening'}</span>
                    </div>
                    {(() => {
                      const q = premiumQuestions[premiumQIndex];
                      const w = q.word;
                      if (q.type === 'mc' || q.type === 'listening') return (
                        <div className="text-center">
                          <p className="text-sm font-black text-slate-400 mb-4">{q.type === 'listening' ? 'Dengarkan & pilih arti' : 'Apa arti kata berikut?'}</p>
                          {q.type === 'listening' ? (
                            <button onClick={() => playAudioAdvanced(w.arab, w.latin)} className="mb-6 p-4 rounded-2xl bg-emerald-100 text-primary mx-auto flex items-center gap-2 font-black"><Volume2 size={24} /> Putar Audio</button>
                          ) : (
                            <h1 className="text-5xl font-arabic mb-8">{w.arab}</h1>
                          )}
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            {q.options.map((opt, i) => (
                              <button key={i} onClick={() => handlePremiumAnswer(opt === w.arti)} disabled={isProcessing} className="p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold hover:border-primary transition-all">{opt}</button>
                            ))}
                          </div>
                        </div>
                      );
                      if (q.type === 'typing') return (
                        <div className="text-center">
                          <h1 className="text-5xl font-arabic mb-4">{w.arab}</h1>
                          <p className="text-sm text-slate-400 mb-4">Tulis arti kata (Indonesia)</p>
                          <input value={typingAnswer} onChange={(e) => setTypingAnswer(e.target.value)} className="w-full max-w-sm mx-auto p-4 rounded-2xl border-2 border-slate-200 font-bold text-center mb-4" placeholder="Jawaban..." />
                          <button onClick={() => handlePremiumAnswer(typingAnswer.trim().toLowerCase() === w.arti.toLowerCase())} className="px-8 py-3 bg-primary text-white rounded-xl font-black">Kunci</button>
                        </div>
                      );
                      if (q.type === 'match') return (
                        <div>
                          <p className="text-center text-sm font-black text-slate-400 mb-6">Cocokkan Arab ↔ Indonesia</p>
                          <div className="space-y-3">
                            {q.matchPairs.map((pair, i) => (
                              <button key={i} onClick={() => handlePremiumAnswer(pair.arti === w.arti)} className="w-full p-4 rounded-2xl bg-slate-50 border flex justify-between items-center hover:border-primary">
                                <span className="font-arabic text-xl">{pair.arab}</span>
                                <span className="font-bold text-slate-600">{pair.arti}</span>
                              </button>
                            ))}
                          </div>
                          <p className="text-xs text-center text-slate-400 mt-4">Ketuk pasangan yang benar untuk: {w.arab}</p>
                        </div>
                      );
                      return null;
                    })()}
                  </div>
                )}

                {quizStep === 1 && (
                   currentMufrodatList.length === 0 || !currentMufrodatList[currentQuestion] ? (
                     <div className="card-premium p-12 text-center text-slate-400">
                       <AlertCircle size={40} className="mx-auto mb-4 opacity-50" />
                       <p className="font-bold">Data kuis tidak tersedia untuk hari ini.</p>
                       <button onClick={() => setQuizStep(0)} className="mt-4 px-6 py-3 bg-primary text-white rounded-xl font-black text-sm">Kembali</button>
                     </div>
                   ) : (
                   <div className="bg-white p-6 md:p-10 rounded-[2.5rem] md:rounded-[3rem] border border-slate-100 shadow-xl md:shadow-2xl relative overflow-hidden">
                     
                     <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-100">
                        <div className="h-full bg-emerald-500 transition-all duration-500 ease-out" style={{ width: `${((currentQuestion) / 10) * 100}%` }}></div>
                     </div>

                     <div className="flex justify-between items-center mb-6 md:mb-8 mt-2 text-slate-400 font-black text-[10px] md:text-xs uppercase tracking-widest">
                       <span>Soal {currentQuestion + 1} / 10</span>
                       <span className="text-emerald-600">
                         {currentQuestion % 2 === 0 ? "Pilihan Ganda" : "Susun Huruf"}
                       </span>
                     </div>

                     {currentQuestion % 2 === 0 ? (
                       <div className="text-center animate-in fade-in duration-300" key={`mc-${currentQuestion}`}>
                         <p className="text-xs md:text-sm font-black text-slate-400 uppercase mb-3 md:mb-4 tracking-widest">Apa arti kata ini?</p>
                         <h1 className="text-5xl md:text-6xl font-arabic font-bold text-slate-800 mb-10 pb-2">{currentMufrodatList[currentQuestion].arab}</h1>
                         <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                           {[
                             currentMufrodatList[currentQuestion].arti, 
                             currentMufrodatList[(currentQuestion + 1) % 10]?.arti || "Buku", 
                             currentMufrodatList[(currentQuestion + 2) % 10]?.arti || "Pena", 
                             currentMufrodatList[(currentQuestion + 3) % 10]?.arti || "Meja"
                           ].sort().map((opt, i) => (
                             <button 
                               key={i} 
                               onClick={() => handleChoiceAnswer(opt === currentMufrodatList[currentQuestion].arti)} 
                               disabled={isProcessing}
                               className="w-full p-4 md:p-6 bg-slate-50 border-2 border-slate-100 rounded-2xl md:rounded-[1.5rem] font-black text-slate-700 hover:border-emerald-500 hover:text-emerald-700 hover:bg-emerald-50 transition-all text-base md:text-xl active:scale-95 disabled:opacity-50"
                             >
                               {opt}
                             </button>
                           ))}
                         </div>
                       </div>
                     ) : (
                       <div className="text-center animate-in slide-in-from-right-8 duration-300" key={`sc-${currentQuestion}`}>
                         <p className="text-xs md:text-sm font-black text-slate-400 uppercase mb-3 md:mb-4 tracking-widest">Susun Huruf Untuk Arti:</p>
                         <h2 className="text-2xl md:text-4xl font-black text-emerald-600 mb-8 md:mb-10 tracking-tight">
                           "{currentMufrodatList[currentQuestion].arti}"
                         </h2>
                         
                         <div className="flex justify-center flex-wrap gap-2 md:gap-4 mb-8 md:mb-12 min-h-[70px] md:min-h-[90px] p-4 md:p-6 bg-slate-50 rounded-2xl md:rounded-[2rem] border-2 border-dashed border-slate-200" dir="rtl">
                           {currentGuess.length === 0 && (
                             <span className="text-slate-400 font-medium self-center text-xs md:text-sm">Klik huruf Arab di bawah...</span>
                           )}
                           {currentGuess.map((l, i) => (
                             <button 
                               key={i} 
                               onClick={() => removeLetterFromGuess(l)} 
                               disabled={isProcessing}
                               className="w-12 h-12 md:w-16 md:h-16 bg-white border-2 border-emerald-500 text-emerald-700 rounded-xl md:rounded-2xl flex items-center justify-center text-2xl md:text-3xl font-arabic shadow-sm hover:border-red-500 hover:text-red-500 hover:bg-red-50 transition-all transform hover:scale-110 disabled:opacity-50"
                             >
                               {l.char}
                             </button>
                           ))}
                         </div>
                         
                         <div className="flex justify-center flex-wrap gap-2 md:gap-4 mb-8 md:mb-12" dir="rtl">
                           {scrambledLetters.map((l, i) => (
                             <button 
                               key={i} 
                               onClick={() => addLetterToGuess(l)} 
                               disabled={isProcessing}
                               className="w-12 h-12 md:w-16 md:h-16 bg-emerald-600 text-white rounded-xl md:rounded-2xl flex items-center justify-center text-2xl md:text-3xl font-arabic shadow-md hover:bg-emerald-700 active:scale-90 transition-all disabled:opacity-50"
                             >
                               {l.char}
                             </button>
                           ))}
                         </div>
                         
                         <div className="flex space-x-3 md:space-x-4">
                           <button 
                             onClick={() => { setScrambledLetters([...scrambledLetters, ...currentGuess]); setCurrentGuess([]); }} 
                             disabled={isProcessing}
                             className="flex-1 py-3 md:py-4 bg-slate-100 text-slate-500 rounded-xl md:rounded-2xl font-black flex items-center justify-center space-x-2 hover:bg-slate-200 transition-colors text-sm md:text-base disabled:opacity-50"
                           >
                             <RefreshCw size={18}/>
                             <span>Ulang</span>
                           </button>
                           <button 
                             onClick={checkScrambleAnswer} 
                             disabled={scrambledLetters.length > 0 || isProcessing} 
                             className="flex-[2] py-3 md:py-4 bg-emerald-600 text-white rounded-xl md:rounded-2xl font-black shadow-lg disabled:opacity-50 disabled:shadow-none hover:bg-emerald-700 transition-all active:scale-95 text-sm md:text-base"
                           >
                             Kunci Jawaban
                           </button>
                         </div>
                       </div>
                     )}
                   </div>
                   )
                )}

                {quizStep === 2 && (
                   <div className="bg-white p-10 md:p-14 rounded-[2.5rem] md:rounded-[3rem] border border-slate-100 shadow-xl md:shadow-2xl text-center fade-in-up">
                     <div className="w-24 h-24 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 ring-8 ring-blue-50">
                       <Award size={48} />
                     </div>
                     <h2 className="text-3xl font-black text-slate-800 mb-4">Kuis Selesai!</h2>
                     <p className="text-slate-500 mb-8 max-w-md mx-auto">Alhamdulillah, kamu telah menyelesaikan 10 soal kuis. Klik tombol di bawah ini untuk mengirim dan menyimpan nilaimu ke server.</p>
                     <button 
                       onClick={submitQuiz} 
                       disabled={isProcessing}
                       className="w-full max-w-sm mx-auto bg-emerald-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-emerald-700 transition-all disabled:opacity-50 flex items-center justify-center gap-2"
                     >
                       {isProcessing ? "Menyimpan Data..." : "Kirim Kuis Sekarang"} <ArrowRight size={20}/>
                     </button>
                   </div>
                )}

                {quizStep === 3 && (
                   <div className="bg-white p-8 md:p-16 rounded-[2.5rem] md:rounded-[3.5rem] border border-slate-100 shadow-xl md:shadow-2xl text-center animate-in zoom-in-95">
                     <div className="w-20 h-20 md:w-24 md:h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-5 md:mb-6">
                       <CheckCircle size={48} className="md:w-[60px] md:h-[60px]" />
                     </div>
                     <h1 className="text-2xl md:text-3xl font-black mb-2 tracking-tight">Barakallahu Fiikum!</h1>
                     <p className="text-slate-500 mb-6 md:mb-8 text-sm md:text-base font-bold uppercase tracking-widest leading-none">
                       {participantName}
                     </p>
                     <div className="bg-emerald-600 text-white p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] mb-8 md:mb-10 shadow-xl shadow-emerald-100">
                       <p className="text-[10px] md:text-xs font-black uppercase tracking-widest text-emerald-200 mb-2">
                         Skor Akhir Hari {selectedDay}
                       </p>
                       <h1 className="text-6xl md:text-8xl font-black">
                         {Math.round((score / 10) * 100)}%
                       </h1>
                     </div>
                     {(() => {
                       const finalQuizScore = Math.round((score / 10) * 100);
                       const dayDone = progress[selectedDay]?.completed || finalQuizScore >= 80;
                       return dayDone ? (
                         <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-4 rounded-xl font-bold mb-6 text-sm">
                           ✅ Hari {selectedDay} Selesai!{selectedDay < TOTAL_DAYS ? ` Hari ${selectedDay + 1} kini terbuka.` : ' Selamat, semua misi selesai!'}
                         </div>
                       ) : null;
                     })()}
                     <div className="flex flex-col sm:flex-row gap-3 md:gap-4">
                       <button 
                         onClick={() => setQuizStep(0)} 
                         className="flex-1 py-4 md:py-5 bg-white border-2 border-slate-100 rounded-xl md:rounded-2xl font-black text-slate-600 hover:bg-slate-50 transition-colors"
                       >
                         Coba Lagi
                       </button>
                       <button 
                         onClick={() => { handleTabChange('riwayat'); window.scrollTo(0,0); }} 
                         className="flex-1 py-4 md:py-5 bg-emerald-600 text-white rounded-xl md:rounded-2xl font-black shadow-lg hover:bg-emerald-700 transition-all"
                       >
                         Lihat Riwayat
                       </button>
                     </div>
                   </div>
                )}
              </div>
              </SafeModule>
            )}

            {activeTab === 'riwayat' && (
              <SafeModule name="Riwayat">
              <div className="space-y-6 mb-10">
                <div className="bg-white rounded-[2rem] md:rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden animate-in fade-in duration-500">
                  <div className="p-6 md:p-8 border-b border-slate-50 bg-slate-50/50">
                    <h2 className="text-xl md:text-2xl font-black text-slate-900 tracking-tight mb-4">Progress Belajar 30 Hari</h2>
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2">
                      {Array.from({ length: TOTAL_DAYS }, (_, i) => i + 1).map((dayNum) => {
                        const badge = getDayBadge(dayNum, progress, selectedDay);
                        const unlocked = isDayUnlocked(dayNum, progress);
                        return (
                          <div
                            key={dayNum}
                            onClick={() => !unlocked ? setShowLockModal(true) : trySelectDay(dayNum, 'home')}
                            className={`p-3 rounded-xl border text-center transition-all ${!unlocked ? 'bg-slate-100 border-slate-200 cursor-not-allowed opacity-70' : 'bg-white border-slate-100 hover:border-emerald-200 cursor-pointer'}`}
                          >
                            <p className="text-[10px] font-black text-slate-500 mb-1">Hari {dayNum}</p>
                            <p className="text-[8px] font-black uppercase tracking-wider">{badge.text}</p>
                            <p className="text-xs font-black text-emerald-600 mt-1">{progress[dayNum]?.progress || 0}%</p>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>

              <div className="bg-white rounded-[2rem] md:rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden animate-in fade-in duration-500 mb-10">
                <div className="p-6 md:p-8 border-b border-slate-50 bg-slate-50/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                  <h2 className="text-xl md:text-2xl font-black text-slate-900 tracking-tight">Perjalanan Hafalanku</h2>
                  <div className="flex items-center gap-2 w-full sm:w-auto">
                    {myScores.length > 0 && (
                      <button
                        onClick={handleResetHistory}
                        className="flex items-center justify-center gap-2 bg-red-50 text-red-500 px-4 py-2 rounded-xl border border-red-100 font-bold text-[10px] md:text-sm shadow-sm hover:bg-red-100 transition-colors"
                      >
                        <Trash2 size={16} /> Reset
                      </button>
                    )}
                    <div className="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-100 font-black text-emerald-600 text-[10px] md:text-sm shadow-inner w-full sm:w-auto text-center">
                      {myScores.length} Kuis Selesai
                    </div>
                  </div>
                </div>
                
                <div className="overflow-x-auto">
                  <table className="w-full text-left min-w-[500px]">
                    <thead className="bg-slate-50/50">
                      <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th className="px-6 md:px-10 py-4 md:py-6">Materi</th>
                        <th className="px-6 md:px-10 py-4 md:py-6 text-center">Skor</th>
                        <th className="px-6 md:px-10 py-4 md:py-6 text-right">Predikat</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {myScores.map((s, i) => (
                        <tr key={i} className="hover:bg-slate-50 transition-colors">
                          <td className="px-6 md:px-10 py-4 md:py-6 font-black text-slate-700 text-sm md:text-base">
                            {s.category}
                          </td>
                          <td className="px-6 md:px-10 py-4 md:py-6 text-center font-black text-xl md:text-2xl text-emerald-600">
                            {s.score}%
                          </td>
                          <td className="px-6 md:px-10 py-4 md:py-6 text-right">
                            <span className={`px-3 py-1.5 md:px-4 md:py-2 rounded-lg md:rounded-xl text-[8px] md:text-[10px] font-black uppercase tracking-widest whitespace-nowrap ${s.score >= 80 ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-100 text-orange-700'}`}>
                              {s.score === 100 ? 'Mumtaz' : s.score >= 80 ? 'Jayyid' : 'Belajar Lagi'}
                            </span>
                          </td>
                        </tr>
                      ))}
                      {myScores.length === 0 && (
                        <tr>
                          <td colSpan="3" className="px-6 md:px-10 py-16 md:py-24 text-center text-slate-400 text-sm md:text-base font-medium italic">
                            Belum ada riwayat kuis. Ayo mulai misi Hari 1!
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
              </div>
              </SafeModule>
            )}
          </main>
        </div>
      );
    };

    const AppWithBoundary = () => (
      <ErrorBoundary name="Aplikasi Alfal">
        <App />
      </ErrorBoundary>
    );

    window.addEventListener('error', (event) => {
      console.error('[Alfal Global Error]', event.error || event.message, event.filename, event.lineno);
    });
    window.addEventListener('unhandledrejection', (event) => {
      console.error('[Alfal Unhandled Promise]', event.reason);
    });

    try {
      const rootEl = document.getElementById('root');
      const root = createRoot(rootEl);
      root.render(<AppWithBoundary />);
    } catch (e) {
      console.error('[Alfal] Root render gagal:', e);
      const rootEl = document.getElementById('root');
      if (rootEl) {
        rootEl.innerHTML = '<div style="font-family:sans-serif;padding:2rem;text-align:center;max-width:480px;margin:2rem auto;border:2px solid #fecaca;border-radius:1rem;background:#fef2f2"><h2 style="color:#991b1b;margin-bottom:0.5rem">Terjadi kesalahan pada modul ini</h2><p style="color:#64748b;font-size:14px">Aplikasi Alfal gagal dimuat. Muat ulang halaman atau hapus data cache browser.</p><button onclick="location.reload()" style="margin-top:1rem;padding:0.75rem 1.5rem;background:#047857;color:white;border:none;border-radius:0.75rem;font-weight:bold;cursor:pointer">Muat Ulang</button></div>';
      }
    }
  </script>
</body>
</html>
