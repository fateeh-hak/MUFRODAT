<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="theme-color" content="#059669">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Alfal">
  
  <title>Alfal.id | Platform Belajar Bahasa Arab</title>
  <link rel="manifest" href="manifest.json">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#059669',
            secondary: '#10B981',
            accent: '#F59E0B',
          },
          borderRadius: { '3xl': '24px' },
        }
      }
    };
  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Scheherazade+New:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Babel terbaru pakai JSX runtime "automatic" (import ES module) — tidak jalan di browser tanpa bundler
    Babel.registerPreset('react-classic', {
      presets: [[Babel.availablePresets.react, { runtime: 'classic' }]]
    });
  </script>

  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-storage-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script src="alfal-engine.js"></script>

  <style>
    :root {
      --primary: #059669;
      --secondary: #10B981;
      --accent: #F59E0B;
      --bg: #F8FAFC;
      --card: #FFFFFF;
    }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      -webkit-tap-highlight-color: transparent;
    }
    .font-arabic { font-family: 'Amiri', 'Noto Naskh Arabic', 'Scheherazade New', 'Scheherazade', serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.6); }
    .card-premium { background: var(--card); border-radius: 24px; box-shadow: 0 4px 24px -4px rgba(5,150,105,0.08), 0 2px 8px rgba(0,0,0,0.04); }
    .animate-unlock { animation: unlockPulse 0.6s ease-out; }
    @keyframes unlockPulse { 0% { transform: scale(0.9); opacity: 0.5; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes flip { 0% { transform: rotateY(0); } 100% { transform: rotateY(180deg); } }
    .flip-card { perspective: 1000px; }
    .flip-inner { transition: transform 0.5s; transform-style: preserve-3d; }
    .flip-inner.flipped { transform: rotateY(180deg); }
    .flip-front, .flip-back { backface-visibility: hidden; }
    .flip-back { transform: rotateY(180deg); }
    .journey-line { width: 3px; background: linear-gradient(to bottom, #10B981, #059669); margin: 0 auto; min-height: 24px; }
    .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    .print-only { display: none; }

    /* === Sertifikat A4 Premium === */
    .cert-screen-wrap {
      max-width: 520px;
      margin: 0 auto 24px;
      transform-origin: top center;
    }
    .cert-a4 {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: #fff;
      position: relative;
      box-sizing: border-box;
      color: #0f172a;
      font-family: 'Plus Jakarta Sans', Georgia, serif;
    }
    .cert-a4--preview {
      width: 100%;
      min-height: auto;
      aspect-ratio: 210 / 297;
      transform: scale(1);
      box-shadow: 0 20px 60px -20px rgba(5, 150, 105, 0.25);
      border-radius: 8px;
      overflow: hidden;
      height: auto;
    }
    .cert-a4--print {
      width: 210mm;
      height: 297mm;
      min-height: 297mm;
      max-height: 297mm;
      overflow: hidden;
    }
    .cert-a4--print .cert-a4__inner,
    .cert-a4--preview .cert-a4__inner {
      height: calc(100% - 0px);
      min-height: 0;
      max-height: 100%;
      overflow: hidden;
      justify-content: space-between;
      box-sizing: border-box;
    }
    .cert-a4--print .cert-a4__inner {
      height: calc(297mm - 20mm);
      min-height: calc(297mm - 20mm);
      max-height: calc(297mm - 20mm);
      padding: 11mm 12mm 9mm;
    }
    .cert-a4--preview .cert-a4__inner {
      min-height: 100%;
      padding: 4% 5% 3%;
    }
    .cert-a4__main {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }
    .cert-a4--preview .cert-a4__logo {
      width: 52px;
      height: 52px;
      margin-bottom: 6px;
    }
    .cert-a4--preview .cert-a4__logo-text { font-size: 1.5rem; }
    .cert-a4--preview .cert-a4__subtitle { margin-bottom: 10px; font-size: 11px; }
    .cert-a4--preview .cert-a4__body { margin-bottom: 10px; font-size: 12px; }
    .cert-a4--preview .cert-a4__stats { margin: 8px 0 10px; gap: 8px 16px; font-size: 10px; }
    .cert-a4--preview .cert-a4__signatures { padding-top: 6px; margin-top: 0; gap: 16px; }
    .cert-a4--preview .cert-a4__sign-qr svg { width: 56px !important; height: 56px !important; }
    .cert-a4--preview .cert-a4__footer { margin-top: 6px; padding-top: 6px; }
    .cert-a4--preview .cert-a4__qrcode svg { width: 68px !important; height: 68px !important; }
    .cert-a4--print .cert-a4__signatures { padding-top: 6px; margin-top: 0; }
    .cert-a4--print .cert-a4__footer { margin-top: 4px; padding-top: 6px; }
    .cert-a4--print .cert-a4__sign-qr svg { width: 64px !important; height: 64px !important; }
    .cert-a4--print .cert-a4__qrcode svg { width: 76px !important; height: 76px !important; }
    .cert-a4--print .cert-a4__body { margin-bottom: 12px; font-size: 13px; }
    .cert-a4--print .cert-a4__stats { margin: 10px 0 12px; }
    .cert-a4__frame {
      position: absolute;
      inset: 10mm;
      border: 3px double #059669;
      outline: 1px solid #d1fae5;
      outline-offset: 4px;
      pointer-events: none;
    }
    .cert-a4__inner {
      position: relative;
      z-index: 1;
      padding: 16mm 14mm 12mm;
      min-height: calc(297mm - 20mm);
      max-height: calc(297mm - 20mm);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-sizing: border-box;
      overflow: hidden;
    }
    .cert-a4--preview .cert-a4__inner {
      min-height: 100%;
      max-height: 100%;
      padding: 6% 5% 4%;
    }
    .cert-a4__corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #10b981;
      border-style: solid;
    }
    .cert-a4__corner--tl { top: 14mm; left: 14mm; border-width: 3px 0 0 3px; }
    .cert-a4__corner--tr { top: 14mm; right: 14mm; border-width: 3px 3px 0 0; }
    .cert-a4__corner--bl { bottom: 14mm; left: 14mm; border-width: 0 0 3px 3px; }
    .cert-a4__corner--br { bottom: 14mm; right: 14mm; border-width: 0 3px 3px 0; }
    .cert-a4__logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #059669, #10b981);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(5, 150, 105, 0.35);
    }
    .cert-a4__logo-text {
      font-family: 'Amiri', 'Noto Naskh Arabic', serif;
      font-size: 2.25rem;
      color: #fff;
      line-height: 1;
    }
    .cert-a4__brand {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.35em;
      color: #059669;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .cert-a4__title {
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 900;
      color: #064e3b;
      letter-spacing: 0.06em;
      margin: 8px 0 4px;
      text-transform: uppercase;
    }
    .cert-a4__subtitle {
      font-size: 13px;
      color: #64748b;
      font-weight: 600;
      margin-bottom: 20px;
      max-width: 90%;
    }
    .cert-a4__divider {
      width: 120px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #10b981, transparent);
      margin: 12px auto 20px;
    }
    .cert-a4__label {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }
    .cert-a4__name {
      font-size: clamp(1.75rem, 6vw, 2.5rem);
      font-weight: 900;
      color: #0f172a;
      margin: 0 0 16px;
      line-height: 1.2;
      font-family: Georgia, 'Times New Roman', serif;
    }
    .cert-a4__body {
      font-size: 14px;
      color: #475569;
      line-height: 1.65;
      max-width: 85%;
      margin-bottom: 20px;
    }
    .cert-a4__stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px 28px;
      margin: 16px 0 24px;
      font-size: 12px;
      font-weight: 800;
      color: #334155;
    }
    .cert-a4__stats span { color: #059669; }
    .cert-a4__signatures {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 380px;
      flex-shrink: 0;
      padding-top: 12px;
      gap: 28px;
    }
    .cert-a4__sign-qr {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .cert-a4__sign-qr svg {
      width: 72px !important;
      height: 72px !important;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 4px;
      background: #fff;
      box-sizing: content-box;
    }
    .cert-a4__footer {
      flex-shrink: 0;
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px dashed #e2e8f0;
      width: 100%;
    }
    .cert-a4__qrcode {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .cert-a4__qrcode svg {
      width: 96px !important;
      height: 96px !important;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 6px;
      background: #fff;
      box-sizing: content-box;
    }
    .cert-a4__cert-id {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.12em;
      color: #334155;
      font-family: monospace;
    }
    .cert-a4__verify {
      font-size: 9px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .cert-a4__hash {
      font-size: 8px;
      color: #cbd5e1;
      font-family: monospace;
      margin-top: 2px;
    }
    @media print {
      @page { size: A4 portrait; margin: 0; }
      html, body {
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
        width: 210mm !important;
        height: 297mm !important;
        overflow: hidden !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      #root,
      body > *:not(.certificate-print-portal) {
        display: none !important;
      }
      .certificate-print-portal {
        display: block !important;
        visibility: visible !important;
        position: fixed !important;
        left: 0 !important;
        top: 0 !important;
        width: 210mm !important;
        height: 297mm !important;
        min-height: 297mm !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
        z-index: 2147483647 !important;
        overflow: hidden !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .certificate-print-portal * {
        visibility: visible !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .certificate-print-portal .cert-a4 {
        width: 210mm !important;
        height: 297mm !important;
        min-height: 297mm !important;
        max-height: 297mm !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        overflow: hidden !important;
      }
    }
    @media screen {
      .certificate-print-portal {
        display: none !important;
      }
    }

    /* === Admin Dashboard === */
    .admin-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .admin-tab {
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #64748b;
      cursor: pointer;
    }
    .admin-tab--active {
      background: #059669;
      border-color: #059669;
      color: #fff;
    }
    .admin-table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .admin-table th {
      text-align: left;
      padding: 10px 12px;
      background: #f8fafc;
      font-weight: 900;
      color: #64748b;
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .admin-table td {
      padding: 10px 12px;
      border-top: 1px solid #f1f5f9;
      color: #334155;
      font-weight: 600;
    }
    .admin-table tr:hover td { background: #f8fafc; }
    .admin-search {
      width: 100%;
      max-width: 320px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .admin-detail {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      background: #fff;
      padding: 20px;
      margin-top: 16px;
    }
    .admin-detail__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .admin-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .admin-badge--online { background: #d1fae5; color: #047857; }
    .admin-badge--offline { background: #f1f5f9; color: #64748b; }
    .admin-badge--valid { background: #d1fae5; color: #047857; }
    .admin-badge--invalid { background: #fee2e2; color: #b91c1c; }
    .admin-progress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
      gap: 6px;
      margin-top: 8px;
    }
    .admin-day-chip {
      text-align: center;
      padding: 6px 4px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 800;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #94a3b8;
    }
    .admin-day-chip--done { background: #d1fae5; border-color: #6ee7b7; color: #047857; }
    .admin-row-click { cursor: pointer; }
    .admin-row-click:hover td { background: #ecfdf5 !important; }
    .admin-cert-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      background: #f8fafc;
      border-radius: 12px;
      margin-top: 12px;
    }
    .admin-cert-preview svg { max-width: 120px; width: 96px; height: 96px; }

    .admin-cert-modal {
      position: fixed;
      inset: 0;
      z-index: 130;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 12px;
      overflow-y: auto;
    }
    .admin-cert-modal__backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(4px);
    }
    .admin-cert-modal__panel {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
      background: #fff;
      border-radius: 20px;
      padding: 16px;
      margin: 12px auto 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
    }
    .admin-cert-view-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 900;
      background: #fff;
      border: 1px solid #6ee7b7;
      color: #047857;
      cursor: pointer;
      white-space: nowrap;
    }
    .admin-cert-view-btn:hover { background: #ecfdf5; }

    /* === Matching Quiz (Duolingo-style) === */
    .match-quiz-hud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .match-quiz-stat {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 800;
      background: #f1f5f9;
      color: #475569;
    }
    .match-quiz-stat--combo { background: #fff7ed; color: #ea580c; }
    .match-quiz-stat--xp { background: #ecfdf5; color: #047857; }
    .match-quiz-board {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 32px;
      min-height: 260px;
      padding: 8px 0;
    }
    @media (min-width: 640px) {
      .match-quiz-board { gap: 20px 48px; }
    }
    .match-lines-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    .match-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 3;
    }
    .match-col-label {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 4px;
    }
    .match-item {
      width: 100%;
      padding: 14px 12px;
      border-radius: 16px;
      border: 2px solid #e2e8f0;
      background: #fff;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
      user-select: none;
      touch-action: manipulation;
    }
    .match-item:hover:not(:disabled) {
      border-color: #10b981;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
    }
    .match-item--arab { font-family: 'Amiri', 'Noto Naskh Arabic', 'Scheherazade New', serif; font-size: 1.35rem; direction: rtl; }
    .match-item--arti { font-size: 0.9rem; color: #334155; }
    .match-item--selected {
      border-color: #3b82f6;
      background: #eff6ff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }
    .match-item--matched {
      border-color: #10b981;
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      cursor: default;
      opacity: 0.92;
      animation: matchSuccessPop 0.45s ease;
    }
    .match-item--matched:disabled { opacity: 0.85; }
    .match-item--dragging { opacity: 0.5; transform: scale(0.97); }
    .match-item--drop-target {
      border-color: #10b981;
      background: #f0fdf4;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
    }
    @keyframes matchSuccessPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    @keyframes matchShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .match-shake { animation: matchShake 0.45s ease; }
    .match-line-correct {
      stroke: #10b981;
      stroke-width: 3;

      19: {

      23: {
        title: "Bentuk & Ruang", titleAr: "الأَشْكَالُ", data: [

    const TOTAL_DAYS = Object.keys(MUFRODAT_DB).length;

    const getProgressKey = (name) => `alfal_progress_${name}`;

    const createEmptyDayProgress = () => ({
      completed: false,
      completedAt: null,
      wordsLearned: [],
      quizScore: 0,
      progress: 0,
      materiDone: false,
      hafalanDone: false,
      pelafalanDone: false,
      pelafalanScore: 0,
    });

    const safeParseJSON = (raw, fallback) => {
      try {
        if (raw == null || raw === '') return fallback;
        const parsed = JSON.parse(raw);
        return parsed == null ? fallback : parsed;
      } catch (e) {
        console.error('[Alfal] JSON parse gagal:', e);
        return fallback;
      }
    };

    const asArray = (val) => (Array.isArray(val) ? val : val != null && val !== '' ? [val] : []);

    const normalizeDayProgress = (raw) => {
      const base = { ...createEmptyDayProgress(), ...(raw && typeof raw === 'object' ? raw : {}) };
      base.wordsLearned = asArray(base.wordsLearned).filter((id) => id != null);
      base.quizScore = Number(base.quizScore) || 0;
      base.completed = !!base.completed;
      return updateDayProgress(base);
    };

    const normalizeProgress = (input) => {
      const saved = input && typeof input === 'object' ? input : {};
      const progress = {};
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        progress[d] = normalizeDayProgress(saved[d]);
      }
      return progress;
    };

    const getEmptyProgress = () => normalizeProgress({});

    const loadProgress = (name) => {
      try {
        const raw = localStorage.getItem(getProgressKey(name));

    };

    const saveProgressLocal = (name, progress) => {

    };

    const isDayUnlocked = (day, progress) => {
      if (!day || day === 1) return true;
      const prog = progress || {};
      return prog[day - 1]?.completed === true;
    };

    const updateDayProgress = (dayData) => {
      const words = dayData.wordsLearned?.length || 0;
      const wordPct = Math.min(words * 10, 100);
      const quizPct = dayData.quizScore || 0;
      if (words >= 10) dayData.materiDone = true;
      dayData.materiDone = !!dayData.materiDone;
      dayData.hafalanDone = !!dayData.hafalanDone;
      dayData.pelafalanDone = !!dayData.pelafalanDone;

      dayData.progress = Math.max(wordPct, quizPct);
      if (words >= 10 || quizPct >= 80) {
        dayData.completed = true;
        dayData.progress = 100;
        if (!dayData.completedAt) dayData.completedAt = Date.now();
      }
      return dayData;
    };

    const getDayStepStatus = (dayNum, progress) => {
      const day = progress?.[dayNum] || createEmptyDayProgress();
      const words = day.wordsLearned?.length || 0;
      return {
        materi: !!day.materiDone || words >= 10,
        hafalan: !!day.hafalanDone,
        pelafalan: !!day.pelafalanDone,
        quiz: (day.quizScore || 0) >= 80,
        locked: !isDayUnlocked(dayNum, progress),
      };
    };

    const mergeScoresIntoProgress = (progress, scores) => {
      const next = { ...progress };
      scores.forEach((s) => {
        const day = Number(s.day);
        if (!day || !next[day]) return;
        next[day] = { ...next[day] };
        next[day].quizScore = Math.max(next[day].quizScore || 0, s.score || 0);
        updateDayProgress(next[day]);
        if (s.score === 100 && !next[day].completedAt) {
          next[day].completedAt = s.timestamp || Date.now();
        }
      });
      return next;
    };

    const mergeProgressRecords = (local, remote) => {
      const merged = { ...local };
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        const l = local[d] || createEmptyDayProgress();
        const r = remote?.[d] || createEmptyDayProgress();
        const words = [...new Set([...(l.wordsLearned || []), ...(r.wordsLearned || [])])];
        merged[d] = {
          ...createEmptyDayProgress(),
          ...l,
          ...r,
          wordsLearned: words,
          quizScore: Math.max(l.quizScore || 0, r.quizScore || 0),
          materiDone: !!(l.materiDone || r.materiDone),
          hafalanDone: !!(l.hafalanDone || r.hafalanDone),
          pelafalanDone: !!(l.pelafalanDone || r.pelafalanDone),
          pelafalanScore: Math.max(l.pelafalanScore || 0, r.pelafalanScore || 0),
        };
        updateDayProgress(merged[d]);
        merged[d].completedAt = l.completedAt || r.completedAt || merged[d].completedAt;
      }
      return merged;
    };

    const getConsecutiveStreak = (progress) => {

      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, info) {
        console.error('[Alfal ErrorBoundary]', this.props.name || 'unknown', error, info?.componentStack);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="card-premium p-8 m-4 text-center border-2 border-red-100 bg-red-50/50">
              <AlertCircle size={40} className="text-red-400 mx-auto mb-4" />
              <h3 className="font-black text-slate-900 mb-2">Terjadi kesalahan pada modul ini</h3>

    const buildMapLandmarks = (totalDays) => {
      const chapterCount = 10;
      const pos = MAP_LANDMARK_POSITIONS;
      const daysPerChapter = Math.max(1, Math.ceil(totalDays / chapterCount));
      const landmarks = [{ id: 'start', type: 'start', x: pos[0].x, y: pos[0].y, label: 'START' }];
      let chapterNum = 0;
      for (let start = 1; start <= totalDays; start += daysPerChapter) {
        const end = Math.min(totalDays, start + daysPerChapter - 1);
        const days = [];
        for (let d = start; d <= end; d++) days.push(d);
        chapterNum += 1;
        const pi = Math.min(chapterNum, pos.length - 2);
        landmarks.push({
          id: `ch-${chapterNum}`,
          type: 'chapter',
          chapterNum,
          x: pos[pi].x,
          y: pos[pi].y,
          days,
          label: days.length === 1 ? `Hari ${start}` : `H${start}–${end}`,
        });
      }
      landmarks.push({
        id: 'finish',
        type: 'finish',
        x: pos[pos.length - 1].x,
        y: pos[pos.length - 1].y,
        label: 'Selesai',
      });
      return landmarks;
    };

    const getLandmarkStatus = (landmark, progress, totalDays) => {
      const prog = progress || {};
      if (landmark.type === 'start') return 'completed';
      if (landmark.type === 'finish') {
        const allDone = Array.from({ length: totalDays }, (_, i) => i + 1).every((d) => prog[d]?.completed);
        if (allDone) return 'completed';
        if (isDayUnlocked(totalDays, prog) && !prog[totalDays]?.completed) return 'active';
        return 'locked';
      }
      const days = landmark.days || [];
      if (!days.length || !isDayUnlocked(days[0], prog)) return 'locked';
      if (days.every((d) => prog[d]?.completed)) return 'completed';
      return 'active';
    };

      return next || landmark.days.find((d) => isDayUnlocked(d, progress)) || null;

            <p className="text-sm font-black text-white mt-2">{completedCount} / {total} Hari</p>
          </div>

          <div className="panel-card p-4">
            <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-3">Tahap Hari {day}</p>
            {[
              { icon: '📖', label: 'Materi', done: steps.materi },
              { icon: '🧠', label: 'Hafalan', done: steps.hafalan },
              { icon: '🎤', label: 'Pelafalan', done: steps.pelafalan },
              { icon: '🏆', label: 'Kuis', done: steps.quiz },
            ].map((t, i) => (
              <div key={i} className="flex justify-between py-2 border-b border-white/5 last:border-0">
                <span className="text-xs font-bold text-slate-200">{t.icon} {t.label}</span>
                <span className={`text-[10px] font-black ${t.done ? 'text-emerald-400' : 'text-red-400'}`}>
                  {t.done ? '✅ Selesai' : '❌ Belum'}

              </div>
            ))}
            <div className="mt-3">
              <div className="flex justify-between text-[9px] font-bold text-slate-400 mb-1">
                <span>Progress</span><span>{tahapPct}%</span>
              </div>
              <div className="h-2 bg-slate-700/60 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-emerald-500 to-blue-500 rounded-full transition-all" style={{ width: `${tahapPct}%` }} />
              </div>
            </div>
          </div>

          {nextDay && (
            <div className="panel-card p-4">
              <p className="text-[10px] font-black text-amber-400 uppercase mb-2">🎁 Hadiah Berikutnya</p>
              <p className="text-sm font-black text-white">Selesaikan Hari {nextDay}</p>
              <p className="text-lg font-black text-amber-400">+{nextRewardXp} XP</p>
            </div>
          )}

          <div className="panel-card p-3">
            <p className="text-[9px] font-black text-slate-500 uppercase mb-2">Legenda</p>
            <div className="grid grid-cols-2 gap-1 text-[9px] font-bold text-slate-400">
              <span>✅ Selesai</span><span className="text-blue-400">📖 Aktif</span>
              <span>🔒 Terkunci</span><span className="text-purple-400">🏆 Quiz</span>
            </div>
          </div>
        </div>
      );
    };

    const JourneyMap = ({ progress, selectedDay, onNodeClick, totalDays, profile, playerName, onLockedClick }) => {
      const safeProgress = progress || {};
      const mapScrollRef = useRef(null);
      const total = totalDays || TOTAL_DAYS;
      const landmarks = buildMapLandmarks(total);
      const safeProfile = profile || {};
      const levelInfo = AE().getLevelInfo(safeProfile.xp || 0);
      const avatarDisplay = AE().getProfileDisplay(safeProfile);
      const avatarEmoji = avatarDisplay.type === 'emoji' ? avatarDisplay.emoji : null;
      const avatarPhoto = avatarDisplay.type === 'photo' ? avatarDisplay.src : null;

      const activeLandmark = getActiveLandmark(landmarks, safeProgress, selectedDay, total);
      const focusDay = pickDayFromLandmark(activeLandmark, safeProgress) || selectedDay || 1;

      useEffect(() => {
        const t = setTimeout(() => {
          mapScrollRef.current?.querySelector('[data-active="true"]')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 400);
        return () => clearTimeout(t);
      }, [selectedDay, activeLandmark?.id]);

      const handleLandmarkClick = (landmark, status) => {
        if (status === 'locked') {
          onLockedClick?.();
          return;
        }
        if (landmark.type === 'finish') {
          const allDone = Array.from({ length: total }, (_, i) => i + 1).every((d) => safeProgress[d]?.completed);
          if (allDone) onNodeClick?.({ type: 'day', day: total });
          return;
        }
        if (landmark.type === 'chapter') {
          const day = pickDayFromLandmark(landmark, safeProgress);
          if (day) onNodeClick?.({ type: 'day', day });
        }
      };

      return (
        <div className="dashboard-adventure w-full h-full">
          <div className="dashboard-user-header flex items-center gap-3">
            {avatarPhoto ? (
              <img src={avatarPhoto} alt="" className="w-11 h-11 rounded-full object-cover border-2 border-emerald-400/60 flex-shrink-0" />
            ) : (
              <span className="text-3xl flex-shrink-0">{avatarEmoji || '👦'}</span>
            )}
            <div className="min-w-0 flex-1">
              <p className="font-black text-white text-sm truncate">{playerName || 'Santri'}</p>
              <p className="text-[10px] text-slate-400 font-bold">Pusat Petualangan · Hari {focusDay}</p>
            </div>
            <span className="text-[10px] font-black text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded-lg border border-emerald-500/20">🗺 Peta</span>
          </div>

          <div className="dashboard-stats-row">
            <div className="dashboard-stat-pill">
              <p>Streak</p>
              <p className="text-orange-300">🔥 {safeProfile.dailyStreak || 0}</p>
            </div>
            <div className="dashboard-stat-pill">
              <p>XP</p>
              <p className="text-amber-300">⭐ {safeProfile.xp || 0}</p>
            </div>
            <div className="dashboard-stat-pill">
              <p>Level</p>
              <p className="text-emerald-300">🛡 {levelInfo.level || 1}</p>
            </div>
          </div>

          <div className="campaign-map-col flex-1 min-h-0">
            <div ref={mapScrollRef} className="campaign-map-scroll h-full">
              <div className="campaign-map-canvas">
                <div className="campaign-map-bg-art" aria-hidden="true" />

                {landmarks.map((lm) => {
                  const status = getLandmarkStatus(lm, safeProgress, total);
                  if (lm.type === 'start') return null;
                  return (
                    <MapLandmarkPin
                      key={lm.id}
                      landmark={lm}
                      status={status}
                      showAvatar={activeLandmark?.id === lm.id}
                      avatarEmoji={avatarEmoji}
                      avatarPhoto={avatarPhoto}
                      onClick={() => handleLandmarkClick(lm, status)}
                    />
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    };

    const McQuizPanel = ({
      questionNum,
      total,
      modeLabel = 'Pilihan Ganda',
      prompt = 'APA ARTI KATA INI?',
      arabWord,
      options,
      correctAnswer,
      answerState,
      onSelect,
      disabled,
      extraContent,
    }) => (
      <div className="quiz-mc-wrap">
        <div className="quiz-mc-card">
          <div className="quiz-mc-header">
            <span className="quiz-mc-header-num">SOAL {questionNum} / {total}</span>
            <div className="quiz-mc-progress" role="progressbar" aria-valuenow={questionNum} aria-valuemin={1} aria-valuemax={total}>
              <div className="quiz-mc-progress-fill" style={{ width: `${(questionNum / total) * 100}%` }} />
            </div>
            <span className="quiz-mc-mode">{modeLabel}</span>
          </div>

          <p className="quiz-mc-prompt">{prompt}</p>
          {extraContent}
          {arabWord ? <h1 className="quiz-mc-arab" dir="rtl">{arabWord}</h1> : null}

          <div className="quiz-mc-options">
            {(options || []).map((opt, i) => {
              const isSelected = answerState?.selected === opt;
              const isCorrectOpt = correctAnswer && opt === correctAnswer;
              let cls = 'quiz-mc-option';
              if (answerState && isSelected) {
                cls += answerState.result === 'correct' ? ' quiz-mc-option--correct' : ' quiz-mc-option--wrong';
              } else if (answerState?.result === 'wrong' && isCorrectOpt) {
                cls += ' quiz-mc-option--correct';
              }
              return (
                <button
                  key={`${opt}-${i}`}
                  type="button"
                  className={cls}
                  disabled={disabled}
                  onClick={() => onSelect?.(opt)}
                >
                  <span>{opt}</span>
                </button>
              );
            })}
          </div>

          {answerState?.result === 'correct' && (
            <p className="quiz-mc-result quiz-mc-result--ok">✔ Benar</p>
          )}
          {answerState?.result === 'wrong' && (
            <p className="quiz-mc-result quiz-mc-result--bad">✗ Kurang tepat</p>
          )}
        </div>
      </div>
    );

    const PronunciationWaveform = ({ active }) => {
      if (!active) return null;
      return (
        <div className="pronounce-waveform" aria-hidden="true">
          {Array.from({ length: 14 }, (_, i) => (
            <div key={i} className="pronounce-wave-bar" style={{ animationDelay: `${i * 0.055}s` }} />
          ))}
        </div>
      );
    };

    const PronunciationPractice = ({ word, questionIndex, total, playAudio, showToast, onAwardXP, onNext, onSkip, phaseLabel = 'Pemanasan', skipLabel }) => {
      const [listening, setListening] = useState(false);
      const [evaluation, setEvaluation] = useState(null);
      const recognitionRef = useRef(null);

      const resetAttempt = () => {
        setEvaluation(null);
        if (recognitionRef.current) {
          try { recognitionRef.current.abort(); } catch (e) { /* ignore */ }
          recognitionRef.current = null;
        }
        setListening(false);
      };

      useEffect(() => () => {
        if (recognitionRef.current) {
          try { recognitionRef.current.abort(); } catch (e) { /* ignore */ }
        }
      }, []);

      const startRecognition = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          showToast?.('Browser tidak mendukung pengenalan suara. Gunakan Chrome/Safari.');
          return;
        }
        setEvaluation(null);
        setListening(true);
        const recognition = new SpeechRecognition();
        recognition.lang = 'ar-SA';
        recognition.interimResults = false;
        recognition.maxAlternatives = 3;
        recognitionRef.current = recognition;

        recognition.onresult = (event) => {
          let bestResult = null;
          const alts = event.results[0];
          for (let i = 0; i < alts.length; i++) {
            const candidate = AE().evaluatePronunciation(word.arab, alts[i].transcript);
            if (!bestResult || candidate.score > bestResult.score) bestResult = candidate;
          }
          const result = bestResult || AE().evaluatePronunciation(word.arab, '');
          setEvaluation(result);
          setListening(false);
          recognitionRef.current = null;
          if (result.isAcceptable) {
            const bonus = result.score >= 95 ? 10 : result.score >= 85 ? 5 : 2;
            onAwardXP?.(bonus);
            const grade = AE().getHafalanGrade ? AE().getHafalanGrade(result.score) : result.status;
            showToast?.(`${result.score}% — ${grade}! +${bonus} XP`);
            setTimeout(() => onNext?.(result), 2200);
          }
        };

        recognition.onerror = (event) => {
          console.error('Speech Recognition Error:', event.error);
          setListening(false);
          recognitionRef.current = null;
          if (event.error === 'not-allowed') {
            showToast?.('Izinkan akses mikrofon di pengaturan browser.');
          } else if (event.error !== 'aborted') {
            showToast?.('Suara tidak terdengar jelas. Coba lagi.');
          }
        };

        recognition.onend = () => setListening(false);

        try {
          recognition.start();
        } catch (e) {
          setListening(false);
          showToast?.('Gagal memulai mikrofon.');
        }
      };

      const stopRecognition = () => {
        if (recognitionRef.current) {
          try { recognitionRef.current.stop(); } catch (e) { /* ignore */ }
          recognitionRef.current = null;
        }
        setListening(false);
      };

      const handleSpeak = () => {
        if (listening) stopRecognition();
        else startRecognition();
      };

      if (!word) return null;

      const scoreClass = !evaluation ? ''
        : evaluation.score >= 85 ? 'pronounce-score--excellent'
        : evaluation.score >= 70 ? 'pronounce-score--good'
        : evaluation.score >= 50 ? 'pronounce-score--ok'
        : 'pronounce-score--low';

      const gradeLabel = evaluation ? (AE().getHafalanGrade ? AE().getHafalanGrade(evaluation.score) : evaluation.status) : '';
      const phaseDisplay = (phaseLabel || 'Pemanasan').toUpperCase();

      return (
        <div className="hafalan-setor-wrap animate-in fade-in duration-500">
          <div className="hafalan-setor-card">
            <div className="hafalan-setor-top">
              <span>{phaseDisplay} {questionIndex + 1} / {total}</span>
              <span className="hafalan-setor-pill">Ucapkan Arabnya</span>
            </div>

            <h2 className="hafalan-setor-title">Latihan Pengucapan</h2>
            <p className="hafalan-setor-desc">
              Ketuk mikrofon di bawah dan ucapkan bahasa Arab dari kata berikut:
            </p>

            <p className="hafalan-setor-word">&ldquo;{word.arti}&rdquo;</p>

            <button
              type="button"
              className={`hafalan-setor-mic ${listening ? 'hafalan-setor-mic--active' : ''}`}
              onClick={handleSpeak}
              aria-label={listening ? 'Berhenti merekam' : 'Mulai bicara'}
            >
              <Mic size={36} strokeWidth={2.25} />
            </button>
            <p className="hafalan-setor-mic-hint">
              {listening ? 'Mendengarkan pengucapan Anda...' : 'Ketuk untuk bicara'}
            </p>

            <PronunciationWaveform active={listening} />

            {evaluation && (
              <div className="hafalan-setor-eval">
                <div className={`pronounce-score-ring ${scoreClass}`}>{evaluation.score}%</div>
                <p className="text-sm font-black text-slate-700">
                  {evaluation.isAcceptable ? `✓ ${gradeLabel}` : 'Ulangi — skor di bawah 70'}
                </p>
                <p className="hafalan-setor-eval-arab" dir="rtl">{evaluation.targetDisplay}</p>
                <p className="text-xs text-slate-500">
                  Terdengar: <span dir="rtl" className="font-arabic">{evaluation.heardDisplay}</span>
                </p>
                {!evaluation.isAcceptable && (
                  <button type="button" className="hafalan-setor-retry" onClick={resetAttempt}>
                    🔄 Coba Lagi
                  </button>
                )}
                {evaluation.isAcceptable && (
                  <p className="text-xs text-emerald-600 font-bold mt-2">Lanjut ke kata berikutnya...</p>
                )}
              </div>
            )}

            <button
              type="button"
              className="hafalan-setor-help"
              onClick={() => playAudio?.(word.arab, word.latin)}
              disabled={listening}
            >
              🔊 Dengarkan Jawaban
            </button>

            {onSkip && (
              <button type="button" className="hafalan-setor-skip" onClick={onSkip}>
                {skipLabel || 'Lewati Pemanasan & Langsung Setor Hafalan'}
              </button>
            )}
          </div>
        </div>
      );
    };

    const MatchingQuiz = ({ pairs, onComplete, onAwardXP, showToast }) => {
      const pairList = Array.isArray(pairs) && pairs.length ? pairs : [];
      const boardRef = useRef(null);
      const itemRefs = useRef({});
      const [xpTotal, setXpTotal] = useState(0);
      const [rightOrder] = useState(() => [...pairList].sort(() => Math.random() - 0.5).map((p) => p.id));
      const [selectedLeft, setSelectedLeft] = useState(null);
      const [selectedRight, setSelectedRight] = useState(null);
      const [matched, setMatched] = useState(() => new Set());
      const [lines, setLines] = useState([]);
      const [flashLine, setFlashLine] = useState(null);
      const [shake, setShake] = useState(false);
      const [combo, setCombo] = useState(0);
      const [maxCombo, setMaxCombo] = useState(0);
      const [seconds, setSeconds] = useState(0);
      const [done, setDone] = useState(false);
      const [dragSide, setDragSide] = useState(null);
      const [dragId, setDragId] = useState(null);
      const [dropTarget, setDropTarget] = useState(null);

      useEffect(() => {
        if (done || !pairList.length) return undefined;
        const t = setInterval(() => setSeconds((s) => s + 1), 1000);
        return () => clearInterval(t);
      }, [done, pairList.length]);

      const formatTime = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;

      const computeLine = (leftId, rightId) => {
        const board = boardRef.current;
        const lEl = itemRefs.current[`l-${leftId}`];
        const rEl = itemRefs.current[`r-${rightId}`];
        if (!board || !lEl || !rEl) return null;
        const br = board.getBoundingClientRect();
        const lr = lEl.getBoundingClientRect();
        const rr = rEl.getBoundingClientRect();
        return {
          x1: lr.right - br.left,
          y1: lr.top + lr.height / 2 - br.top,
          x2: rr.left - br.left,
          y2: rr.top + rr.height / 2 - br.top,
        };
      };

      const finishBoard = (finalCombo, finalSeconds, runningXp) => {
        setDone(true);
        const speedBonus = finalSeconds < 20 ? 10 : finalSeconds < 40 ? 5 : 0;
        let totalXp = runningXp;
        if (speedBonus > 0) {
          totalXp += speedBonus;
          onAwardXP?.(speedBonus, 'match-speed');
          showToast?.(`⚡ Bonus kecepatan +${speedBonus} XP!`);
        }
        setXpTotal(totalXp);
        setTimeout(() => {
          onComplete?.({
            total: pairList.length,
            combo: finalCombo,
            maxCombo: Math.max(maxCombo, finalCombo),
            seconds: finalSeconds,
            xpTotal: totalXp,
          });
        }, speedBonus > 0 ? 900 : 500);
      };

      const tryMatch = (leftId, rightId) => {
        if (!leftId || !rightId || matched.has(leftId) || matched.has(rightId) || done) return;
        const coords = computeLine(leftId, rightId);
        if (leftId === rightId) {
          if (coords) setLines((prev) => [...prev, { ...coords, correct: true, key: `ok-${leftId}` }]);
          const newCombo = combo + 1;
          setCombo(newCombo);
          setMaxCombo((m) => Math.max(m, newCombo));
          const baseXp = AE().CONFIG?.XP_WORD || 5;
          const comboBonus = Math.min(newCombo * 2, 15);
          const xp = baseXp + comboBonus;
          setXpTotal((t) => {
            const newTotal = t + xp;
            setMatched((prev) => {
              const next = new Set([...prev, leftId]);
              if (next.size >= pairList.length) {
                finishBoard(newCombo, seconds, newTotal);
              }
              return next;
            });
            return newTotal;
          });
          onAwardXP?.(xp, 'match');
          showToast?.(`✓ Benar! +${xp} XP${newCombo > 1 ? ` · Combo ×${newCombo}` : ''}`);
        } else {
          setCombo(0);
          if (coords) setFlashLine({ ...coords, key: `bad-${Date.now()}` });
          setShake(true);
          setTimeout(() => { setShake(false); setFlashLine(null); }, 550);
        }
        setSelectedLeft(null);
        setSelectedRight(null);
        setDropTarget(null);
      };

      const handleLeftClick = (id) => {
        if (matched.has(id) || done) return;
        if (selectedRight !== null) tryMatch(id, selectedRight);
        else setSelectedLeft((cur) => (cur === id ? null : id));
      };

      const handleRightClick = (id) => {
        if (matched.has(id) || done) return;
        if (selectedLeft !== null) tryMatch(selectedLeft, id);
        else setSelectedRight((cur) => (cur === id ? null : id));
      };

      const onDragStart = (side, id) => (e) => {
        if (matched.has(id) || done) { e.preventDefault(); return; }
        setDragSide(side);
        setDragId(id);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', `${side}:${id}`);
      };

      const onDragOver = (side, id) => (e) => {
        e.preventDefault();
        if (matched.has(id) || done) return;
        setDropTarget(`${side}-${id}`);
      };

      const onDrop = (side, id) => (e) => {
        e.preventDefault();
        setDropTarget(null);
        const raw = e.dataTransfer.getData('text/plain');
        if (!raw) return;
        const [fromSide, fromId] = raw.split(':');
        const fromNum = Number(fromId);
        const toNum = Number(id);
        if (fromSide === 'left' && side === 'right') tryMatch(fromNum, toNum);
        else if (fromSide === 'right' && side === 'left') tryMatch(toNum, fromNum);
        setDragSide(null);
        setDragId(null);
      };

      if (!pairList.length) {
        return <p className="text-center text-slate-400 font-bold p-8">Data matching tidak tersedia.</p>;
      }

      const pairById = (id) => pairList.find((p) => p.id === id);

      return (
        <div className={shake ? 'match-shake' : ''}>
          <div className="match-quiz-hud">
            <span className="match-quiz-stat">⏱ {formatTime(seconds)}</span>
            <span className={`match-quiz-stat match-quiz-stat--combo ${combo > 1 ? 'ring-2 ring-orange-300' : ''}`}>
              🔥 Combo ×{combo || 0}
            </span>
            <span className="match-quiz-stat match-quiz-stat--xp">⭐ +{xpTotal} XP</span>
          </div>

          <p className="text-center text-sm font-black text-slate-500 mb-4">
            Cocokkan kata Arab dengan artinya — ketuk atau seret
          </p>

          <div ref={boardRef} className="match-quiz-board">
            <svg className="match-lines-svg" aria-hidden="true">
              {lines.map((ln) => (
                <line
                  key={ln.key}
                  x1={ln.x1}
                  y1={ln.y1}
                  x2={ln.x2}
                  y2={ln.y2}
                  className="match-line-correct"
                />
              ))}
              {flashLine && (
                <line
                  x1={flashLine.x1}
                  y1={flashLine.y1}
                  x2={flashLine.x2}
                  y2={flashLine.y2}
                  className="match-line-wrong"
                />
              )}
            </svg>

            <div className="match-col">
              <p className="match-col-label">العربية</p>
              {pairList.map((p) => {
                const isMatched = matched.has(p.id);
                const isSelected = selectedLeft === p.id;
                const isDragging = dragSide === 'left' && dragId === p.id;
                return (
                  <button
                    key={`l-${p.id}`}
                    type="button"
                    ref={(el) => { itemRefs.current[`l-${p.id}`] = el; }}
                    disabled={isMatched || done}
                    draggable={!isMatched && !done}
                    onDragStart={onDragStart('left', p.id)}
                    onDragEnd={() => { setDragSide(null); setDragId(null); setDropTarget(null); }}
                    onDragOver={onDragOver('left', p.id)}
                    onDrop={onDrop('left', p.id)}
                    onClick={() => handleLeftClick(p.id)}
                    className={`match-item match-item--arab ${isMatched ? 'match-item--matched' : ''} ${isSelected ? 'match-item--selected' : ''} ${isDragging ? 'match-item--dragging' : ''} ${dropTarget === `left-${p.id}` ? 'match-item--drop-target' : ''}`}
                  >
                    {p.arab}
                  </button>
                );
              })}
            </div>

            <div className="match-col">
              <p className="match-col-label">Indonesia</p>
              {rightOrder.map((id) => {
                const p = pairById(id);
                if (!p) return null;
                const isMatched = matched.has(id);
                const isSelected = selectedRight === id;
                const isDragging = dragSide === 'right' && dragId === id;
                return (
                  <button
                    key={`r-${id}`}
                    type="button"
                    ref={(el) => { itemRefs.current[`r-${id}`] = el; }}
                    disabled={isMatched || done}
                    draggable={!isMatched && !done}
                    onDragStart={onDragStart('right', id)}
                    onDragEnd={() => { setDragSide(null); setDragId(null); setDropTarget(null); }}
                    onDragOver={onDragOver('right', id)}
                    onDrop={onDrop('right', id)}
                    onClick={() => handleRightClick(id)}
                    className={`match-item match-item--arti ${isMatched ? 'match-item--matched' : ''} ${isSelected ? 'match-item--selected' : ''} ${isDragging ? 'match-item--dragging' : ''} ${dropTarget === `right-${id}` ? 'match-item--drop-target' : ''}`}
                  >
                    {p.arti}
                  </button>
                );
              })}
            </div>
          </div>

          <p className="text-[10px] text-center text-slate-400 mt-5 font-bold">

    const FlashcardMode = ({ words, onLearn, playAudio }) => {
      const safeWords = Array.isArray(words) ? words : [];
      const [idx, setIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [deck, setDeck] = useState(safeWords);
      if (!deck.length) {
        return (
          <div className="card-premium p-12 text-center text-slate-400">
            <Layers size={40} className="mx-auto mb-3 opacity-40" />
            <p className="font-bold">Belum ada kartu flashcard untuk hari ini.</p>
            <p className="text-xs mt-2">Pilih hari yang sudah terbuka dan pastikan data mufrodat tersedia.</p>
          </div>
        );
      }
      const card = deck[idx];
      if (!card) return <p className="text-center text-slate-400 p-8">Tidak ada kartu.</p>;
      const next = () => { setFlipped(false); setIdx((i) => (i + 1) % deck.length); };
      const prev = () => { setFlipped(false); setIdx((i) => (i - 1 + deck.length) % deck.length); };
      const shuffle = () => { setDeck([...deck].sort(() => Math.random() - 0.5)); setIdx(0); setFlipped(false); };
      return (
        <div className="max-w-md mx-auto">
          <div className="flip-card h-72 mb-6 cursor-pointer" onClick={() => setFlipped(!flipped)}>
            <div className={`flip-inner relative w-full h-full ${flipped ? 'flipped' : ''}`}>
              <div className="flip-front absolute inset-0 card-premium flex flex-col items-center justify-center p-8 border-2 border-primary/20">
                <p className="text-5xl font-arabic text-primary mb-4">{card.arab}</p>
                <p className="text-xs text-slate-400 font-bold">Ketuk untuk membalik</p>
              </div>
              <div className="flip-back absolute inset-0 card-premium flex flex-col items-center justify-center p-8 bg-emerald-50 border-2 border-emerald-200">
                <p className="text-2xl font-black text-slate-800 mb-2">{card.latin}</p>
                <p className="text-xl font-bold text-primary">{card.arti}</p>
              </div>
            </div>
          </div>
          <div className="flex justify-center gap-3 mb-4">
            <button onClick={prev} className="p-3 rounded-2xl bg-slate-100 hover:bg-slate-200"><ChevronLeft size={20} /></button>
            <button onClick={() => { playAudio(card.arab); onLearn(card.id); }} className="p-3 rounded-2xl bg-emerald-100 text-primary"><Volume2 size={20} /></button>
            <button onClick={shuffle} className="p-3 rounded-2xl bg-slate-100 hover:bg-slate-200"><RefreshCw size={20} /></button>
            <button onClick={next} className="p-3 rounded-2xl bg-slate-100 hover:bg-slate-200"><ChevronRight size={20} /></button>
          </div>
          <p className="text-center text-xs font-bold text-slate-400">{idx + 1} / {deck.length}</p>
        </div>
      );
    };

    const MateriPremiumPage = ({
      words, day, dayMeta, progress, speechState,
      onLearn, playAudio, repeatAudio, onGoHafalan, showToast,
    }) => {
      const safeWords = Array.isArray(words) ? words : [];
      const learnedIds = progress?.[day]?.wordsLearned || [];
      const learnedCount = learnedIds.length;
      const total = safeWords.length || 10;
      const pct = Math.round((learnedCount / total) * 100);

      const findStartIdx = () => {
        const open = safeWords.findIndex((w) => !learnedIds.includes(w.id));
        return open >= 0 ? open : 0;
      };

      const [idx, setIdx] = useState(findStartIdx);
      const [slideDir, setSlideDir] = useState('next');
      const [animKey, setAnimKey] = useState(0);

      useEffect(() => {
        setIdx(findStartIdx());
        setAnimKey((k) => k + 1);
      }, [day]);

      if (!safeWords.length) {
        return (
          <div className="materi-premium">
            <p className="text-center text-slate-400 p-12 font-bold">Belum ada materi untuk hari ini.</p>
          </div>
        );
      }

      const card = safeWords[idx];
      const isLearned = learnedIds.includes(card.id);
      const allDone = learnedCount >= total;

      const goTo = (nextIdx, dir) => {
        if (nextIdx < 0 || nextIdx >= safeWords.length) return;
        setSlideDir(dir);
        setAnimKey((k) => k + 1);
        setIdx(nextIdx);
      };

      const handleUnderstand = () => {
        const wasLearned = isLearned;
        if (!wasLearned) {
          onLearn?.(card.id);
          showToast?.('+10 XP — Kata dipelajari!');
        }
        const willBeAllDone = allDone || (!wasLearned && learnedCount + 1 >= total);
        let target;
        if (willBeAllDone) {
          target = (idx + 1) % safeWords.length;
        } else {
          target = -1;
          for (let i = 1; i < safeWords.length; i++) {
            const ni = (idx + i) % safeWords.length;
            const w = safeWords[ni];
            if (!learnedIds.includes(w.id) && w.id !== card.id) { target = ni; break; }
          }
          if (target < 0) target = Math.min(idx + 1, safeWords.length - 1);
        }
        if (target !== idx) {
          setTimeout(() => goTo(target, 'next'), wasLearned || willBeAllDone ? 0 : 360);
        }
      };

      const slideClass = slideDir === 'back' ? 'materi-premium-slide--back' : 'materi-premium-slide';

      return (
        <div className="materi-premium">
          <div className="materi-premium-header">
            <p className="materi-premium-header__day">
              Hari {day}{allDone ? ' · ✅ Selesai' : ''}
            </p>
            <div className="materi-premium-progress-track">
              <div className="materi-premium-progress-fill" style={{ width: `${allDone ? 100 : pct}%` }} />
            </div>
            <p className="materi-premium-progress-label"><span>{learnedCount}</span> / {total} Kata</p>
          </div>

          {allDone && (
            <div className="materi-premium-done-banner">
              <span>🎉 Materi selesai — ulangi kapan saja untuk review</span>
              <button type="button" onClick={onGoHafalan}>Setor Hafalan →</button>
            </div>
          )}

          <div key={animKey} className={slideClass}>
            <div className="materi-premium-card">
              <h1 className="materi-premium-arab" dir="rtl">{card.arab}</h1>

              <div className="materi-premium-audio-row">
                <button type="button" className="materi-premium-audio-chip" onClick={() => playAudio?.(card.arab, card.latin)}>
                  {speechState === 'playing' ? '⏸' : '🔊'} Dengarkan
                </button>
                <button type="button" className="materi-premium-audio-chip" onClick={() => repeatAudio?.(card.arab, card.latin)}>
                  🔁 Ulangi
                </button>
              </div>

              <p className="materi-premium-latin">{card.latin}</p>
              <p className="materi-premium-arti">{card.arti}</p>
            </div>

            {(card.contoh || card.deskripsi) && (
              <div className="materi-premium-example">
                <p className="materi-premium-example__label">Contoh Kalimat</p>
                {card.contoh && <p className="materi-premium-example__arab" dir="rtl">{card.contoh}</p>}
                {card.latin && <p className="materi-premium-example__latin">{card.latin}</p>}
                {card.deskripsi && <p className="materi-premium-example__indo">{card.deskripsi}</p>}
              </div>
            )}

            <button
              type="button"
              className={`materi-premium-cta ${isLearned ? 'materi-premium-cta--done' : ''}`}
              onClick={handleUnderstand}
            >
              {allDone
                ? (isLearned ? '↻ Review — Kata Berikutnya' : '✅ Sudah Paham')
                : (isLearned ? '✓ Sudah Paham — Lanjut' : '✅ Sudah Paham')}
            </button>

            <div className="materi-premium-dots" aria-label="Navigasi kata">
              {safeWords.map((w, i) => (
                <button
                  key={w.id}
                  type="button"
                  className={`materi-premium-dot ${i === idx ? 'materi-premium-dot--active' : ''} ${learnedIds.includes(w.id) ? 'materi-premium-dot--done' : ''}`}
                  onClick={() => goTo(i, i > idx ? 'next' : 'back')}
                  aria-label={`Kata ${i + 1}`}
                />
              ))}
            </div>
          </div>
        </div>
      );
    };

    const MAX_PROFILE_PHOTO_BYTES = 5 * 1024 * 1024;
    const ALLOWED_PROFILE_PHOTO_TYPES = ['image/jpeg', 'image/png', 'image/webp'];

    const dataUrlToBlob = (dataUrl) => {
      const parts = dataUrl.split(',');
      const mime = parts[0].match(/:(.*?);/)?.[1] || 'image/jpeg';
      const bin = atob(parts[1]);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return new Blob([arr], { type: mime });
    };

    const cropProfilePhotoFile = (file) => new Promise((resolve, reject) => {
      if (!ALLOWED_PROFILE_PHOTO_TYPES.includes(file.type)) {
        reject(new Error('Format harus JPG, PNG, atau WEBP'));
        return;
      }
      if (file.size > MAX_PROFILE_PHOTO_BYTES) {
        reject(new Error('Ukuran maksimal 5 MB'));
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const cropSize = Math.min(img.width, img.height);
          const sx = (img.width - cropSize) / 2;
          const sy = (img.height - cropSize) / 2;
          const out = 400;
          const canvas = document.createElement('canvas');
          canvas.width = out;
          canvas.height = out;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, sx, sy, cropSize, cropSize, 0, 0, out, out);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
          resolve({ dataUrl, blob: dataUrlToBlob(dataUrl) });
        };
        img.onerror = () => reject(new Error('Gagal memuat gambar'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('Gagal membaca file'));
      reader.readAsDataURL(file);
    });

    const ProfileAvatarDisplay = ({ profile, size = 'md', className = '', showPhotoBadge = false }) => {
      const display = AE().getProfileDisplay(profile || {});
      const sizes = {
        sm: { ring: 'w-10 h-10', emoji: 'text-xl' },
        md: { ring: 'w-16 h-16', emoji: 'text-3xl' },
        lg: { ring: 'w-28 h-28', emoji: 'text-5xl' },
        xl: { ring: 'w-32 h-32', emoji: 'profile-avatar-inner--xl' },
      };
      const s = sizes[size] || sizes.md;
      return (
        <div className={`relative ${className}`}>
          <div className={`${s.ring} rounded-full overflow-hidden bg-emerald-50 flex items-center justify-center ${display.type === 'emoji' ? s.emoji : ''}`}>
            {display.type === 'photo' ? (
              <img src={display.src} alt={display.label} className="w-full h-full object-cover" />
            ) : (
              <span className="leading-none">{display.emoji}</span>
            )}
          </div>
          {showPhotoBadge && display.type === 'photo' && (
            <span className="absolute -bottom-1 left-1/2 -translate-x-1/2 whitespace-nowrap text-[8px] font-black bg-emerald-600 text-white px-2 py-0.5 rounded-full">📷 Foto Saya</span>
          )}
        </div>
      );
    };

    const ProfilePage = ({ name, profile, progress, myScores, onProfileUpdate, showToast, storageRef, participantName, isMusyrif }) => {
      const safeProfile = profile || AE().createEmptyProfile();
      const safeProgress = progress || {};
      const safeScores = Array.isArray(myScores) ? myScores : [];
      const stats = AE().getStats(safeProgress, safeProfile, safeScores);
      const info = AE().getLevelInfo(safeProfile.xp || 0);
      const completedCount = Object.keys(safeProgress).filter((d) => safeProgress[d]?.completed).length;
      const totalDays = AE().CONFIG?.TOTAL_DAYS || 30;
      const overallPct = Math.round((completedCount / totalDays) * 100);
      const display = AE().getProfileDisplay(safeProfile);
      const photoInputRef = useRef(null);
      const [uploading, setUploading] = useState(false);
      const [avatarTab, setAvatarTab] = useState(() => {
        if (safeProfile.gender === 'perempuan') return 'perempuan';
        return 'laki-laki';
      });

      const genderFilter = safeProfile.gender || avatarTab;
      const visibleAvatars = AE().getAvatarsByGender(genderFilter);
      const selectedId = AE().resolveAvatarId(safeProfile.avatar);

      const patchProfile = (updates) => onProfileUpdate?.({ ...safeProfile, ...updates });

      const handleGenderChange = (gender) => {
        const list = AE().getAvatarsByGender(gender);
        const keepCurrent = list.some((a) => a.id === selectedId);
        const updates = { gender };
        if (!keepCurrent && list[0]) updates.avatar = list[0].id;
        patchProfile(updates);
        setAvatarTab(gender);
      };

      const handleAvatarSelect = (id) => {
        const av = AE().getAvatarById(id);
        patchProfile({ avatar: id, gender: av.gender || safeProfile.gender });
        showToast?.('Avatar berhasil dipilih');
      };

      const handlePhotoUpload = async (e) => {
        const file = e.target.files?.[0];
        e.target.value = '';
        if (!file) return;
        setUploading(true);
        try {
          const { dataUrl, blob } = await cropProfilePhotoFile(file);
          let profilePhotoUrl = safeProfile.profilePhotoUrl || null;
          if (storageRef && participantName) {
            const url = await AE().uploadProfilePhoto(storageRef, participantName, blob);
            if (url) profilePhotoUrl = url;
          }
          patchProfile({ profilePhoto: dataUrl, profilePhotoUrl });
          showToast?.('Foto profil berhasil diperbarui');
        } catch (err) {
          showToast?.(err.message || 'Gagal mengunggah foto');
        } finally {
          setUploading(false);
        }
      };

      const handleRemovePhoto = () => {
        patchProfile({ profilePhoto: null, profilePhotoUrl: null });
        showToast?.('Foto profil dihapus');
      };

      return (
        <div className="max-w-2xl mx-auto space-y-6 pb-8">
          <div className="profile-hero-card p-6 md:p-8 text-center text-white relative z-10">
            <div className="flex flex-col items-center">
              <div className="profile-avatar-ring mb-4">
                <div className={`profile-avatar-inner ${display.type === 'emoji' ? 'profile-avatar-inner--emoji' : ''}`}>
                  {display.type === 'photo' ? (
                    <img src={display.src} alt="Foto profil" />
                  ) : (
                    <span>{display.emoji}</span>
                  )}
                </div>
              </div>
              {display.type === 'photo' && (
                <p className="text-xs font-black text-emerald-100 mb-2">📷 Foto Saya</p>
              )}
              <h2 className="text-2xl md:text-3xl font-black">{name || 'Santri'}</h2>
              <p className="text-emerald-100 font-bold text-sm mt-1">{isMusyrif ? 'Musyrif / Admin' : (info.title || 'Santri Baru')}</p>
              <p className="text-[11px] text-emerald-200/80 font-bold uppercase tracking-wider mt-0.5">Role: {isMusyrif ? 'MUSYRIF (ADMIN)' : (info.title || 'Santri Baru')}</p>

              <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 w-full mt-6">
                {[
                  { l: 'Level', v: info.level || 1 },
                  { l: 'XP', v: safeProfile.xp || 0 },
                  { l: 'Streak', v: AE().getStreakDisplay(stats.dailyStreak || 0) },
                  { l: 'Progress', v: `${overallPct}%` },
                ].map((s) => (
                  <div key={s.l} className="profile-stat-pill">
                    <p className="text-[9px] font-black uppercase text-emerald-200/70">{s.l}</p>
                    <p className="text-sm font-black">{s.v}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="card-premium p-6">
            <h3 className="font-black text-slate-900 mb-4 flex items-center gap-2">
              <Camera size={18} className="text-primary" /> Foto Profil
            </h3>
            <div className="flex flex-wrap items-center gap-4">
              <ProfileAvatarDisplay profile={safeProfile} size="lg" showPhotoBadge />
              <div className="flex flex-col gap-2">
                <input
                  ref={photoInputRef}
                  type="file"
                  accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp"
                  className="hidden"
                  onChange={handlePhotoUpload}
                />
                <button
                  type="button"
                  disabled={uploading}
                  onClick={() => photoInputRef.current?.click()}
                  className="profile-upload-btn"
                >
                  <span>📷</span> {uploading ? 'Memproses...' : 'Upload Foto'}
                </button>
                {display.type === 'photo' && (
                  <button type="button" onClick={handleRemovePhoto} className="text-xs font-bold text-red-500 hover:text-red-600">
                    Hapus foto
                  </button>
                )}
                <p className="text-[10px] text-slate-400 font-medium">JPG, PNG, WEBP · Maks. 5 MB · Crop 1:1 otomatis</p>
              </div>
            </div>
          </div>

          <div className="card-premium p-6">
            <h3 className="font-black text-slate-900 mb-4">Identitas Santri</h3>
            <div className="space-y-3">

                <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Nama</label>
                <input className="profile-field bg-slate-50" value={name || ''} readOnly placeholder="Nama santri" />
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                  <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Kelas</label>
                  <input
                    className="profile-field"
                    placeholder="Contoh: 2A"
                    value={safeProfile.kelas || ''}
                    onChange={(e) => patchProfile({ kelas: e.target.value, className: e.target.value })}
                  />

                  <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Angkatan</label>

                    className="profile-field"

                    const v = e.target.value;

              <div className="flex gap-2 mb-4">

                  <button
                    key={g}

                    onClick={() => setAvatarTab(g)}
                    className={`profile-gender-tab ${avatarTab === g ? 'active' : ''}`}

                  </button>
                ))}
              </div>
            )}

            <div className="profile-avatar-grid">
              {visibleAvatars.map((a) => {
                const active = selectedId === a.id && display.type !== 'photo';

                  <button

                    type="button"

                  >

                      <span className="profile-avatar-check"><Check size={12} strokeWidth={3} /></span>

              </div>
