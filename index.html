    const ProgressBelajarPage = ({ profile, playerName, progress, totalDays, myScores }) => {
      const safeProfile = profile || {};
      const safeProgress = progress || {};
      const total = totalDays || TOTAL_DAYS;
      const completedCount = countCompletedDays(safeProgress);
      const overallPct = Math.round((completedCount / total) * 100);
      const levelInfo = AE().getLevelInfo(safeProfile.xp || 0);
      const stats = AE().getStats(safeProgress, safeProfile, myScores);
      const studyHours = Math.max(1, Math.round((completedCount * 25 + (safeProfile.studyMinutesToday || 0)) / 60));

      const DayRow = ({ dayNum }) => {
        const steps = getDayStepStatus(dayNum, safeProgress);
        if (steps.locked) return <span className="text-slate-400">🔒</span>;
        if (steps.materi) return <span className="text-emerald-600">✅</span>;
        return <span className="text-red-400">❌</span>;
      };
      const HafalanRow = ({ dayNum }) => {
        const steps = getDayStepStatus(dayNum, safeProgress);
        if (steps.locked) return <span className="text-slate-400">🔒</span>;
        if (steps.hafalan) return <span className="text-emerald-600">✅</span>;
        return <span className="text-red-400">❌</span>;
      };
      const QuizRow = ({ dayNum }) => {
        const steps = getDayStepStatus(dayNum, safeProgress);
        if (steps.locked) return <span className="text-slate-400">🔒</span>;
        if (steps.quiz) return <span className="text-emerald-600">✅</span>;
        return <span className="text-red-400">❌</span>;
      };

      return (
        <div className="max-w-2xl mx-auto space-y-5 pb-8 animate-in fade-in duration-500">
          <h2 className="text-2xl font-black text-slate-900">Progress Belajar</h2>

          <div className="card-premium p-6 text-center">
            <p className="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-3">Ringkasan Progress</p>
            <div className="relative inline-block">
              <ProgressRing pct={overallPct} ringId="progressPageRing" />
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <span className="text-3xl font-black text-slate-900">{overallPct}%</span>
                <span className="text-[10px] text-slate-500 font-bold">Selesai</span>
              </div>
            </div>
            <p className="text-lg font-black text-slate-800 mt-3">{completedCount} / {total} Hari</p>
          </div>

          <div className="card-premium p-5">
            <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-3">Progress Materi</p>
            <div className="grid grid-cols-5 sm:grid-cols-6 gap-2">
              {Array.from({ length: total }, (_, i) => i + 1).map((d) => (
                <div key={d} className="flex flex-col items-center p-2 rounded-xl bg-slate-50 text-center">
                  <span className="text-[9px] font-black text-slate-500 mb-1">H{d}</span>
                  <DayRow dayNum={d} />
                </div>
              ))}
            </div>
          </div>

          <div className="card-premium p-5">
            <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-3">Progress Hafalan</p>
            <div className="grid grid-cols-5 sm:grid-cols-6 gap-2">
              {Array.from({ length: total }, (_, i) => i + 1).map((d) => (
                <div key={d} className="flex flex-col items-center p-2 rounded-xl bg-slate-50 text-center">
                  <span className="text-[9px] font-black text-slate-500 mb-1">H{d}</span>
                  <HafalanRow dayNum={d} />
                </div>
              ))}
            </div>
          </div>

          <div className="card-premium p-5">
            <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-3">Progress Kuis</p>
            <div className="grid grid-cols-5 sm:grid-cols-6 gap-2">
              {Array.from({ length: total }, (_, i) => i + 1).map((d) => (
                <div key={d} className="flex flex-col items-center p-2 rounded-xl bg-slate-50 text-center">
                  <span className="text-[9px] font-black text-slate-500 mb-1">H{d}</span>
                  <QuizRow dayNum={d} />
                </div>
              ))}
            </div>
          </div>

          <div className="card-premium p-5">
            <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">Statistik</p>
            <div className="grid grid-cols-2 gap-3">
              {[
                { label: 'XP Total', val: safeProfile.xp || 0 },
                { label: 'Streak', val: `${safeProfile.dailyStreak || 0} Hari` },
                { label: 'Level', val: levelInfo.level || 1 },
                { label: 'Waktu Belajar', val: `~${studyHours} jam` },
                { label: 'Kata Dikuasai', val: stats.totalWords || 0 },
                { label: 'Kuis Lulus', val: stats.quizzesPassed || 0 },
              ].map((s, i) => (
                <div key={i} className="p-3 rounded-xl bg-slate-50">
                  <p className="text-[9px] font-black text-slate-400 uppercase">{s.label}</p>
                  <p className="text-lg font-black text-slate-800">{s.val}</p>
                </div>
              ))}
            </div>
          </div>

          <div>
            <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-3 px-1">Pencapaian</p>
            <AchievementsPage profile={profile} progress={progress} myScores={myScores} />
          </div>
        </div>
      );
    };

    const LeaderboardPage = ({ filter, setFilter, filterValue, setFilterValue, currentName }) => {
      const list = AE().getLeaderboard(filter || 'all', filterValue || '') || [];
      return (
        <div className="space-y-4">
          <div className="flex flex-wrap gap-2">
            {['all', 'kelas', 'angkatan'].map((f) => (
              <button key={f} onClick={() => setFilter(f)} className={`px-4 py-2 rounded-xl text-xs font-black uppercase ${filter === f ? 'bg-primary text-white' : 'bg-slate-100 text-slate-600'}`}>{f === 'all' ? 'Seluruh Pondok' : f}</button>
            ))}
            {filter !== 'all' && (
              <input value={filterValue} onChange={(e) => setFilterValue(e.target.value)} placeholder={`Filter ${filter}...`} className="px-4 py-2 rounded-xl border text-sm font-bold flex-1 min-w-[120px]" />
            )}
          </div>
          <div className="card-premium overflow-hidden">
            {list.length === 0 ? <p className="p-8 text-center text-slate-400">Belum ada data leaderboard.</p> : list.map((e, i) => (
              <div key={e?.name || i} className={`flex items-center gap-4 p-4 border-b border-slate-50 ${e?.name === currentName ? 'bg-emerald-50' : ''}`}>
                <span className="w-8 font-black text-slate-400">{i + 1}</span>
                <div className="flex-1">
                  <p className="font-black text-slate-800">{e?.name || '—'}</p>
                  <p className="text-[10px] text-slate-400">{e?.kelas || 'Umum'} · {e?.angkatan || '-'}</p>
                </div>
                <div className="text-right">
                  <p className="font-black text-primary">{e?.xp || 0} XP</p>
                  <p className="text-[10px] text-orange-500">🔥 {e?.streak || 0}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const DailyChallengeCard = ({ profile, onClaim }) => {
      const c = profile?.dailyChallenge || {};
      const items = [
        { label: 'Pelajari 10 kata', done: (c.words || 0) >= 10, prog: `${c.words || 0}/10` },
        { label: 'Selesaikan 1 quiz', done: c.quiz, prog: c.quiz ? '✓' : '—' },
        { label: 'Belajar 15 menit', done: (c.minutes || 0) >= 15, prog: `${c.minutes || 0}/15 mnt` },
      ];
      return (
        <div className="card-premium p-6 border-2 border-accent/20">
          <h3 className="font-black text-slate-900 flex items-center gap-2 mb-4"><Target size={20} className="text-accent" /> Tantangan Harian</h3>
          <div className="space-y-3 mb-4">
            {items.map((it, i) => (
              <div key={i} className="flex justify-between items-center p-3 rounded-xl bg-slate-50">
                <span className={`text-sm font-bold ${it.done ? 'text-emerald-600' : 'text-slate-600'}`}>{it.done ? '✔' : '○'} {it.label}</span>
                <span className="text-xs font-black text-slate-400">{it.prog}</span>
              </div>
            ))}
          </div>
          {c.completed && !c.claimed && (
            <button onClick={onClaim} className="w-full py-3 bg-accent text-white rounded-2xl font-black">Klaim +150 XP</button>
          )}
          {c.claimed && <p className="text-center text-emerald-600 font-bold text-sm">✅ Reward diklaim!</p>}
        </div>
      );
    };

    const SmartReviewPage = ({ profile, onReview, playAudio }) => {
      const review = AE().getReviewList(profile || {}, MUFRODAT_DB || {}) || { due: [], failed: [], never: [], smart: [] };
      const Section = ({ title, items, color }) => items.length > 0 && (
        <div className="card-premium p-6 mb-4">
          <h3 className={`font-black mb-4 ${color}`}>{title}</h3>
          <div className="space-y-2">
            {items.map((w) => (
              <div key={w.key} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                <div>
                  <p className="font-arabic text-xl text-primary">{w.arab}</p>
                  <p className="text-xs text-slate-500">Hari {w.day} · {w.arti}</p>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => playAudio(w.arab)} className="p-2 rounded-lg bg-emerald-100 text-primary"><Volume2 size={16} /></button>
                  <button onClick={() => onReview(w.day, w.id, true)} className="p-2 rounded-lg bg-emerald-600 text-white text-xs font-black">✓</button>
                  <button onClick={() => onReview(w.day, w.id, false)} className="p-2 rounded-lg bg-red-100 text-red-500 text-xs font-black">✗</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
      return (
        <div>
          <h2 className="text-xl font-black mb-4">Review Hari Ini</h2>
          <Section title="⚠️ Kata Sering Salah" items={review.failed} color="text-red-600" />
          <Section title="📅 Perlu Diulang (SRS)" items={review.due} color="text-orange-600" />
          <Section title="🆕 Belum Pernah Diulang" items={review.never.slice(0, 8)} color="text-blue-600" />
          {review.smart.length === 0 && <p className="text-center text-slate-400 p-12 card-premium">Alhamdulillah, tidak ada review hari ini!</p>}
        </div>
      );
    };

    const CertificateBody = ({ cert, name }) => {
      const verifyUrl = cert.verifyUrl || `https://alfal.id/verify/${cert.id}`;
      const qrMain = cert.qrSvg || cert.barcodeSvg || AE().generateQrSvg(verifyUrl, 96);
      const qrMusyrif = cert.qrSvgMusyrif || AE().generateQrSvg(`${verifyUrl}?ref=musyrif`, 72);
      const qrKepala = cert.qrSvgKepala || AE().generateQrSvg(`${verifyUrl}?ref=kepala`, 72);
      return (
      <>
        <div className="cert-a4__frame" aria-hidden="true" />
        <div className="cert-a4__corner cert-a4__corner--tl" aria-hidden="true" />
        <div className="cert-a4__corner cert-a4__corner--tr" aria-hidden="true" />
        <div className="cert-a4__corner cert-a4__corner--bl" aria-hidden="true" />
        <div className="cert-a4__corner cert-a4__corner--br" aria-hidden="true" />
        <div className="cert-a4__inner">
          <div className="cert-a4__main">
            <div className="cert-a4__logo">
              <span className="cert-a4__logo-text">ع</span>
            </div>
            <p className="cert-a4__brand">Alfal.id</p>
            <h1 className="cert-a4__title">Sertifikat Penyelesaian</h1>
            <p className="cert-a4__subtitle">{cert.program}</p>
            <div className="cert-a4__divider" />
            <p className="cert-a4__label">Diberikan Kepada</p>
            <h2 className="cert-a4__name">{name}</h2>
            <p className="cert-a4__body">
              Telah menyelesaikan seluruh perjalanan belajar Mufrodat Bahasa Arab
              ({cert.completedDays} hari) dengan dedikasi dan istiqomah.
            </p>
            <div className="cert-a4__stats">
              <div>Total XP: <span>{cert.xp}</span></div>
              <div>Level: <span>{cert.level}</span></div>
              <div>Kelas: <span>{cert.kelas}</span></div>
              <div>Angkatan: <span>{cert.angkatan}</span></div>
            </div>
            <p className="text-sm font-bold text-slate-500">Diterbitkan: {cert.date}</p>
          </div>
          <div className="cert-a4__signatures">
            <div className="cert-a4__sign-qr" dangerouslySetInnerHTML={{ __html: qrMusyrif }} title="QR Verifikasi Musyrif" />
            <div className="cert-a4__sign-qr" dangerouslySetInnerHTML={{ __html: qrKepala }} title="QR Verifikasi Kepala Program" />
          </div>
          <div className="cert-a4__footer">
            <div className="cert-a4__qrcode">
              <div dangerouslySetInnerHTML={{ __html: qrMain }} title="QR Verifikasi Sertifikat" />
              <p className="cert-a4__cert-id">{cert.id}</p>
              <p className="cert-a4__verify">Verifikasi: {verifyUrl}</p>
              <p className="cert-a4__hash">Kode Integritas: {cert.verifyHash}</p>
            </div>
          </div>
        </div>
      </>
      );
    };

    const CertificateView = ({ cert, name }) => {
      if (!cert) return null;
      return (
        <div className="cert-screen-wrap no-print">
          <div className="cert-a4 cert-a4--preview">
            <CertificateBody cert={cert} name={name} />
          </div>
        </div>
      );
    };

    const CertificatePrintPortal = ({ data }) => {
      if (!data || typeof document === 'undefined') return null;
      return ReactDOM.createPortal(
        <div className="certificate-print-portal" aria-hidden="true">
          <div className="cert-a4 cert-a4--print">
            <CertificateBody cert={data.cert} name={data.name} />
          </div>
        </div>,
        document.body
      );
    };

    const enrichCertForView = (record) => {
      if (!record) return null;
      const issuedMs = record.issuedAt?.seconds ? record.issuedAt.seconds * 1000 : Number(record.issuedAt) || Date.now();
      const verifyUrl = record.verifyUrl || `https://alfal.id/verify/${record.id}`;
      return {
        ...record,
        program: record.program || 'Program Mufrodat Bahasa Arab 30 Hari',
        level: record.level || AE().getLevelInfo(record.xp || 0).title,
        completedDays: record.completedDays || 30,
        verifyUrl,
        qrSvg: record.qrSvg || AE().generateQrSvg(verifyUrl, 96),
        qrSvgMusyrif: record.qrSvgMusyrif || AE().generateQrSvg(`${verifyUrl}?ref=musyrif`, 72),
        qrSvgKepala: record.qrSvgKepala || AE().generateQrSvg(`${verifyUrl}?ref=kepala`, 72),
        barcodeSvg: record.barcodeSvg || record.qrSvg || AE().generateQrSvg(verifyUrl, 96),
        date: record.date || new Date(issuedMs).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }),
      };
    };

    const AdminDashboard = ({ db, appId, onPrintCert }) => {
      const [tab, setTab] = useState('hasil');
      const [search, setSearch] = useState('');
      const [scores, setScores] = useState([]);
      const [profiles, setProfiles] = useState([]);
      const [certs, setCerts] = useState([]);
      const [progressRows, setProgressRows] = useState([]);
      const [devices, setDevices] = useState([]);
      const [loading, setLoading] = useState(!!db);
      const [verifyInput, setVerifyInput] = useState('');
      const [verifyResult, setVerifyResult] = useState(null);
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [selectedCert, setSelectedCert] = useState(null);
      const [showCertPreview, setShowCertPreview] = useState(false);

      useEffect(() => {
        if (!db) {
          setLoading(false);
          setCerts(Object.values(AE().loadCertRegistry?.() || {}));
          return undefined;
        }
        const base = db.collection('artifacts').doc(appId).collection('public').doc('data');
        const unsubs = [
          base.collection('scores').onSnapshot((snap) => {
            setScores(snap.docs.map((d) => ({ id: d.id, ...d.data() })).sort((a, b) => {
              const tA = a.timestamp?.seconds ? a.timestamp.seconds * 1000 : (a.timestamp || 0);
              const tB = b.timestamp?.seconds ? b.timestamp.seconds * 1000 : (b.timestamp || 0);
              return tB - tA;
            }));
            setLoading(false);
          }, () => setLoading(false)),
          base.collection('profiles').onSnapshot((snap) => {
            setProfiles(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
          }),
          base.collection('certificates').onSnapshot((snap) => {
            setCerts(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
          }),
          base.collection('user_progress').onSnapshot((snap) => {
            setProgressRows(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
          }),
          base.collection('devices').onSnapshot((snap) => {
            setDevices(snap.docs.map((d) => ({ id: d.id, ...d.data() })).sort((a, b) => {
              const tA = a.lastSeen?.seconds ? a.lastSeen.seconds * 1000 : (a.lastSeen || 0);
              const tB = b.lastSeen?.seconds ? b.lastSeen.seconds * 1000 : (b.lastSeen || 0);
              return tB - tA;
            }));
          }),
        ];
        return () => unsubs.forEach((u) => u && u());
      }, [db, appId]);

      const q = search.trim().toLowerCase();
      const match = (val) => !q || String(val || '').toLowerCase().includes(q);
      const tsMs = (ts) => {
        if (!ts) return 0;
        if (ts.seconds) return ts.seconds * 1000;
        return Number(ts) || 0;
      };
      const fmtTime = (ts) => {
        const ms = tsMs(ts);
        if (!ms) return '—';
        return new Date(ms).toLocaleString('id-ID');
      };
      const isOnline = (ts) => tsMs(ts) > Date.now() - 5 * 60 * 1000;

      const studentMap = useMemo(() => {
        const map = {};
        const ensure = (name) => {
          const key = name || '—';
          if (!map[key]) {
            map[key] = {
              name: key,
              profile: null,
              progress: null,
              cert: null,
              scores: [],
              quizScores: [],
              hafalanScores: [],
            };
          }
          return map[key];
        };
        profiles.forEach((p) => {
          const s = ensure(p.name || p.id);
          s.profile = p;
        });
        progressRows.forEach((p) => {
          const s = ensure(p.name || p.id);
          s.progress = p;
        });
        certs.forEach((c) => {
          const s = ensure(c.name);
          s.cert = c;
        });
        scores.forEach((sc) => {
          const s = ensure(sc.name);
          s.scores.push(sc);
          const isQuiz = sc.type === 'Kuis' || String(sc.category || '').includes('Kuis');
          if (isQuiz) s.quizScores.push(sc);
          else s.hafalanScores.push(sc);
        });
        return map;
      }, [profiles, progressRows, certs, scores]);

      const students = useMemo(() => Object.values(studentMap).sort((a, b) => {
        const doneA = Object.values(a.progress?.progress || {}).filter((d) => d?.completed).length;
        const doneB = Object.values(b.progress?.progress || {}).filter((d) => d?.completed).length;
        return doneB - doneA;
      }), [studentMap]);

      const activeStudent = selectedStudent ? studentMap[selectedStudent] : null;
      const onlineDevices = devices.filter((d) => isOnline(d.lastSeen)).length;

      const runVerify = (certId) => {
        const id = (certId || verifyInput).trim();
        if (!id) return;
        const fromCloud = certs.find((c) => c.id === id);
        const local = AE().verifyCertificate?.(id);
        const record = fromCloud || local?.record;
        if (!record) {
          setVerifyResult({ valid: false, reason: 'Sertifikat tidak ditemukan' });
          setSelectedCert(null);
          return;
        }
        const expected = AE().hashStr(`${record.id}|${record.name}|${record.xp}|${record.verifyHash}`);
        const valid = !record.sealHash || record.sealHash === expected;
        setVerifyResult({
          valid,
          record,
          source: fromCloud ? 'Firestore' : 'Registry Lokal',
          reason: valid ? null : 'Integritas sertifikat tidak valid',
        });
        setSelectedCert(enrichCertForView(record));
      };

      const openCertPreview = (record) => {
        if (!record) return;
        runVerify(record.id);
        setShowCertPreview(true);
      };

      const tabs = [
        { id: 'hasil', label: `Hasil Santri (${students.length})` },
        { id: 'certs', label: `Sertifikat (${certs.length})` },
        { id: 'devices', label: `Perangkat (${devices.length})` },
        { id: 'log', label: `Log (${scores.length})` },
      ];

      return (
        <div className="space-y-6">
          <h2 className="text-2xl font-black flex items-center gap-2">
            <Shield size={24} className="text-primary" /> Dashboard Admin
          </h2>
          <p className="text-sm text-slate-500">Cek hasil santri, verifikasi sertifikat, dan pantau seluruh perangkat yang menggunakan sistem.</p>

          <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
            {[
              { l: 'Santri', v: students.length },
              { l: 'Submit Nilai', v: scores.length },
              { l: 'Sertifikat', v: certs.length },
              { l: 'Perangkat', v: devices.length },
              { l: 'Online Sekarang', v: onlineDevices },
            ].map((s, i) => (
              <div key={i} className="card-premium p-5">
                <p className="text-[10px] font-black text-slate-400 uppercase">{s.l}</p>
                <p className="text-2xl font-black text-slate-900">{s.v}</p>
              </div>
            ))}
          </div>

          <div className="admin-tabs">
            {tabs.map((t) => (
              <button key={t.id} type="button" className={`admin-tab ${tab === t.id ? 'admin-tab--active' : ''}`} onClick={() => setTab(t.id)}>
                {t.label}
              </button>
            ))}
          </div>

          <input className="admin-search" placeholder="Cari nama, kelas, ID sertifikat, perangkat..." value={search} onChange={(e) => setSearch(e.target.value)} />

          {loading && <p className="text-slate-400 text-sm">Memuat data...</p>}
          {!db && <p className="text-amber-600 text-sm font-bold">Mode offline — data cloud tidak tersedia.</p>}

          {tab === 'hasil' && (
            <div className="space-y-4">
              <div className="admin-table-wrap card-premium p-0 overflow-hidden">
                <table className="admin-table">
                  <thead>
                    <tr><th>Nama</th><th>Kelas</th><th>Progress</th><th>Kuis</th><th>Rata Kuis</th><th>XP</th><th>Sertifikat</th><th></th></tr>
                  </thead>
                  <tbody>
                    {students.filter((s) => match(s.name) || match(s.profile?.kelas)).map((s) => {
                      const done = Object.values(s.progress?.progress || {}).filter((d) => d?.completed).length;
                      const quizAvg = s.quizScores.length
                        ? Math.round(s.quizScores.reduce((a, b) => a + (Number(b.score) || 0), 0) / s.quizScores.length)
                        : '—';
                      return (
                        <tr key={s.name} className="admin-row-click" onClick={() => setSelectedStudent(s.name)}>
                          <td className="font-bold">{s.name}</td>
                          <td>{s.profile?.kelas || s.profile?.className || '—'}</td>
                          <td>{done}/30</td>
                          <td>{s.quizScores.length}</td>
                          <td>{quizAvg !== '—' ? `${quizAvg}%` : '—'}</td>
                          <td>{s.profile?.xp || 0}</td>
                          <td>{s.cert ? '✅' : done >= 30 ? '⏳' : '—'}</td>
                          <td className="text-primary text-xs font-black">Detail →</td>
                        </tr>
                      );
                    })}
                    {students.length === 0 && <tr><td colSpan={8} className="text-center text-slate-400 py-8">Belum ada data santri.</td></tr>}
                  </tbody>
                </table>
              </div>

              {activeStudent && (
                <div className="admin-detail card-premium">
                  <div className="admin-detail__header">
                    <div>
                      <h3 className="text-lg font-black">{activeStudent.name}</h3>
                      <p className="text-sm text-slate-500">
                        {activeStudent.profile?.kelas || '—'} · Angkatan {activeStudent.profile?.angkatan || '—'} · {activeStudent.profile?.xp || 0} XP
                      </p>
                    </div>
                    <button type="button" onClick={() => setSelectedStudent(null)} className="text-xs font-black text-slate-400 hover:text-slate-600">Tutup ✕</button>
                  </div>

                  <p className="text-xs font-black text-slate-400 uppercase mb-2">Progress 30 Hari</p>
                  <div className="admin-progress-grid">
                    {Array.from({ length: 30 }, (_, i) => i + 1).map((d) => {
                      const day = activeStudent.progress?.progress?.[d];
                      const done = day?.completed;
                      const partial = day && (day.materiDone || day.hafalanDone || day.pelafalanDone || (day.quizScore > 0));
                      return (
                        <div key={d} className={`admin-day-chip ${done ? 'admin-day-chip--done' : ''}`} title={done ? `Hari ${d} selesai` : partial ? `Hari ${d} berjalan` : `Hari ${d}`}>
                          {d}

                      <div className="space-y-2 max-h-64 overflow-y-auto">

                          <div key={sc.id} className="flex justify-between text-sm py-2 border-b border-slate-50">
                            <span className="font-semibold text-slate-700">{sc.category || sc.type || '—'}</span>

                      <p className="text-xs font-black text-slate-400 uppercase mb-2">Detail Per Hari</p>

                          const day = activeStudent.progress?.progress?.[d];
                          if (!day) return null;
                          const flags = [
                            day.materiDone && 'Materi',
                            day.hafalanDone && 'Hafalan',
                            day.pelafalanDone && `Pelafalan ${day.pelafalanScore || 0}%`,

                            <div key={d} className="flex justify-between py-1 border-b border-slate-50">

                  {activeStudent.cert && (
                    <div className="mt-6 p-4 bg-emerald-50 rounded-xl border border-emerald-100">

                      <p className="font-mono text-sm font-bold">{activeStudent.cert.id}</p>
                      <p className="text-xs text-emerald-600 mt-1">{activeStudent.cert.date} · Hash: {activeStudent.cert.verifyHash}</p>
                      <button type="button" className="mt-2 text-xs font-black text-primary inline-flex items-center gap-1" onClick={() => openCertPreview(activeStudent.cert)}>

          )}

          {tab === 'certs' && (
            <div className="space-y-4">
              <div className="card-premium p-6">
                <h3 className="font-black mb-3">Cek Keaslian Sertifikat</h3>
                <div className="flex gap-2 flex-wrap">
                  <input className="admin-search flex-1 min-w-[200px] mb-0" placeholder="ALFAL-XXXXXX-XXXXXX" value={verifyInput} onChange={(e) => setVerifyInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && runVerify()} />
                  <button type="button" onClick={() => runVerify()} className="px-5 py-2.5 bg-primary text-white rounded-xl font-black text-sm">Verifikasi</button>
                </div>
                {verifyResult && (
                  <div className={`mt-4 p-4 rounded-xl text-sm font-bold ${verifyResult.valid ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>
                    <div className="flex items-center justify-between gap-3 flex-wrap">
                      <span>
                        {verifyResult.valid ? (
                          <>✅ VALID — {verifyResult.record?.name} · {verifyResult.record?.kelas || '—'} · {verifyResult.source}</>

                          <>❌ Tidak valid: {verifyResult.reason}</>

                      </span>
                      {verifyResult.valid && verifyResult.record && (
                        <button
                          type="button"
                          className="admin-cert-view-btn"
                          onClick={() => openCertPreview(verifyResult.record)}

                        >
                          <Eye size={14} /> Lihat Sertifikat
                        </button>
                      )}
                    </div>
                  </div>
                )}
                {selectedCert && verifyResult?.valid && !showCertPreview && (
                  <div className="admin-cert-preview">
                    <div dangerouslySetInnerHTML={{ __html: selectedCert.qrSvg || selectedCert.barcodeSvg || AE().generateQrSvg(selectedCert.verifyUrl || selectedCert.id, 96) }} />
                    <p className="font-mono text-xs font-bold">{selectedCert.id}</p>
                    <p className="text-xs text-slate-500">Kode Integritas: {selectedCert.verifyHash}</p>
                  </div>
                )}
              </div>

              <div className="admin-table-wrap card-premium p-0 overflow-hidden">
                <table className="admin-table">
                  <thead><tr><th>ID</th><th>Nama</th><th>Kelas</th><th>XP</th><th>Tanggal</th><th>Status</th><th>Lihat</th></tr></thead>
                  <tbody>
                    {certs.filter((c) => match(c.name) || match(c.id)).map((c) => {
                      const v = AE().verifyCertificate?.(c.id);
                      const valid = v?.valid || !!c.verifyHash;
                      return (
                        <tr key={c.id} className="admin-row-click" onClick={() => { setSelectedCert(c); setVerifyInput(c.id); runVerify(c.id); }}>
                          <td className="font-mono text-[10px]">{c.id}</td>
                          <td>{c.name}</td>
                          <td>{c.kelas || '—'}</td>
                          <td>{c.xp}</td>
                          <td>{c.date || fmtTime(c.issuedAt)}</td>
                          <td><span className={`admin-badge ${valid ? 'admin-badge--valid' : 'admin-badge--invalid'}`}>{valid ? 'Valid' : 'Cek'}</span></td>
                          <td onClick={(e) => e.stopPropagation()}>
                            <button
                              type="button"
                              className="admin-cert-view-btn"
                              onClick={() => openCertPreview(c)}
                              title="Lihat sertifikat"
                            >
                              <Eye size={14} />
                            </button>
                          </td>
                        </tr>

                    })}
                    {certs.length === 0 && <tr><td colSpan={7} className="text-center text-slate-400 py-8">Belum ada sertifikat.</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {showCertPreview && selectedCert && verifyResult?.valid && (
            <div className="admin-cert-modal no-print">
              <div className="admin-cert-modal__backdrop" onClick={() => setShowCertPreview(false)} aria-hidden="true" />
              <div className="admin-cert-modal__panel">
                <div className="flex items-center justify-between gap-3 mb-4">
                  <div>
                    <h4 className="font-black text-slate-900">Sertifikat A4</h4>
                    <p className="text-xs text-slate-500 font-mono">{selectedCert.id}</p>
                  </div>
                  <button type="button" onClick={() => setShowCertPreview(false)} className="p-2 rounded-xl text-slate-400 hover:bg-slate-100" aria-label="Tutup">
                    <X size={18} />
                  </button>
                </div>
                <div className="flex gap-2 mb-4">
                  <button
                    type="button"
                    onClick={() => onPrintCert?.(selectedCert, selectedCert.name)}
                    className="flex-1 flex items-center justify-center gap-2 py-3 bg-primary text-white rounded-xl font-black text-sm"
                  >
                    <Print size={16} /> Cetak PDF (A4)
                  </button>
                </div>
                <CertificateView cert={enrichCertForView(selectedCert)} name={selectedCert.name} />
              </div>
            </div>
          )}

          {tab === 'devices' && (
            <div className="admin-table-wrap card-premium p-0 overflow-hidden">
              <table className="admin-table">
                <thead>
                  <tr><th>Status</th><th>Pengguna</th><th>Perangkat</th><th>OS / Browser</th><th>Layar</th><th>PWA</th><th>Terakhir Aktif</th></tr>
                </thead>
                <tbody>
                  {devices.filter((d) => match(d.userName) || match(d.deviceId) || match(d.os) || match(d.browser)).map((d) => (
                    <tr key={d.id || d.deviceId}>
                      <td>
                        <span className={`admin-badge ${isOnline(d.lastSeen) ? 'admin-badge--online' : 'admin-badge--offline'}`}>
                          {isOnline(d.lastSeen) ? 'Online' : 'Offline'}
                        </span>
                      </td>
                      <td>
                        <span className="font-bold">{d.userName || '—'}</span>
                        <span className="block text-[10px] text-slate-400">{d.role || 'santri'}</span>
                      </td>
                      <td>
                        <span className="font-bold">{d.deviceType || '—'}</span>
                        <span className="block font-mono text-[9px] text-slate-400">{d.deviceId || d.id}</span>
                      </td>
                      <td>{d.os || '—'} / {d.browser || '—'}</td>
                      <td>{d.screen || '—'}</td>
                      <td>{d.isPWA ? '✅' : '—'}</td>
                      <td>{fmtTime(d.lastSeen)}</td>
                    </tr>
                  ))}
                  {devices.length === 0 && <tr><td colSpan={7} className="text-center text-slate-400 py-8">Belum ada perangkat terdaftar. Perangkat akan muncul saat pengguna login.</td></tr>}
                </tbody>
              </table>
            </div>
          )}

          {tab === 'log' && (
            <div className="admin-table-wrap card-premium p-0 overflow-hidden">
              <table className="admin-table">
                <thead>
                  <tr><th>Waktu</th><th>Nama</th><th>Tipe</th><th>Materi</th><th>Skor</th><th>Hari</th></tr>
                </thead>
                <tbody>
                  {scores.filter((s) => match(s.name) || match(s.category) || match(s.day)).map((s) => (
                    <tr key={s.id}>
                      <td>{fmtTime(s.timestamp)}</td>
                      <td>{s.name || '—'}</td>
                      <td>{s.type || (s.category?.includes('Kuis') ? 'Kuis' : 'Hafalan')}</td>
                      <td>{s.category || '—'}</td>
                      <td>{s.score != null && s.score !== '-' ? `${s.score}%` : '—'}</td>
                      <td>{s.day || '—'}</td>
                    </tr>
                  ))}
                  {scores.length === 0 && <tr><td colSpan={6} className="text-center text-slate-400 py-8">Belum ada log aktivitas.</td></tr>}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    };

    const MusyrifDashboard = ({ leaderboard }) => {
      const list = Array.isArray(leaderboard) ? leaderboard : [];
      const active = list.filter((e) => e && e.updatedAt > Date.now() - 7 * 86400000).length;
      const avgProgress = list.length ? Math.round(list.reduce((a, b) => a + (b.completedDays || 0), 0) / list.length / 30 * 100) : 0;
      return (
        <div className="space-y-6">
          <h2 className="text-2xl font-black flex items-center gap-2"><Shield size={24} className="text-primary" /> Dashboard Musyrif</h2>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            {[
              { l: 'Santri Aktif', v: active, i: Users },
              { l: 'Tidak Aktif', v: Math.max(0, list.length - active), i: User },
              { l: 'Progress Rata-rata', v: avgProgress + '%', i: BarChart },
              { l: 'Total Santri', v: list.length, i: Crown },
            ].map((s, i) => (
              <div key={i} className="card-premium p-5">
                <s.i size={20} className="text-primary mb-2" />
                <p className="text-[10px] font-black text-slate-400 uppercase">{s.l}</p>
                <p className="text-2xl font-black text-slate-900">{s.v}</p>
              </div>
            ))}
          </div>
          <div className="card-premium p-6">
            <h3 className="font-black mb-4">Ranking Kelas</h3>
            {list.slice(0, 10).map((e, i) => (
              <div key={i} className="flex justify-between py-2 border-b border-slate-50 text-sm">
                <span className="font-bold">{e?.name || '—'} <span className="text-slate-400">({e?.kelas || 'Umum'})</span></span>
                <span className="font-black text-primary">{e?.xp || 0} XP</span>
              </div>
            ))}
            {list.length === 0 && <p className="text-slate-400 text-sm text-center py-4">Belum ada data santri.</p>}
          </div>
        </div>
      );
    };

    const syncProgressToFirestore = async (database, id, name, progressData) => {
      if (!database) return;
      try {
        const safeName = name.replace(/[/.#$\[\]]/g, '_');
        const docRef = database.collection('artifacts').doc(id).collection('public').doc('data').collection('user_progress').doc(safeName);
        await docRef.set({
          name,
          progress: progressData,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      } catch (e) {
        console.warn('Progress sync failed', e);
      }
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('alfal_session_name'));
      const [participantName, setParticipantName] = useState(() => localStorage.getItem('alfal_session_name') || "");
      const [inputToken, setInputToken] = useState("");
      const [loginError, setLoginError] = useState("");
      
      const [activeTab, setActiveTab] = useState('home');
      const [selectedDay, setSelectedDay] = useState(1);
      const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth > 768);
      
      const [quizStep, setQuizStep] = useState(0); 
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [score, setScore] = useState(0);
      const [myScores, setMyScores] = useState([]);

      const [scrambledLetters, setScrambledLetters] = useState([]);
      const [currentGuess, setCurrentGuess] = useState([]);
      const [availableVoices, setAvailableVoices] = useState([]);
      const [isProcessing, setIsProcessing] = useState(false);
      const [mcAnswerState, setMcAnswerState] = useState(null);

      const [rekamStep, setRekamStep] = useState(0); 
      const [voiceQuizList, setVoiceQuizList] = useState([]);
      const [pelafalanList, setPelafalanList] = useState([]);
      const [currentVoiceQuestion, setCurrentVoiceQuestion] = useState(0);
      const [currentPelafalanQuestion, setCurrentPelafalanQuestion] = useState(0);
      const [hafalanSessionScores, setHafalanSessionScores] = useState([]);
      const [pelafalanSessionScores, setPelafalanSessionScores] = useState([]);

      const [isRecording, setIsRecording] = useState(false);
      const [audioUrl, setAudioUrl] = useState(null);
      const [audioBase64, setAudioBase64] = useState("");
      const [isAudioSent, setIsAudioSent] = useState(false);
      const [showIosHint, setShowIosHint] = useState(false);
      const [hasShownIosHint, setHasShownIosHint] = useState(false);
      const [progress, setProgress] = useState(() => {
        try {
          const name = localStorage.getItem('alfal_session_name');
          return name ? loadProgress(name) : getEmptyProgress();
        } catch (e) {
          console.error('[Alfal] Init progress gagal:', e);
          return getEmptyProgress();
        }
      });
      const [showLockModal, setShowLockModal] = useState(false);
      const [toast, setToast] = useState(null);
      const [printCertData, setPrintCertData] = useState(null);
      const [profile, setProfile] = useState(() => {
        try {
          const name = localStorage.getItem('alfal_session_name');
          return name ? loadSafeProfile(name) : AE().createEmptyProfile();
        } catch (e) {
          console.error('[Alfal] Init profile gagal:', e);
          return AE().createEmptyProfile();
        }
      });
      const [lbFilter, setLbFilter] = useState('all');
      const [lbFilterValue, setLbFilterValue] = useState('');
      const [premiumQuestions, setPremiumQuestions] = useState([]);
      const [premiumQIndex, setPremiumQIndex] = useState(0);
      const [premiumScore, setPremiumScore] = useState(0);
      const [typingAnswer, setTypingAnswer] = useState('');
      const [speechState, setSpeechState] = useState('idle');
      const [isMusyrif, setIsMusyrif] = useState(() => localStorage.getItem('alfal_role') === 'musyrif');

      useEffect(() => {
        if (isLoggedIn) {
          setIsMusyrif(localStorage.getItem('alfal_role') === 'musyrif');
        }
      }, [isLoggedIn]);
      const [pageLoading, setPageLoading] = useState(false);
      const speechRef = useRef(null);
      const studyTimerRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const toastTimerRef = useRef(null);

      useEffect(() => {
        seedDemoGraduateSantri();
      }, []);

      useEffect(() => {
        const clearPrint = () => setPrintCertData(null);
        window.addEventListener('afterprint', clearPrint);
        return () => window.removeEventListener('afterprint', clearPrint);
      }, []);

      const handlePrintCertificate = (cert, name) => {
        if (!cert) return;
        const enriched = enrichCertForView(cert);
        const printName = name || cert.name || participantName;
        const payload = { cert: enriched, name: printName };
        if (ReactDOM.flushSync) {
          ReactDOM.flushSync(() => setPrintCertData(payload));
        } else {
          setPrintCertData(payload);
        }
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            window.print();
          });
        });
      };

      const fillDemoLogin = () => {
        seedDemoGraduateSantri(true);
        const name = DEMO_SANTRI_NAME;
        const token = VALID_TOKEN;
        setParticipantName(name);
        setInputToken(token);
        setLoginError('');
        localStorage.removeItem('alfal_role');
        setIsMusyrif(false);
        localStorage.setItem('alfal_session_name', name);
        const initialProgress = loadProgress(name);
        const initialProfile = loadSafeProfile(name);
        setProgress(initialProgress);
        setProfile(initialProfile);
        saveProgressLocal(name, initialProgress);
        AE().saveProfile(name, initialProfile, initialProgress);
        AE().syncProfileFirestore(db, appId, name, initialProfile);
        if (db) AE().syncDeviceFirestore(db, appId, name, 'santri');
        setIsLoggedIn(true);
        setActiveTab('certificate');
        showToast('Santri Demo siap — preview sertifikat A4');
      };

      const showToast = (message) => {
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        setToast(message);
        toastTimerRef.current = setTimeout(() => setToast(null), 3000);
      };

      const saveProfileState = (nextProfile, nextProgress) => {
        try {
          const p = progress || getEmptyProgress();
          const pr = nextProgress || p;
          AE().saveProfile(participantName, nextProfile, pr);
          AE().syncProfileFirestore(db, appId, participantName, nextProfile);
          setProfile({ ...nextProfile });
        } catch (e) {
          console.error('[Alfal] saveProfileState gagal:', e);
          setProfile({ ...(nextProfile || AE().createEmptyProfile()) });
        }
      };

      const recordScoreFirestore = async (name, scoreValue, category, day, type) => {
        if (!db || !name) return;
        try {
          const scoresCol = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('scores');
          await scoresCol.add({
            name,
            score: scoreValue,
            category,
            day,
            type: type || 'Kuis',
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          });
        } catch (e) {
          console.warn('[Alfal] recordScoreFirestore gagal:', e);
        }
      };

      const awardXP = (amount, reason) => {
        setProfile((prev) => {
          let next = AE().addXP({ ...prev }, amount, reason);
          const stats = AE().getStats(progress, next, myScores);
          next = AE().checkAchievements(next, stats);
          saveProfileState(next);
          return next;
        });
      };

      const touchStudySession = () => {
        setProfile((prev) => {
          let next = { ...prev };
          const streakResult = AE().updateDailyStreak(next);
          next = streakResult.profile;
          if (streakResult.broken && !next.streakBrokenNotified) {
            next.streakBrokenNotified = true;
            showToast('Streak Anda terputus. Ayo mulai lagi hari ini.');
          }
          next = AE().resetDailyChallenge(next);
          saveProfileState(next);
          return next;
        });
      };

      const markWordLearned = (day, wordId, correct = true) => {
        touchStudySession();
        setProgress((prev) => {
          const base = prev[day] || createEmptyDayProgress();
          const next = { ...prev, [day]: { ...createEmptyDayProgress(), ...base } };
          const wl = [...(next[day].wordsLearned || [])];
          const isNew = !wl.includes(wordId);
          if (isNew) wl.push(wordId);
          next[day].wordsLearned = wl;
          const wasComplete = next[day].completed;
          updateDayProgress(next[day]);
          if (participantName) {
            try {
              saveProgressLocal(participantName, next);
              syncProgressToFirestore(db, appId, participantName, next);
            } catch (e) {
              console.error('[Alfal] Simpan progress kata gagal:', e);
            }
          }
          if (isNew) {
            awardXP(AE().CONFIG.XP_WORD, 'word');
            setProfile((p) => {
              let np = AE().updateDailyChallenge({ ...p }, 'word');
              saveProfileState(np, next);
              return np;
            });
          }
          if (!wasComplete && next[day].completed) awardXP(AE().CONFIG.XP_DAY, 'day');
          return next;
        });
        setProfile((p) => AE().recordSRS({ ...p }, day, wordId, correct));
      };

      const markDayFromQuiz = (day, scoreVal) => {
        touchStudySession();
        setProgress((prev) => {
          const base = prev[day] || createEmptyDayProgress();
          const next = { ...prev, [day]: { ...createEmptyDayProgress(), ...base } };
          const wasComplete = next[day].completed;
          next[day].quizScore = Math.max(next[day].quizScore || 0, scoreVal);
          updateDayProgress(next[day]);
          if (participantName) {
            try {
              saveProgressLocal(participantName, next);
              syncProgressToFirestore(db, appId, participantName, next);
            } catch (e) {
              console.error('[Alfal] Simpan progress quiz gagal:', e);
            }
          }
          if (!wasComplete && next[day].completed) awardXP(AE().CONFIG.XP_DAY, 'day');
          return next;
        });
        setProfile((p) => {
          let np = { ...p };
          np.quizStats = np.quizStats || { perfect: 0, total: 0, best: 0 };
          np.quizStats.total++;
          if (scoreVal === 100) np.quizStats.perfect++;
          np.quizStats.best = Math.max(np.quizStats.best || 0, scoreVal);
          np = AE().updateDailyChallenge(np, 'quiz');
          awardXP(AE().CONFIG.XP_QUIZ, 'quiz');
          np = AE().checkAchievements(np, AE().getStats(progress, np, myScores));
          saveProfileState(np);
          return np;
        });
      };

      const markHafalanDone = (day, avgScore = 0) => {
        touchStudySession();
        setProgress((prev) => {
          const base = prev[day] || createEmptyDayProgress();
          const next = { ...prev, [day]: { ...createEmptyDayProgress(), ...base, hafalanDone: true } };
          const wasComplete = next[day].completed;
          updateDayProgress(next[day]);
          if (participantName) {
            try {
              saveProgressLocal(participantName, next);
              syncProgressToFirestore(db, appId, participantName, next);
            } catch (e) {
              console.error('[Alfal] Simpan hafalan gagal:', e);
            }
          }
          if (!wasComplete && next[day].completed) awardXP(AE().CONFIG.XP_DAY, 'day');
          return next;
        });
        if (avgScore >= 70) awardXP(15, 'hafalan');
        const dayMeta = getDayMufrodat(day);
        recordScoreFirestore(participantName, avgScore, `Hafalan Hari ${day}: ${dayMeta.title}`, day, 'Hafalan');
      };

      const markPelafalanDone = (day, avgScore = 0) => {
        touchStudySession();
        setProgress((prev) => {
          const base = prev[day] || createEmptyDayProgress();

        try {

            return;
          }

          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          
          let options = {};
          if (typeof MediaRecorder !== 'undefined' && typeof MediaRecorder.isTypeSupported === 'function') {
            if (MediaRecorder.isTypeSupported('audio/webm')) {
              options = { mimeType: 'audio/webm' };
            } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
              options = { mimeType: 'audio/mp4' };
            } else if (MediaRecorder.isTypeSupported('audio/aac')) {
              options = { mimeType: 'audio/aac' };
            }
          }

          let mediaRecorder;
          try {
            mediaRecorder = new MediaRecorder(stream, options);
          } catch (e) {
            mediaRecorder = new MediaRecorder(stream);
          }

          mediaRecorderRef.current = mediaRecorder;
          audioChunksRef.current = [];

          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              audioChunksRef.current.push(event.data);
            }
          };

          mediaRecorder.onstop = () => {
            const actualMimeType = mediaRecorder.mimeType || 'audio/mp4';
            const audioBlob = new Blob(audioChunksRef.current, { type: actualMimeType });
            const url = URL.createObjectURL(audioBlob);
            setAudioUrl(url);
            
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
              const base64data = reader.result.split(',')[1]; 
              setAudioBase64(base64data);
            };

            stream.getTracks().forEach(track => track.stop());
          };

          mediaRecorder.start();
          setIsRecording(true);
        } catch (err) {
          console.error("Gagal mengakses mikrofon:", err);
          if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
              alert("Akses mikrofon ditolak!\n\nMohon izinkan akses mikrofon di pengaturan browser Anda (ketuk ikon gembok 🔒 di samping link web untuk mengubah izin).");
