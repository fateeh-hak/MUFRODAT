  <style>
    :root {
      --primary: #059669;
      --secondary: #10B981;
      --accent: #F59E0B;
      --bg: #F8FAFC;
      --card: #FFFFFF;
    }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      -webkit-tap-highlight-color: transparent;
    }
    .font-arabic { font-family: 'Amiri', serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.6); }
    .card-premium { background: var(--card); border-radius: 24px; box-shadow: 0 4px 24px -4px rgba(5,150,105,0.08), 0 2px 8px rgba(0,0,0,0.04); }
    .animate-unlock { animation: unlockPulse 0.6s ease-out; }
    @keyframes unlockPulse { 0% { transform: scale(0.9); opacity: 0.5; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes flip { 0% { transform: rotateY(0); } 100% { transform: rotateY(180deg); } }
    .flip-card { perspective: 1000px; }
    .flip-inner { transition: transform 0.5s; transform-style: preserve-3d; }
    .flip-inner.flipped { transform: rotateY(180deg); }
    .flip-front, .flip-back { backface-visibility: hidden; }
    .flip-back { transform: rotateY(180deg); }
    .journey-line { width: 3px; background: linear-gradient(to bottom, #10B981, #059669); margin: 0 auto; min-height: 24px; }
    .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    .print-only { display: none; }

    /* === Campaign Map (Mockup) === */
    .app-shell { height: 100vh; overflow: hidden; }
    .nav-sidebar {
      width: 280px;
      min-width: 280px;
      background: #0F172A;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .nav-sidebar.collapsed { width: 72px; min-width: 72px; }
    .nav-sidebar-item {
      color: rgba(255,255,255,0.75);
      transition: all 0.2s ease;
    }
    .nav-sidebar-item:hover {
      background: rgba(16, 185, 129, 0.15);
      color: #10B981;
    }
    .nav-sidebar-item.active {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.35);
    }
    .journey-layout {
      display: flex;
      flex: 1;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }
    .campaign-map-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #0b1f2a;
    }
    .campaign-map-header {
      flex-shrink: 0;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
    }
    .campaign-badge {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 800;
      color: #e2e8f0;
    }
    .campaign-map-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    .campaign-map-canvas {
      position: relative;
      width: 100%;
      min-height: 4000px;
      background:
        radial-gradient(ellipse 120% 80% at 50% 100%, rgba(6, 78, 59, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse 80% 50% at 10% 20%, rgba(30, 58, 138, 0.25) 0%, transparent 40%),
        radial-gradient(ellipse 60% 40% at 90% 60%, rgba(147, 51, 234, 0.12) 0%, transparent 35%),
        linear-gradient(180deg, #0c4a6e 0%, #0e7490 15%, #155e75 35%, #134e4a 55%, #064e3b 75%, #022c22 100%);
    }
    .campaign-ocean-wave {
      position: absolute;
      left: 0; right: 0;
      height: 80px;
      background: linear-gradient(180deg, transparent, rgba(14, 116, 144, 0.3));
      animation: oceanWave 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes oceanWave {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-8px); opacity: 0.7; }
    }
    .campaign-fog {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .campaign-cloud {
      position: absolute;
      font-size: 3rem;
      opacity: 0.25;
      animation: cloudDrift 35s linear infinite;
      pointer-events: none;
      filter: blur(1px);
    }
    @keyframes cloudDrift {
      0% { transform: translateX(-20%) translateY(0); }
      50% { transform: translateX(20%) translateY(-12px); }
      100% { transform: translateX(120%) translateY(0); }
    }
    .campaign-path-svg {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    .campaign-path-line {
      fill: none;
      stroke: url(#pathGrad);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 14 10;
      filter: drop-shadow(0 0 8px rgba(52, 211, 153, 0.8));
      animation: pathGlow 2.5s ease-in-out infinite;
    }
    @keyframes pathGlow {
      0%, 100% { opacity: 0.65; stroke-width: 5; }
      50% { opacity: 1; stroke-width: 7; }
    }
    .campaign-node-wrap {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 5;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .campaign-island {
      position: absolute;
      bottom: -8px;
      width: 180px;
      height: 56px;
      background: radial-gradient(ellipse 80% 100% at 50% 100%, #166534 0%, #14532d 40%, #3f6212 70%, transparent 100%);
      border-radius: 50%;
      box-shadow: inset 0 -4px 12px rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.25);
      animation: islandFloat 4s ease-in-out infinite;
    }
    .campaign-island-rock {
      position: absolute;
      width: 12px; height: 10px;
      background: #57534e;
      border-radius: 40%;
      bottom: 18px;
    }
    .campaign-island-tree {
      position: absolute;
      bottom: 28px;
      font-size: 1.25rem;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
    }
    @keyframes islandFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .campaign-node-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      z-index: 3;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .campaign-node-btn:hover:not(:disabled) { transform: scale(1.08); }
    .campaign-node-btn:disabled { cursor: not-allowed; }
    .campaign-node--completed .campaign-node-btn {
      background: linear-gradient(145deg, #10B981, #047857);
      box-shadow: 0 0 28px rgba(16, 185, 129, 0.55);
    }
    .campaign-node--active .campaign-node-btn {
      background: linear-gradient(145deg, #3B82F6, #2563EB);
      animation: nodePulseBlue 2s ease-in-out infinite;
      border-color: rgba(147, 197, 253, 0.9);
    }
    @keyframes nodePulseBlue {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5), 0 8px 32px rgba(59, 130, 246, 0.4); }
      50% { box-shadow: 0 0 0 14px rgba(59, 130, 246, 0), 0 12px 40px rgba(59, 130, 246, 0.5); }
    }
    .campaign-node--locked .campaign-node-btn {
      background: linear-gradient(145deg, #64748B, #475569);
      opacity: 0.6;
    }
    .campaign-node--quiz .campaign-node-btn {
      background: linear-gradient(145deg, #9333EA, #7E22CE);
      border-color: rgba(233, 213, 255, 0.5);
      box-shadow: 0 0 24px rgba(147, 51, 234, 0.45);
    }
    .campaign-node--start .campaign-node-btn {
      width: 130px; height: 90px;
      border-radius: 20px;
      background: linear-gradient(145deg, #1d4ed8, #1e3a8a);
    }
    .campaign-node--finish .campaign-node-btn {
      background: linear-gradient(145deg, #f59e0b, #d97706);
      box-shadow: 0 0 32px rgba(245, 158, 11, 0.5);
    }
    .campaign-avatar {
      position: absolute;
      top: -58px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      animation: avatarFloat 2.5s ease-in-out infinite;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }
    @keyframes avatarFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-8px); }
    }
    .campaign-node-label {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 800;
      color: #ecfdf5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .campaign-stars { display: flex; gap: 3px; margin-top: 4px; }
    .campaign-stars .fa-star { font-size: 11px; }
    .campaign-stars .lit { color: #fbbf24; filter: drop-shadow(0 0 4px rgba(251,191,36,0.8)); }
    .campaign-stars .dim { color: #475569; }
    .campaign-progress-panel {
      width: 320px;
      min-width: 320px;
      background: #0F172A;
      border-left: 1px solid rgba(255,255,255,0.08);
      overflow-y: auto;
      flex-shrink: 0;
    }
    .panel-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      backdrop-filter: blur(12px);
    }
    .progress-ring-circle {
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
    .campaign-footer-hint {
      position: sticky;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 10px 20px;
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      max-width: 90%;
      text-align: center;
    }
    .mobile-panel-sheet {
      display: none;
    }
    @media (max-width: 1023px) {
      .campaign-progress-panel { display: none; }
      .mobile-panel-sheet {
        display: block;
        position: fixed;
        bottom: 72px;
        left: 0; right: 0;
        max-height: 42vh;
        overflow-y: auto;
        background: #0F172A;
        border-top: 1px solid rgba(255,255,255,0.1);
        z-index: 40;
        padding: 12px;
        box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
      }
      .nav-sidebar { display: none; }
      .nav-sidebar.tablet-show { display: flex; width: 72px; min-width: 72px; }
    }
    @media (min-width: 768px) and (max-width: 1023px) {
      .nav-sidebar.tablet-show { display: flex; }
    }
  </style>

      19: {

      23: {

    const TOTAL_DAYS = Object.keys(MUFRODAT_DB).length;

    const getProgressKey = (name) => `alfal_progress_${name}`;

    const createEmptyDayProgress = () => ({
      completed: false,
      completedAt: null,
      wordsLearned: [],
      quizScore: 0,
      progress: 0
    });

    const safeParseJSON = (raw, fallback) => {
      try {
        if (raw == null || raw === '') return fallback;
        const parsed = JSON.parse(raw);
        return parsed == null ? fallback : parsed;
      } catch (e) {
        console.error('[Alfal] JSON parse gagal:', e);
        return fallback;
      }
    };

    const asArray = (val) => (Array.isArray(val) ? val : val != null && val !== '' ? [val] : []);

    const normalizeDayProgress = (raw) => {
      const base = { ...createEmptyDayProgress(), ...(raw && typeof raw === 'object' ? raw : {}) };
      base.wordsLearned = asArray(base.wordsLearned).filter((id) => id != null);
      base.quizScore = Number(base.quizScore) || 0;
      base.completed = !!base.completed;
      return updateDayProgress(base);
    };

    const normalizeProgress = (input) => {
      const saved = input && typeof input === 'object' ? input : {};
      const progress = {};
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        progress[d] = normalizeDayProgress(saved[d]);
      }
      return progress;
    };

    const getEmptyProgress = () => normalizeProgress({});

    const loadProgress = (name) => {
      try {
        const raw = localStorage.getItem(getProgressKey(name));
        return normalizeProgress(safeParseJSON(raw, {}));
      } catch (e) {
        console.error('[Alfal] loadProgress gagal:', e);
        return getEmptyProgress();
      }
    };

    const saveProgressLocal = (name, progress) => {
      localStorage.setItem(getProgressKey(name), JSON.stringify(progress));
    };

    const isDayUnlocked = (day, progress) => {
      if (!day || day === 1) return true;
      const prog = progress || {};
      return prog[day - 1]?.completed === true;
    };

    const updateDayProgress = (dayData) => {
      const words = dayData.wordsLearned?.length || 0;
      const wordPct = Math.min(words * 10, 100);
      const quizPct = dayData.quizScore || 0;
      dayData.progress = Math.max(wordPct, quizPct);
      if (words >= 10 || dayData.quizScore >= 80) {
        dayData.completed = true;
        dayData.progress = 100;
        if (!dayData.completedAt) dayData.completedAt = Date.now();
      }
      return dayData;
    };

    const mergeScoresIntoProgress = (progress, scores) => {
      const next = { ...progress };
      scores.forEach((s) => {
        const day = Number(s.day);
        if (!day || !next[day]) return;
        next[day] = { ...next[day] };
        next[day].quizScore = Math.max(next[day].quizScore || 0, s.score || 0);
        updateDayProgress(next[day]);
        if (s.score === 100 && !next[day].completedAt) {
          next[day].completedAt = s.timestamp || Date.now();
        }
      });
      return next;
    };

    const mergeProgressRecords = (local, remote) => {
      const merged = { ...local };
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        const l = local[d] || createEmptyDayProgress();
        const r = remote?.[d] || createEmptyDayProgress();
        const words = [...new Set([...(l.wordsLearned || []), ...(r.wordsLearned || [])])];
        merged[d] = {
          ...createEmptyDayProgress(),
          ...l,
          ...r,
          wordsLearned: words,
          quizScore: Math.max(l.quizScore || 0, r.quizScore || 0),
        };
        updateDayProgress(merged[d]);
        merged[d].completedAt = l.completedAt || r.completedAt || merged[d].completedAt;
      }
      return merged;
    };

    const getConsecutiveStreak = (progress) => {
      let streak = 0;
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        if (progress[d]?.completed) streak++;
        else break;
      }
      return streak;
    };

    const getStreakBadge = (streak) => {
      if (streak >= 30) return { label: 'Gold', emoji: '🥇', color: 'bg-yellow-100 text-yellow-700 border-yellow-200' };
      if (streak >= 7) return { label: 'Silver', emoji: '🥈', color: 'bg-slate-100 text-slate-600 border-slate-200' };
      if (streak >= 1) return { label: 'Bronze', emoji: '🥉', color: 'bg-orange-100 text-orange-700 border-orange-200' };
      return null;
    };

    const getDayBadge = (dayNum, progress, selectedDay) => {
      if (progress[dayNum]?.completed) return { text: '✅ Selesai', className: 'bg-emerald-100 text-emerald-700' };
      if (!isDayUnlocked(dayNum, progress)) return { text: '🔒 Terkunci', className: 'bg-slate-200 text-slate-500' };
      const firstOpen = Array.from({ length: TOTAL_DAYS }, (_, i) => i + 1).find(
        (d) => isDayUnlocked(d, progress) && !progress[d]?.completed
      );
      if (dayNum === firstOpen || dayNum === selectedDay) {
        return { text: '▶ Sedang Dipelajari', className: 'bg-blue-100 text-blue-700' };
      }
      return { text: '▶ Terbuka', className: 'bg-emerald-50 text-emerald-600' };
    };

    const countCompletedDays = (progress) => {
      const prog = progress || {};
      return Array.from({ length: TOTAL_DAYS }, (_, i) => i + 1).filter((d) => prog[d]?.completed).length;
    };

    const loadSafeProfile = (name) => {
      try {
        if (!name) return AE().createEmptyProfile();
        const raw = AE().loadProfile(name);
        const empty = AE().createEmptyProfile();
        return {
          ...empty,
          ...(raw && typeof raw === 'object' ? raw : {}),
          achievements: Array.isArray(raw?.achievements) ? raw.achievements : [],
          srs: raw?.srs && typeof raw.srs === 'object' ? raw.srs : {},
          dailyChallenge: raw?.dailyChallenge && typeof raw.dailyChallenge === 'object'
            ? raw.dailyChallenge
            : empty.dailyChallenge,
          quizStats: raw?.quizStats && typeof raw.quizStats === 'object'
            ? { ...empty.quizStats, ...raw.quizStats }
            : empty.quizStats,
        };
      } catch (e) {
        console.error('[Alfal] loadSafeProfile gagal:', e);
        return AE().createEmptyProfile();
      }
    };

    const loadLocalHistory = (name) => {
      if (!name) return [];
      const raw = localStorage.getItem(`alfal_history_${name}`);
      const parsed = safeParseJSON(raw, []);
      return Array.isArray(parsed) ? parsed : [];
    };

    const getDayMufrodat = (day) => {
      const d = Number(day);
      if (MUFRODAT_DB[d]?.data?.length) return MUFRODAT_DB[d];
      console.warn('[Alfal] Data hari tidak ditemukan:', day, '— fallback Hari 1');
      return MUFRODAT_DB[1] || { title: 'Mufrodat', titleAr: 'مُفْرَدَات', data: [] };
    };

    const ENGINE_STUB = {
      CONFIG: { XP_WORD: 5, XP_DAY: 50, XP_QUIZ: 100, XP_CHALLENGE: 150, ADMIN_TOKEN: 'MUSYRIF', STUDENT_TOKEN: '09876' },
      AVATARS: [{ id: 'santri', emoji: '👦', label: 'Santri' }],
      ACHIEVEMENTS: [],
      createEmptyProfile: () => ({
        xp: 0, achievements: [], avatar: 'santri', kelas: '', angkatan: '', dailyStreak: 0,
        dailyChallenge: { date: null, words: 0, quiz: false, minutes: 0, completed: false, claimed: false },
        srs: {}, quizStats: { perfect: 0, total: 0, best: 0 }, studyMinutesToday: 0,
      }),
      loadProfile: function () { return this.createEmptyProfile(); },
      saveProfile: (_, p) => p,
      syncProfileFirestore: async () => {},
      addXP: (p) => p || {},
      getLevelInfo: (xp) => ({ level: 1, title: 'Santri Baru', progress: 0, xp: xp || 0, next: null }),
      getStats: () => ({ totalWords: 0, completedDays: 0, dailyStreak: 0, perfectQuizzes: 0, quizzesPassed: 0, xp: 0 }),
      checkAchievements: (p) => p || {},
      updateDailyStreak: (p) => ({ profile: p || {}, broken: false }),
      resetDailyChallenge: (p) => p || {},
      updateDailyChallenge: (p) => p || {},
      recordSRS: (p) => p || {},
      buildJourneyNodes: () => [{ id: 'start', type: 'start', label: 'Start', emoji: '🏁' }],
      getNodeStatus: () => 'locked',
      getStreakDisplay: () => 'Mulai streak hari ini!',
      getLeaderboard: () => [],
      getReviewList: () => ({ due: [], failed: [], never: [], smart: [] }),
      generateCertificate: () => null,
      generateQuizQuestions: () => [],
    };

    const getEngine = () => {
      try {
        if (window.AlfalEngine) return window.AlfalEngine;
        console.error('[Alfal] AlfalEngine tidak dimuat — mode fallback aktif');
        return ENGINE_STUB;
      } catch (e) {
        console.error('[Alfal] getEngine error:', e);
        return ENGINE_STUB;
      }
    };

    const AE = getEngine;

    // --- Global Error Boundary ---
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, info) {
        console.error('[Alfal ErrorBoundary]', this.props.name || 'unknown', error, info?.componentStack);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="card-premium p-8 m-4 text-center border-2 border-red-100 bg-red-50/50">
              <AlertCircle size={40} className="text-red-400 mx-auto mb-4" />
              <h3 className="font-black text-slate-900 mb-2">Terjadi kesalahan pada modul ini</h3>
              <p className="text-sm text-slate-500 mb-1">{this.props.name ? `Modul: ${this.props.name}` : ''}</p>
              <p className="text-xs text-slate-400 mb-4">Aplikasi tetap berjalan. Coba muat ulang modul ini.</p>
              <button
                onClick={() => this.setState({ hasError: false, error: null })}
                className="px-6 py-3 bg-primary text-white rounded-xl font-black text-sm hover:bg-emerald-700"
              >
                Coba Lagi
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const SafeModule = ({ name, children }) => (
      <ErrorBoundary name={name}>{children}</ErrorBoundary>
    );

    // --- Platform UI Components ---
    const XPBar = React.memo(({ profile }) => {
      const safeProfile = profile || {};
      const info = AE().getLevelInfo(safeProfile.xp || 0);
      const pct = Number.isFinite(info.progress) ? info.progress : 0;
      return (
        <div className="card-premium p-4 md:p-5">
          <div className="flex justify-between items-center mb-2">
            <div className="flex items-center gap-2">
              <Zap size={18} className="text-accent" />
              <span className="text-xs font-black text-slate-500 uppercase tracking-widest">Level {info.level || 1}</span>
            </div>
            <span className="text-sm font-black text-primary">{safeProfile.xp || 0} XP</span>
          </div>
          <p className="text-sm font-bold text-slate-800 mb-2">{info.title || 'Santri Baru'}</p>
          <div className="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
            <div className="h-full bg-gradient-to-r from-primary to-secondary transition-all duration-500 rounded-full" style={{ width: `${pct}%` }} />
          </div>
          {info.next && <p className="text-[10px] text-slate-400 mt-1 font-medium">{(info.next.minXp || 0) - (info.xp || 0)} XP menuju Level {info.next.level}</p>}
        </div>
      );
    });

    const CAMPAIGN_GAP = 128;
    const CAMPAIGN_W = 400;

    const buildCampaignPositions = (count) =>
      Array.from({ length: count }, (_, i) => ({
        px: i % 2 === 0 ? CAMPAIGN_W * 0.28 : CAMPAIGN_W * 0.72,
        py: 150 + i * CAMPAIGN_GAP,
        pctX: i % 2 === 0 ? 28 : 72,
      }));

    const buildCampaignPath = (positions) => {
      if (positions.length < 2) return '';
      let d = `M ${positions[0].px} ${positions[0].py}`;
      for (let i = 1; i < positions.length; i++) {
        const a = positions[i - 1];
        const b = positions[i];
        const midY = (a.py + b.py) / 2;
        d += ` C ${a.px} ${midY}, ${b.px} ${midY}, ${b.px} ${b.py}`;
      }
      return d;
    };

    const ProgressRing = ({ pct, size = 96, stroke = 8, ringId = 'ringGrad' }) => {
      const r = (size - stroke) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (Math.min(100, Math.max(0, pct)) / 100) * circ;
      return (
        <svg width={size} height={size} className="mx-auto">
          <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={stroke} />
          <circle
            className="progress-ring-circle"
            cx={size / 2}
            cy={size / 2}
            r={r}
            fill="none"
            stroke={`url(#${ringId})`}
            strokeWidth={stroke}
            strokeDasharray={circ}
            strokeDashoffset={offset}
            strokeLinecap="round"
          />
          <defs>
            <linearGradient id={ringId} x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="#10b981" />
              <stop offset="100%" stopColor="#fbbf24" />
            </linearGradient>
          </defs>
        </svg>
      );
    };

    const CampaignMapNode = ({ node, status, pos, showAvatar, avatarEmoji, onClick, disabled }) => {
      const isLocked = status === 'locked';
      const isActive = status === 'active';
      const isDone = status === 'completed';
      const isQuiz = node.type === 'quiz';
      const isStart = node.type === 'start';
      const isFinish = node.type === 'finish';
      let icon = '📚';
      if (isStart) icon = '🏰';
      else if (isFinish) icon = '🎓';
      else if (isQuiz) icon = '🏆';
      else if (isLocked) icon = '🔒';
      else if (isDone) icon = '✅';
      else if (isActive) icon = '📖';

      const statusClass = isQuiz && !isLocked ? 'campaign-node--quiz' : `campaign-node--${status}`;
      const stars = (isDone || isLocked) && !isStart && !isFinish ? (
        <div className="campaign-stars">
          {[1, 2, 3].map((s) => (
            <i key={s} className={`fa-solid fa-star ${isDone && s <= (isQuiz ? 2 : 3) ? 'lit' : 'dim'}`} />
          ))}
        </div>
      ) : null;

      return (
        <div
          className={`campaign-node-wrap campaign-node ${statusClass} ${isStart ? 'campaign-node--start' : ''} ${isFinish ? 'campaign-node--finish' : ''}`}
          style={{ left: `${pos.pctX}%`, top: pos.py }}
          data-active={isActive ? 'true' : 'false'}
        >
          <div className="campaign-island" aria-hidden="true">
            <span className="campaign-island-rock" style={{ left: '25%' }} />
            <span className="campaign-island-rock" style={{ right: '30%', width: 10, height: 8 }} />
            <span className="campaign-island-tree" style={{ left: '55%' }}>🌲</span>
            <span className="campaign-island-tree" style={{ left: '15%', fontSize: '1rem' }}>🌿</span>
          </div>
          {showAvatar && (
            <div className="campaign-avatar">
              <span className="text-4xl leading-none block">{avatarEmoji}</span>
            </div>
          )}
          <button
            type="button"
            disabled={node.type === 'start' || node.type === 'finish'}
            onClick={onClick}
            className="campaign-node-btn"
          >
            <span>{icon}</span>
          </button>
          <p className="campaign-node-label">{node.label}</p>
          <p className="text-[9px] font-bold uppercase text-slate-400">
            {isLocked ? 'Terkunci' : isDone ? 'Selesai' : isActive ? 'Aktif' : isStart ? 'Mulai Perjalanan' : isFinish ? 'Goal' : ''}
          </p>
          {stars}
        </div>
      );
    };

    const JourneyProgressPanel = ({ profile, playerName, progress, selectedDay, totalDays, focusDay }) => {
      const safeProfile = profile || {};
      const safeProgress = progress || {};
      const total = totalDays || TOTAL_DAYS;
      const completedCount = countCompletedDays(safeProgress);
      const overallPct = Math.round((completedCount / total) * 100);
      const levelInfo = AE().getLevelInfo(safeProfile.xp || 0);
      const avatars = AE().AVATARS || [];
      const avatarEmoji = avatars.find((a) => a.id === safeProfile.avatar)?.emoji || '👦';
      const day = focusDay || selectedDay || 1;
      const dayProg = safeProgress[day] || createEmptyDayProgress();
      const wordsCount = dayProg.wordsLearned?.length || 0;
      const materiDone = wordsCount >= 10;
      const hafalanDone = wordsCount >= 10;
      const quizDone = (dayProg.quizScore || 0) >= 80;
      const tahapPct = Math.round(
        (Math.min(wordsCount / 10, 1) * 33.33) +
        (Math.min(wordsCount / 10, 1) * 33.33) +
        (quizDone ? 33.34 : 0)
      );
      const nextDay = Array.from({ length: total }, (_, i) => i + 1).find((d) => !safeProgress[d]?.completed);
      const nextRewardXp = AE().CONFIG?.XP_DAY || 50;

      return (
        <div className="space-y-3 p-4">
          <div className="panel-card p-4 flex items-center gap-3">
            <span className="text-4xl">{avatarEmoji}</span>
            <div className="min-w-0">
              <p className="font-black text-white text-sm truncate">{playerName || 'Santri'}</p>
              <p className="text-[10px] text-emerald-400 font-bold">Level {levelInfo.level || 1}</p>
              <p className="text-[10px] text-amber-400 font-bold">{safeProfile.xp || 0} XP</p>
            </div>
          </div>

          <div className="grid grid-cols-3 gap-2">
            {[
              { icon: Fire, label: 'Streak', val: `${safeProfile.dailyStreak || 0} Hari`, color: 'text-orange-400' },
              { icon: Star, label: 'XP', val: safeProfile.xp || 0, color: 'text-amber-400' },
              { icon: Shield, label: 'Level', val: levelInfo.level || 1, color: 'text-emerald-400' },
            ].map((s, i) => (
              <div key={i} className="panel-card p-2.5 text-center">
                <s.icon size={14} className={`mx-auto mb-1 ${s.color}`} />
                <p className="text-[7px] font-black text-slate-500 uppercase">{s.label}</p>
                <p className={`text-xs font-black ${s.color}`}>{s.val}</p>
              </div>
            ))}
          </div>

          <div className="panel-card p-4 text-center">
            <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-3">Progress Belajar</p>
            <div className="relative inline-block">
              <ProgressRing pct={overallPct} ringId="panelRing" />
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <span className="text-2xl font-black text-white">{overallPct}%</span>
                <span className="text-[9px] text-slate-400 font-bold">Selesai</span>
              </div>
            </div>
            <p className="text-sm font-black text-white mt-2">{completedCount} / {total} Hari</p>
          </div>

          <div className="panel-card p-4">
            <p className="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-3">Tahap Hari {day}</p>
            {[
              { icon: '📖', label: 'Materi', done: materiDone },
              { icon: '🧠', label: 'Hafalan', done: hafalanDone },
              { icon: '🏆', label: 'Kuis', done: quizDone },
            ].map((t, i) => (
              <div key={i} className="flex justify-between py-2 border-b border-white/5 last:border-0">
                <span className="text-xs font-bold text-slate-200">{t.icon} {t.label}</span>
                <span className={`text-[10px] font-black ${t.done ? 'text-emerald-400' : 'text-red-400'}`}>
                  {t.done ? '✅ Selesai' : '❌ Belum'}
                </span>
              </div>
            ))}
            <div className="mt-3">
              <div className="flex justify-between text-[9px] font-bold text-slate-400 mb-1">
                <span>Progress</span><span>{tahapPct}%</span>
              </div>
              <div className="h-2 bg-slate-700/60 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-emerald-500 to-blue-500 rounded-full transition-all" style={{ width: `${tahapPct}%` }} />
              </div>
            </div>
          </div>

          {nextDay && (
            <div className="panel-card p-4">
              <p className="text-[10px] font-black text-amber-400 uppercase mb-2">🎁 Hadiah Berikutnya</p>
              <p className="text-sm font-black text-white">Selesaikan Hari {nextDay}</p>
              <p className="text-lg font-black text-amber-400">+{nextRewardXp} XP</p>
            </div>
          )}

          <div className="panel-card p-3">
            <p className="text-[9px] font-black text-slate-500 uppercase mb-2">Legenda</p>
            <div className="grid grid-cols-2 gap-1 text-[9px] font-bold text-slate-400">
              <span>✅ Selesai</span><span className="text-blue-400">📖 Aktif</span>
              <span>🔒 Terkunci</span><span className="text-purple-400">🏆 Quiz</span>
            </div>
          </div>
        </div>
      );
    };

    const JourneyMap = ({ progress, selectedDay, onNodeClick, totalDays, profile, playerName, onLockedClick }) => {
      const safeProgress = progress || {};
      const nodes = AE().buildJourneyNodes(totalDays || TOTAL_DAYS) || [];
      const mapScrollRef = useRef(null);
      const total = totalDays || TOTAL_DAYS;
      const safeProfile = profile || {};
      const levelInfo = AE().getLevelInfo(safeProfile.xp || 0);
      const avatars = AE().AVATARS || [];
      const avatarEmoji = avatars.find((a) => a.id === safeProfile.avatar)?.emoji || '👦';

      const positions = buildCampaignPositions(nodes.length);
      const canvasHeight = Math.max(4000, positions.length ? positions[positions.length - 1].py + 200 : 4000);
      const pathD = buildCampaignPath(positions);

      const avatarNodeId = (() => {
        const dayActive = nodes.find((n) => n.type === 'day' && AE().getNodeStatus(n, safeProgress, selectedDay) === 'active');
        if (dayActive) return dayActive.id;
        return nodes.find((n) => AE().getNodeStatus(n, safeProgress, selectedDay) === 'active')?.id || null;
      })();

      const focusDay = (() => {
        const n = nodes.find((nd) => nd.id === avatarNodeId);
        return n?.day || selectedDay || 1;
      })();

      useEffect(() => {
        const t = setTimeout(() => {
          mapScrollRef.current?.querySelector('[data-active="true"]')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 500);
        return () => clearTimeout(t);
      }, [selectedDay, avatarNodeId]);

      if (!nodes.length) {
        return (
          <div className="flex-1 flex items-center justify-center text-slate-400 p-8">
            <p className="font-bold">Peta perjalanan belum tersedia.</p>
          </div>
        );
      }

      const handleNodeClick = (node, status) => {
        if (status === 'locked') { onLockedClick?.(); return; }
        if (node.type !== 'start' && node.type !== 'finish') onNodeClick?.(node);
      };

      const mapColumn = (
        <div className="campaign-map-col">
          <div className="campaign-map-header flex flex-wrap justify-between items-center gap-3">
            <div>
              <h2 className="text-lg font-black text-white flex items-center gap-2">
                <span>🗺</span> Peta Perjalanan
              </h2>
              <p className="text-xs text-slate-400 mt-0.5">Jelajahi pulau-pulau belajar Bahasa Arab</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <span className="campaign-badge text-orange-300">🔥 {safeProfile.dailyStreak || 0} Hari</span>
              <span className="campaign-badge text-amber-300">⭐ {safeProfile.xp || 0} XP</span>
              <span className="campaign-badge text-emerald-300">🛡 Lv.{levelInfo.level || 1}</span>
            </div>
          </div>

          <div ref={mapScrollRef} className="campaign-map-scroll">
            <div className="campaign-map-canvas" style={{ height: canvasHeight }}>
              <div className="campaign-fog" />
              <span className="campaign-cloud" style={{ top: '5%', left: '-10%' }}>☁️</span>
              <span className="campaign-cloud" style={{ top: '22%', animationDelay: '-12s' }}>☁️</span>
              <span className="campaign-cloud" style={{ top: '48%', animationDelay: '-20s', fontSize: '2.5rem' }}>☁️</span>
              <span className="campaign-cloud" style={{ top: '72%', animationDelay: '-8s' }}>☁️</span>
              <div className="absolute text-5xl opacity-30" style={{ top: '8%', right: '8%' }}>⛰️</div>
              <div className="absolute text-4xl opacity-40" style={{ top: '35%', left: '5%' }}>🌋</div>
              <div className="absolute text-3xl opacity-50 animate-[islandFloat_5s_ease-in-out_infinite]" style={{ top: '60%', right: '6%' }}>🚢</div>
              <div className="campaign-ocean-wave" style={{ bottom: 0 }} />

              <svg className="campaign-path-svg" viewBox={`0 0 ${CAMPAIGN_W} ${canvasHeight}`} preserveAspectRatio="xMidYMin meet">
                <defs>
                  <linearGradient id="pathGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stopColor="#34d399" />
                    <stop offset="50%" stopColor="#fbbf24" />
                    <stop offset="100%" stopColor="#34d399" />
                  </linearGradient>
                </defs>
                {pathD && <path d={pathD} className="campaign-path-line" />}
              </svg>

              {nodes.map((node, idx) => {
                const status = AE().getNodeStatus(node, safeProgress, selectedDay) || 'locked';
                return (
                  <CampaignMapNode
                    key={node.id}
                    node={node}
                    status={status}
                    pos={positions[idx]}
                    showAvatar={avatarNodeId === node.id}
                    avatarEmoji={avatarEmoji}
                    disabled={status === 'locked'}
                    onClick={() => handleNodeClick(node, status)}
                  />
                );
              })}

              <div className="campaign-footer-hint">
                🔒 Selesaikan semua tahap sebelumnya untuk membuka tahap berikutnya
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="journey-layout w-full h-full">
          {mapColumn}
          <aside className="campaign-progress-panel hidden lg:block">
            <JourneyProgressPanel
              profile={profile}
              playerName={playerName}
              progress={progress}
              selectedDay={selectedDay}
              totalDays={total}
              focusDay={focusDay}
            />
          </aside>
          <div className="mobile-panel-sheet lg:hidden">
            <JourneyProgressPanel
              profile={profile}
              playerName={playerName}
              progress={progress}
              selectedDay={selectedDay}
              totalDays={total}
              focusDay={focusDay}
            />
          </div>
        </div>
      );
    };

    const FlashcardMode = ({ words, onLearn, playAudio }) => {
      const safeWords = Array.isArray(words) ? words : [];
      const [idx, setIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [deck, setDeck] = useState(safeWords);
      if (!deck.length) {
        return (
          <div className="card-premium p-12 text-center text-slate-400">
            <Layers size={40} className="mx-auto mb-3 opacity-40" />
            <p className="font-bold">Belum ada kartu flashcard untuk hari ini.</p>
            <p className="text-xs mt-2">Pilih hari yang sudah terbuka dan pastikan data mufrodat tersedia.</p>
          </div>
        );
      }
      const card = deck[idx];
      if (!card) return <p className="text-center text-slate-400 p-8">Tidak ada kartu.</p>;
      const next = () => { setFlipped(false); setIdx((i) => (i + 1) % deck.length); };
      const prev = () => { setFlipped(false); setIdx((i) => (i - 1 + deck.length) % deck.length); };
      const shuffle = () => { setDeck([...deck].sort(() => Math.random() - 0.5)); setIdx(0); setFlipped(false); };
      return (
        <div className="max-w-md mx-auto">
          <div className="flip-card h-72 mb-6 cursor-pointer" onClick={() => setFlipped(!flipped)}>
            <div className={`flip-inner relative w-full h-full ${flipped ? 'flipped' : ''}`}>
              <div className="flip-front absolute inset-0 card-premium flex flex-col items-center justify-center p-8 border-2 border-primary/20">
                <p className="text-5xl font-arabic text-primary mb-4">{card.arab}</p>
                <p className="text-xs text-slate-400 font-bold">Ketuk untuk membalik</p>
              </div>
              <div className="flip-back absolute inset-0 card-premium flex flex-col items-center justify-center p-8 bg-emerald-50 border-2 border-emerald-200">
                <p className="text-2xl font-black text-slate-800 mb-2">{card.latin}</p>
                <p className="text-xl font-bold text-primary">{card.arti}</p>
              </div>
            </div>
          </div>

    const MusyrifDashboard = ({ leaderboard }) => {

      const active = list.filter((e) => e && e.updatedAt > Date.now() - 7 * 86400000).length;

    const syncProgressToFirestore = async (database, id, name, progressData) => {
      if (!database) return;
      try {
        const safeName = name.replace(/[/.#$\[\]]/g, '_');
        const docRef = database.collection('artifacts').doc(id).collection('public').doc('data').collection('user_progress').doc(safeName);
        await docRef.set({
          name,
          progress: progressData,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      } catch (e) {
        console.warn('Progress sync failed', e);
      }
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('alfal_session_name'));
      const [participantName, setParticipantName] = useState(() => localStorage.getItem('alfal_session_name') || "");
      const [inputToken, setInputToken] = useState("");
      const [loginError, setLoginError] = useState("");
      
      const [activeTab, setActiveTab] = useState('home');
      const [selectedDay, setSelectedDay] = useState(1);
      const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth > 768);
      
      const [quizStep, setQuizStep] = useState(0); 
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [score, setScore] = useState(0);
      const [myScores, setMyScores] = useState([]);

      const [scrambledLetters, setScrambledLetters] = useState([]);
      const [currentGuess, setCurrentGuess] = useState([]);
      const [availableVoices, setAvailableVoices] = useState([]);
      const [isProcessing, setIsProcessing] = useState(false);

      const [rekamStep, setRekamStep] = useState(0); 
      const [voiceQuizList, setVoiceQuizList] = useState([]);
      const [currentVoiceQuestion, setCurrentVoiceQuestion] = useState(0);
      const [isListeningQuiz, setIsListeningQuiz] = useState(false);
      const [recognizedText, setRecognizedText] = useState("");
      const [voiceQuizFeedback, setVoiceQuizFeedback] = useState(null);

      const [isRecording, setIsRecording] = useState(false);
      const [audioUrl, setAudioUrl] = useState(null);
      const [audioBase64, setAudioBase64] = useState("");
      const [isAudioSent, setIsAudioSent] = useState(false);
      const [showIosHint, setShowIosHint] = useState(false);
      const [hasShownIosHint, setHasShownIosHint] = useState(false);
      const [progress, setProgress] = useState(() => {
        try {
          const name = localStorage.getItem('alfal_session_name');
          return name ? loadProgress(name) : getEmptyProgress();
        } catch (e) {
          console.error('[Alfal] Init progress gagal:', e);
          return getEmptyProgress();
        }
      });
      const [showLockModal, setShowLockModal] = useState(false);
      const [toast, setToast] = useState(null);
      const [profile, setProfile] = useState(() => {
        try {
          const name = localStorage.getItem('alfal_session_name');
          return name ? loadSafeProfile(name) : AE().createEmptyProfile();
        } catch (e) {
          console.error('[Alfal] Init profile gagal:', e);
          return AE().createEmptyProfile();
        }
      });
      const [lbFilter, setLbFilter] = useState('all');
      const [lbFilterValue, setLbFilterValue] = useState('');
      const [premiumQuestions, setPremiumQuestions] = useState([]);
      const [premiumQIndex, setPremiumQIndex] = useState(0);
      const [premiumScore, setPremiumScore] = useState(0);
      const [typingAnswer, setTypingAnswer] = useState('');
      const [speechState, setSpeechState] = useState('idle');
      const [isMusyrif, setIsMusyrif] = useState(() => localStorage.getItem('alfal_role') === 'musyrif');
      const [pageLoading, setPageLoading] = useState(false);
      const speechRef = useRef(null);
      const studyTimerRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const toastTimerRef = useRef(null);

      const showToast = (message) => {
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        setToast(message);
        toastTimerRef.current = setTimeout(() => setToast(null), 3000);
      };

      const saveProfileState = (nextProfile, nextProgress) => {
        try {
          const p = progress || getEmptyProgress();
          const pr = nextProgress || p;
          AE().saveProfile(participantName, nextProfile, pr);
          AE().syncProfileFirestore(db, appId, participantName, nextProfile);
          setProfile({ ...nextProfile });
        } catch (e) {
          console.error('[Alfal] saveProfileState gagal:', e);
          setProfile({ ...(nextProfile || AE().createEmptyProfile()) });
        }
      };

      const awardXP = (amount, reason) => {
        setProfile((prev) => {
          let next = AE().addXP({ ...prev }, amount, reason);
          const stats = AE().getStats(progress, next, myScores);
          next = AE().checkAchievements(next, stats);
          saveProfileState(next);
          return next;
        });
      };

      const touchStudySession = () => {
        setProfile((prev) => {
          let next = { ...prev };
          const streakResult = AE().updateDailyStreak(next);
          next = streakResult.profile;
          if (streakResult.broken && !next.streakBrokenNotified) {
            next.streakBrokenNotified = true;
            showToast('Streak Anda terputus. Ayo mulai lagi hari ini.');
          }
          next = AE().resetDailyChallenge(next);
          saveProfileState(next);
          return next;
        });
      };

      const markWordLearned = (day, wordId, correct = true) => {
        touchStudySession();
        setProgress((prev) => {
          const base = prev[day] || createEmptyDayProgress();
          const next = { ...prev, [day]: { ...createEmptyDayProgress(), ...base } };
          const wl = [...(next[day].wordsLearned || [])];
          const isNew = !wl.includes(wordId);
          if (isNew) wl.push(wordId);
          next[day].wordsLearned = wl;
          const wasComplete = next[day].completed;
          updateDayProgress(next[day]);
          if (participantName) {
            try {
              saveProgressLocal(participantName, next);
              syncProgressToFirestore(db, appId, participantName, next);
            } catch (e) {
              console.error('[Alfal] Simpan progress kata gagal:', e);
            }
          }
          if (isNew) {
            awardXP(AE().CONFIG.XP_WORD, 'word');
            setProfile((p) => {
              let np = AE().updateDailyChallenge({ ...p }, 'word');
              saveProfileState(np, next);
              return np;
            });
          }
          if (!wasComplete && next[day].completed) awardXP(AE().CONFIG.XP_DAY, 'day');
          return next;
        });
        setProfile((p) => AE().recordSRS({ ...p }, day, wordId, correct));
      };

      const markDayFromQuiz = (day, scoreVal) => {
        touchStudySession();
        setProgress((prev) => {
          const base = prev[day] || createEmptyDayProgress();
          const next = { ...prev, [day]: { ...createEmptyDayProgress(), ...base } };
          const wasComplete = next[day].completed;
          next[day].quizScore = Math.max(next[day].quizScore || 0, scoreVal);
          updateDayProgress(next[day]);
          if (participantName) {
            try {
              saveProgressLocal(participantName, next);
              syncProgressToFirestore(db, appId, participantName, next);
            } catch (e) {
              console.error('[Alfal] Simpan progress quiz gagal:', e);
            }
          }
          if (!wasComplete && next[day].completed) awardXP(AE().CONFIG.XP_DAY, 'day');
          return next;
        });
        setProfile((p) => {
          let np = { ...p };
          np.quizStats = np.quizStats || { perfect: 0, total: 0, best: 0 };
          np.quizStats.total++;
          if (scoreVal === 100) np.quizStats.perfect++;
          np.quizStats.best = Math.max(np.quizStats.best || 0, scoreVal);
          np = AE().updateDailyChallenge(np, 'quiz');
          awardXP(AE().CONFIG.XP_QUIZ, 'quiz');
          np = AE().checkAchievements(np, AE().getStats(progress, np, myScores));
          saveProfileState(np);
          return np;
        });
      };

      const claimDailyChallenge = () => {
        setProfile((p) => {
          let np = { ...p };
          if (np.dailyChallenge?.completed && !np.dailyChallenge?.claimed) {
            np.dailyChallenge.claimed = true;
            np = AE().addXP(np, AE().CONFIG.XP_CHALLENGE, 'challenge');
            showToast('+150 XP dari Tantangan Harian!');
            saveProfileState(np);
          }
          return np;
        });
      };

      const handleJourneyNodeClick = (node) => {
        if (node.type === 'day') trySelectDay(node.day, 'materi');
        if (node.type === 'quiz') trySelectDay(node.day, 'quiz');
      };

      const startPremiumQuiz = () => {
        if (!currentMufrodatList.length) {
          showToast('Data kuis tidak tersedia untuk hari ini.');
          return;
        }
        const qs = AE().generateQuizQuestions([...currentMufrodatList], null, 10);
        setPremiumQuestions(qs);
        setPremiumQIndex(0);
        setPremiumScore(0);
        setTypingAnswer('');
        setQuizStep(4);
      };

      const handlePremiumAnswer = (correct) => {
        if (isProcessing) return;
        setIsProcessing(true);
        const q = premiumQuestions[premiumQIndex];
        if (correct) {
          setPremiumScore((s) => s + 1);
          if (q?.word) setProfile((p) => AE().recordSRS({ ...p }, selectedDay, q.word.id, true));
        } else if (q?.word) {
          setProfile((p) => AE().recordSRS({ ...p }, selectedDay, q.word.id, false));
        }
        setTimeout(() => {
          if (premiumQIndex < premiumQuestions.length - 1) {
            setPremiumQIndex((i) => i + 1);
            setTypingAnswer('');
            setIsProcessing(false);
          } else {
            setPremiumScore((ps) => {
              const final = correct ? ps + 1 : ps;
              setScore(final);
              setQuizStep(2);
              return final;
            });
            setIsProcessing(false);
          }
        }, 200);
      };

      const playAudioAdvanced = (text, latin) => {
        if (!('speechSynthesis' in window)) { playAudio(text); return; }
        window.speechSynthesis.cancel();
        if (speechState === 'playing') {
          window.speechSynthesis.pause();
          setSpeechState('paused');
          return;
        }
        if (speechState === 'paused') {
          window.speechSynthesis.resume();
          setSpeechState('playing');
          return;
        }
        const speak = (t, lang) => {
          const u = new SpeechSynthesisUtterance(t);
          u.lang = lang;
          u.rate = 0.85;
          return u;
        };
        const u1 = speak(text + ' .', 'ar-SA');
        u1.onend = () => {
          if (latin) {
            const u2 = speak(latin, 'id-ID');
            u2.onend = () => setSpeechState('idle');
            window.speechSynthesis.speak(u2);
          } else setSpeechState('idle');
        };
        setSpeechState('playing');
        window.speechSynthesis.speak(u1);
      };

      const repeatAudio = (text, latin) => {
        setSpeechState('idle');
        playAudioAdvanced(text, latin);
      };

      const trySelectDay = (dayNum, tab = 'materi') => {
        if (!isDayUnlocked(dayNum, progress)) {
          setShowLockModal(true);
          return false;
        }
        setSelectedDay(dayNum);
        if (tab) {
          setActiveTab(tab);
          window.scrollTo(0, 0);
        }
        return true;
      };

      const handleTabChange = (tab) => {
        const freeTabs = ['home', 'riwayat', 'profile', 'achievements', 'leaderboard', 'review', 'certificate', 'musyrif', 'daily'];
        if (!freeTabs.includes(tab) && !isDayUnlocked(selectedDay, progress)) {
          setActiveTab('home');
          showToast('Materi masih terkunci.');
          return;
        }
        if (tab === 'musyrif' && !isMusyrif) {
          showToast('Akses khusus Musyrif.');
          return;
        }
        setActiveTab(tab);
        if (tab !== 'home' && tab !== 'quiz' && quizStep !== 0) setQuizStep(0);
      };

      const completedDaysCount = countCompletedDays(progress);
      const overallProgressPct = Math.round((completedDaysCount / TOTAL_DAYS) * 100);
      const streak = getConsecutiveStreak(progress);
      const streakBadge = getStreakBadge(streak);

      const selectedDayMeta = getDayMufrodat(selectedDay);
      const currentMufrodatList = selectedDayMeta.data || [];

      useEffect(() => {
        if (!isLoggedIn || !participantName) return;

        let localProgress = loadProgress(participantName);
        const localHistory = loadLocalHistory(participantName);
        localProgress = mergeScoresIntoProgress(localProgress, localHistory);
        setProgress(localProgress);
        saveProgressLocal(participantName, localProgress);

        if (db) {
          try {
            const safeName = participantName.replace(/[/.#$\[\]]/g, '_');
            const progressDoc = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('user_progress').doc(safeName);
            progressDoc.get().then((doc) => {
              if (doc.exists && doc.data().progress) {
                const merged = mergeProgressRecords(localProgress, doc.data().progress);
                const withScores = mergeScoresIntoProgress(merged, localHistory);
                setProgress(withScores);
                saveProgressLocal(participantName, withScores);
              }
            }).catch((err) => console.warn('Load progress failed', err));
          } catch (e) {
            console.warn('Progress load error', e);
          }
        }
      }, [isLoggedIn, participantName, user]);

      useEffect(() => {
        if (!isLoggedIn) return;
        studyTimerRef.current = setInterval(() => {
          setProfile((p) => {
            let np = AE().resetDailyChallenge({ ...p });
            np.dailyChallenge.minutes = (np.dailyChallenge.minutes || 0) + 1;
            np.studyMinutesToday = (np.studyMinutesToday || 0) + 1;
            if (np.dailyChallenge.minutes >= 15) np.dailyChallenge.completed = np.dailyChallenge.words >= 10 && np.dailyChallenge.quiz;
            AE().saveProfile(participantName, np, progress);
            return np;
          });
        }, 60000);
        return () => clearInterval(studyTimerRef.current);
      }, [isLoggedIn, participantName]);

      useEffect(() => {
        if (!isLoggedIn) return;
        const dayTabs = ['materi', 'quiz', 'rekam', 'flashcard'];
        if (dayTabs.includes(activeTab) && !isDayUnlocked(selectedDay, progress)) {
          setActiveTab('home');
          showToast('Materi masih terkunci.');
        }
      }, [activeTab, selectedDay, progress, isLoggedIn]);

      useEffect(() => {
        const fetchVoices = () => setAvailableVoices(window.speechSynthesis.getVoices());
        if ('speechSynthesis' in window) {
          fetchVoices();
          window.speechSynthesis.onvoiceschanged = fetchVoices;
        }
      }, []);

      useEffect(() => {
        if (activeTab === 'rekam') {
          setRekamStep(0);
          setCurrentVoiceQuestion(0);
          setRecognizedText("");
          setVoiceQuizFeedback(null);
          deleteRecording();
          
          const allData = getDayMufrodat(selectedDay).data || [];
          const shuffled = [...allData].sort(() => 0.5 - Math.random());
          setVoiceQuizList(shuffled.slice(0, 5));
        }
      }, [activeTab, selectedDay]);

      const startListeningVoiceQuiz = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert("Maaf, browser Anda tidak mendukung fitur pengenalan suara otomatis. Anda akan langsung dialihkan ke bagian Setor Hafalan Utama.");
          setRekamStep(1);
          return;
        }

        setIsListeningQuiz(true);
        setRecognizedText("");
        setVoiceQuizFeedback(null);

        const recognition = new SpeechRecognition();
        recognition.lang = 'ar-SA';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          setRecognizedText(transcript);

          const targetWord = voiceQuizList[currentVoiceQuestion].arab;
          const normalize = (text) => {
            if (!text) return "";
            return text.replace(/[\u064B-\u065F]/g, '')
                       .replace(/[أإآ]/g, 'ا')
                       .replace(/ة/g, 'ه')
                       .replace(/ى/g, 'ي')
                       .replace(/\s+/g, '');
          };

          const normTarget = normalize(targetWord);
          const normInput = normalize(transcript);

          if (normInput.includes(normTarget) || normTarget.includes(normInput)) {
            setVoiceQuizFeedback('correct');
            setTimeout(() => {
              if (currentVoiceQuestion < 4) {
                setCurrentVoiceQuestion(q => q + 1);
                setRecognizedText("");
                setVoiceQuizFeedback(null);
              } else {
                setRekamStep(1); 
              }
            }, 1500);
          } else {
            setVoiceQuizFeedback('wrong');
          }
        };

        recognition.onerror = (event) => {
          console.error("Speech Recognition Error:", event.error);
          if(event.error === 'not-allowed') {
             alert("Akses mikrofon ditolak! Izinkan mikrofon di pengaturan browser untuk bermain latihan suara.");
          }
          setVoiceQuizFeedback('error');
          setIsListeningQuiz(false);
        };

        recognition.onend = () => {
          setIsListeningQuiz(false);
        };

        recognition.start();
      };

      const startRecording = async () => {
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("Maaf, browser Anda tidak mendukung fitur rekam suara. Pastikan membuka web ini melalui Google Chrome/Safari versi terbaru (HTTPS).");
            return;
          }

          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          
          let options = {};
          if (typeof MediaRecorder !== 'undefined' && typeof MediaRecorder.isTypeSupported === 'function') {
            if (MediaRecorder.isTypeSupported('audio/webm')) {
              options = { mimeType: 'audio/webm' };
            } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
              options = { mimeType: 'audio/mp4' };
            } else if (MediaRecorder.isTypeSupported('audio/aac')) {
              options = { mimeType: 'audio/aac' };
            }
          }

          let mediaRecorder;
          try {
            mediaRecorder = new MediaRecorder(stream, options);
          } catch (e) {
            mediaRecorder = new MediaRecorder(stream);
          }

          mediaRecorderRef.current = mediaRecorder;
          audioChunksRef.current = [];

          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              audioChunksRef.current.push(event.data);
            }
          };

          mediaRecorder.onstop = () => {
            const actualMimeType = mediaRecorder.mimeType || 'audio/mp4';
            const audioBlob = new Blob(audioChunksRef.current, { type: actualMimeType });
            const url = URL.createObjectURL(audioBlob);
            setAudioUrl(url);
            
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
              const base64data = reader.result.split(',')[1]; 
              setAudioBase64(base64data);
            };

            stream.getTracks().forEach(track => track.stop());
          };

          mediaRecorder.start();
          setIsRecording(true);
        } catch (err) {
          console.error("Gagal mengakses mikrofon:", err);
          if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
              alert("Akses mikrofon ditolak!\n\nMohon izinkan akses mikrofon di pengaturan browser Anda (ketuk ikon gembok 🔒 di samping link web untuk mengubah izin).");
          } else {
              alert("Gagal merekam.\n\nPastikan link dibuka di Safari (untuk iPhone) atau Chrome (untuk Android), BUKAN dari browser bawaan WhatsApp.");
          }
        }
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.stop();
          setIsRecording(false);
        }
      };

      const deleteRecording = () => {
        setAudioUrl(null);
        setAudioBase64("");
        setIsAudioSent(false);
        audioChunksRef.current = [];
      };

      const playAudio = (text) => {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        
        if ((isIOS || isSafari) && !hasShownIosHint) {
            setShowIosHint(true);
            setHasShownIosHint(true);
            setTimeout(() => setShowIosHint(false), 7000);
        }

        if (isIOS || isSafari) {
           fallbackAudio(text + " .");
           return;
        }

        try {
          const clearText = text + " .";
          const url = `https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=ar&q=${encodeURIComponent(clearText)}`;
          const audio = new Audio(url);
          audio.playbackRate = 0.85; 
          audio.load(); 
          
          const playPromise = audio.play();
          if (playPromise !== undefined) {
            playPromise.catch((err) => {
              fallbackAudio(clearText);
            });
          }
        } catch (e) {
          fallbackAudio(text + " .");
        }
      };

      const fallbackAudio = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'ar-SA'; 
          utterance.rate = 0.85; 

          const arabicVoices = availableVoices.filter(v => v.lang.startsWith('ar'));
          let targetVoice = arabicVoices.find(v => 
            v.name.toLowerCase().includes('female') || 
            v.name.toLowerCase().includes('laila') || 
            v.name.toLowerCase().includes('maged') || 
            v.name.toLowerCase().includes('tarik') || 
            v.name.toLowerCase().includes('zeina')
          );

          if (targetVoice) {
            utterance.voice = targetVoice;
          } else if (arabicVoices.length > 0) {
            utterance.voice = arabicVoices[0];
          }

          window.speechSynthesis.speak(utterance);
        }
      };

      useEffect(() => {
        if(!auth) return;
        const initAuth = async () => {
          try {
             if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
               await auth.signInWithCustomToken(__initial_auth_token);
             } else {
               await auth.signInAnonymously();
             }
          } catch(e) { console.warn("Init Auth Error", e); }
        };
        initAuth();
        
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!isLoggedIn || !participantName) return;

        const localHistory = loadLocalHistory(participantName);

        if (db) {
          try {
            const scoresCol = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('scores');
            const unsubscribe = scoresCol.onSnapshot((snapshot) => {
              const allScores = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              const filtered = allScores
                .filter(s => s.name === participantName)
                .sort((a, b) => {
                   const tA = a.timestamp?.seconds || a.timestamp || 0;
                   const tB = b.timestamp?.seconds || b.timestamp || 0;
                   return tB - tA;
                });
              setMyScores(filtered);
            }, (err) => {
               console.error("Firestore Error:", err);
               setMyScores(localHistory); 
            });
            return () => unsubscribe();
          } catch(e) {
             setMyScores(localHistory);
          }
        } else {
          localHistory.sort((a, b) => b.timestamp - a.timestamp);
          setMyScores(localHistory);
        }
      }, [user, isLoggedIn, participantName]);

      useEffect(() => {
        if (quizStep === 1 && currentQuestion % 2 !== 0 && currentMufrodatList[currentQuestion]) {
          const target = currentMufrodatList[currentQuestion].arab || '';
          const lettersArray = target.match(/\p{L}\p{M}*/gu) || target.split('');
          const letters = lettersArray.map((l, i) => ({ id: i, char: l }));
          const shuffled = [...letters].sort(() => Math.random() - 0.5);
          setScrambledLetters(shuffled);
          setCurrentGuess([]);
        }
      }, [currentQuestion, quizStep, selectedDay, currentMufrodatList]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (!participantName.trim()) {
          setLoginError("Nama lengkap tidak boleh kosong.");
          return;
        }
        if (inputToken !== VALID_TOKEN && inputToken !== AE().CONFIG.ADMIN_TOKEN) {
          setLoginError("Token akses salah. Silakan hubungi Admin.");
          return;
        }
        if (inputToken === AE().CONFIG.ADMIN_TOKEN) {
          localStorage.setItem('alfal_role', 'musyrif');
          setIsMusyrif(true);
        } else {
          localStorage.removeItem('alfal_role');
          setIsMusyrif(false);
        }

        try {
          if ('speechSynthesis' in window) {
              const warmup = new SpeechSynthesisUtterance('');
              warmup.volume = 0;
              window.speechSynthesis.speak(warmup);
          }
        } catch (err) {}
        
        localStorage.setItem('alfal_session_name', participantName);
        const initialProgress = loadProgress(participantName);
        const initialProfile = loadSafeProfile(participantName);
        setProgress(initialProgress);
        setProfile(initialProfile);
        saveProgressLocal(participantName, initialProgress);
        AE().saveProfile(participantName, initialProfile, initialProgress);
        setIsLoggedIn(true);
        setLoginError("");
      };

      const handleLogout = () => {
        if (window.confirm("Apakah kamu yakin ingin keluar?")) {
          localStorage.removeItem('alfal_session_name');
          setIsLoggedIn(false);
          setParticipantName("");
          setInputToken("");
          setActiveTab('home');
        }
      };

      const handleResetHistory = () => {
        if (window.confirm("Apakah kamu yakin ingin menghapus semua riwayat belajar? Data yang sudah dihapus tidak dapat dikembalikan.")) {
          const localHistoryKey = `alfal_history_${participantName}`;
          localStorage.removeItem(localHistoryKey);
          localStorage.removeItem(getProgressKey(participantName));
          const freshProgress = loadProgress(participantName);
          setProgress(freshProgress);
          saveProgressLocal(participantName, freshProgress);
          syncProgressToFirestore(db, appId, participantName, freshProgress);
          setMyScores([]);
        }
      };

      const sendToGoogleSheet = async (name, scoreValue, category, audioData, day, type) => {
        if (!GOOGLE_SCRIPT_URL) return;
        
        const payload = { 
          nama: name, 
          skor: scoreValue, 
          materi: category, 
          day: day,
          waktu: new Date().toLocaleString('id-ID'),
          audio: audioData || "",
          tipe: type || "Kuis"
        };
        
        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            mode: 'no-cors', 
            headers: {
              'Content-Type': 'text/plain;charset=utf-8',
            }
          });
        } catch (err) {
          console.error("Gagal mengirim ke Google Sheet:", err);
        }
      };

      const submitHafalan = async () => {
        if (isProcessing) return;
        setIsProcessing(true);
        try {
          const category = `Hafalan Hari ${selectedDay}: ${selectedDayMeta.title}`;
          await sendToGoogleSheet(participantName, "-", category, audioBase64, selectedDay, "Hafalan");
          setIsAudioSent(true);
        } catch (error) {
          alert("Gagal mengirim rekaman ke server. Pastikan koneksi internet lancar lalu coba lagi.");
        } finally {
          setIsProcessing(false);
        }
      };

      const submitQuiz = async () => {
        if (isProcessing) return;
        setIsProcessing(true);
        const finalScore = Math.round((score / 10) * 100); 
        const category = `Kuis Hari ${selectedDay}: ${selectedDayMeta.title}`;
        
        try {
          const localHistoryKey = `alfal_history_${participantName}`;
          const existingHistory = loadLocalHistory(participantName);
          const newRecord = {
            name: participantName,
            score: finalScore,
            category: category,
            day: selectedDay,
            timestamp: Date.now() 
          };
          localStorage.setItem(localHistoryKey, JSON.stringify([...existingHistory, newRecord]));
          
          setMyScores(prev => [newRecord, ...prev].sort((a,b) => b.timestamp - a.timestamp));

          if(db) {
             try {
                const scoresCol = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('scores');
                await scoresCol.add({
                  name: participantName,
                  score: finalScore,
                  category: category,
                  day: selectedDay,
                  timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
             } catch(e) { console.warn("Firestore save failed", e); }
          }
          
          try {
            await sendToGoogleSheet(participantName, finalScore, category, "", selectedDay, "Kuis");
          } catch(e) {
            console.warn("Gagal simpan ke Sheet.");
          }

          markDayFromQuiz(selectedDay, finalScore);
          
          setQuizStep(3); 
        } catch (err) {
          alert("Gagal menyimpan nilai.");
          console.error(err);
        } finally {
          setIsProcessing(false);
        }
      };

      const handleChoiceAnswer = (isCorrect) => {
        if (isProcessing) return;
        setIsProcessing(true);
        
        let newScore = score;
        if (isCorrect) {
          newScore = score + 1;
          setScore(newScore);
        }
        
        setTimeout(() => {
          moveToNext();
          setIsProcessing(false);
        }, 150);
      };

      const moveToNext = () => {
        if (currentQuestion < 9) {
          setCurrentQuestion(q => q + 1);
        } else {
          setQuizStep(2);
        }
      };

      const addLetterToGuess = (letterObj) => {
        setCurrentGuess([...currentGuess, letterObj]);
        setScrambledLetters(scrambledLetters.filter(l => l.id !== letterObj.id));
      };

      const removeLetterFromGuess = (letterObj) => {
        setScrambledLetters([...scrambledLetters, letterObj]);
        setCurrentGuess(currentGuess.filter(l => l.id !== letterObj.id));
      };

      const checkScrambleAnswer = () => {
        if (isProcessing) return;
        setIsProcessing(true);
        
        const guessString = currentGuess.map(l => l.char).join('').replace(/\s+/g, '');
        const targetString = (currentMufrodatList[currentQuestion]?.arab || '').replace(/\s+/g, '');
        
        let newScore = score;
        if (guessString === targetString) {
          newScore = score + 1;
          setScore(newScore);
        }
        
        setTimeout(() => {
          moveToNext();
          setIsProcessing(false);
        }, 150);
      };

      const SidebarItem = ({ id, icon: Icon, label }) => (
        <button
          onClick={() => handleTabChange(id)}
          className={`nav-sidebar-item w-full flex items-center space-x-3 p-3.5 rounded-xl ${
            activeTab === id ? 'active' : ''
          }`}
        >
          <Icon size={20} />
          <span className={`font-bold text-sm ${!isSidebarOpen && 'hidden'}`}>
            {label}
          </span>
        </button>
      );

      const sidebarProfile = (
        <div className={`panel-card p-3 mx-2 mb-2 ${!isSidebarOpen && 'hidden'}`}>
          <div className="flex items-center gap-2">
            <span className="text-2xl">{(AE().AVATARS.find((a) => a.id === profile.avatar) || AE().AVATARS[0])?.emoji || '👦'}</span>
            <div className="min-w-0">
              <p className="text-xs font-black text-white truncate">{participantName || 'Santri'}</p>
              <p className="text-[9px] text-emerald-400 font-bold">Level {AE().getLevelInfo(profile.xp || 0).level}</p>
              <p className="text-[9px] text-amber-400">{profile.xp || 0} XP</p>
            </div>
          </div>
        </div>
      );

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-emerald-600 flex items-center justify-center p-4 md:p-6 font-sans">
            <div className="bg-white w-full max-w-[95%] md:max-w-md rounded-3xl md:rounded-[2.5rem] shadow-2xl p-6 md:p-10 overflow-hidden relative border border-emerald-500/20">
              <div className="absolute top-0 left-0 w-full h-2 bg-emerald-400"></div>
              
              <div className="text-center mb-8 md:mb-10">
                <div className="w-16 h-16 md:w-20 md:h-20 bg-emerald-50 rounded-2xl md:rounded-3xl flex items-center justify-center text-emerald-600 mx-auto mb-4 md:mb-6 shadow-inner">
                  <Lock size={32} className="text-emerald-600" />
                </div>
                <h1 className="text-2xl md:text-3xl font-black text-slate-900 mb-2 tracking-tight">ALFAL.ID</h1>
                <p className="text-xs md:text-sm text-slate-400 font-medium leading-relaxed px-2 md:px-4">
                  Silakan masuk menggunakan Nama & Token Alfal 2026.
                </p>
              </div>
              
              <form onSubmit={handleLogin} className="space-y-5 md:space-y-6">
                <div>
                  <label className="block text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest mb-1 md:mb-2 px-1">
                    Nama Lengkap
                  </label>
                  <div className="relative">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">
                      <User size={18} />
                    </div>
                    <input 
                      type="text" 
                      placeholder="Nama Lengkap Peserta" 
                      className="w-full pl-11 pr-4 py-3 md:py-4 bg-slate-50 border-2 border-slate-100 rounded-xl md:rounded-2xl outline-none focus:border-emerald-500 focus:bg-white transition-all font-bold text-sm md:text-base" 
                      value={participantName} 
                      onChange={(e) => setParticipantName(e.target.value)} 
                      required 
                    />
                  </div>
                </div>
                
                <div>
                  <label className="block text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest mb-1 md:mb-2 px-1">
                    Token Akses
                  </label>
                  <div className="relative">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">
                      <Lock size={18} />
                    </div>
                    <input 
                      type="password" 
                      placeholder="Token Keamanan (123)" 
                      className="w-full pl-11 pr-4 py-3 md:py-4 bg-slate-50 border-2 border-slate-100 rounded-xl md:rounded-2xl outline-none focus:border-emerald-500 focus:bg-white transition-all font-bold text-sm md:text-base" 
                      value={inputToken} 
                      onChange={(e) => setInputToken(e.target.value)} 
                      required 
                    />
                  </div>
                </div>
                
                {loginError && (
                  <div className="text-red-500 bg-red-50 p-3 rounded-xl text-xs font-bold flex items-center space-x-2 animate-pulse">
                    <AlertCircle size={16}/>
                    <span>{loginError}</span>
                  </div>
                )}
