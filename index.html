          { id: 7, arab: "خِيَارٌ", latin: "Khiyaarun", arti: "Mentimun", contoh: "أَصْنَعُ السَّلَطَةَ بِالْخِيَارِ", deskripsi: "Sayuran hijau panjang yang menyegarkan." },
          { id: 8, arab: "بَاذِنْجَانٌ", latin: "Baadzijaanun", arti: "Terong", contoh: "لَوْنُ الْبَاذِنْجَانِ بَنَفْسَجِيٌّ", deskripsi: "Sayuran berkulit ungu." },
          { id: 9, arab: "سَبَانِخُ", latin: "Sabaanikhu", arti: "Bayam", contoh: "السَّبَانِخُ يُقَوِّي الْجِسْمَ", deskripsi: "Sayuran berdaun hijau yang kaya zat besi." },

        ]
      },
      23: {
        title: "Bentuk & Ruang", titleAr: "الأَشْكَالُ", data: [
          { id: 1, arab: "دَائِرَةٌ", latin: "Daa-iratun", arti: "Lingkaran", contoh: "الشَّمْسُ شَكْلُهَا دَائِرَةٌ", deskripsi: "Bentuk bulat bundar gross seperti bola atau roda." },
          { id: 2, arab: "مُثَلَّثٌ", latin: "Mutsallatsun", arti: "Segitiga", contoh: "رَسَمْتُ مُثَلَّثًا جَمِيْلًا", deskripsi: "Bentuk datar yang memiliki tiga sudut dan sisi." },
          { id: 3, arab: "مُرَبَّعٌ", latin: "Murabba'un", arti: "Persegi", contoh: "الْكَعْبَةُ شَكْلُهَا مُرَبَّعٌ", deskripsi: "Bentuk datar dengan empat sisi yang sama panjang." },
          { id: 4, arab: "مُسْتَطِيْلٌ", latin: "Mustathiilun", arti: "Persegi Panjang", contoh: "الْبَابُ شَكْلُهُ مُسْتَطِيْلٌ", deskripsi: "Bentuk dengan dua sisi panjang dan dua sisi pendek." },
          { id: 5, arab: "نَجْمَةٌ", latin: "Najmatun", arti: "Bintang", contoh: "رَسَمْتُ نَجْمَةً فِي الدَّفْتَرِ", deskripsi: "Bentuk yang menyerupai bintang di langit." },
          { id: 6, arab: "مُكَعَّبٌ", latin: "Muka'abun", arti: "Kubus", contoh: "الصُّنْدُوْقُ شَكْلُهُ مُكَعَّبٌ", deskripsi: "Bangun ruang yang memiliki enam sisi persegi sama." },
          { id: 7, arab: "مَخْرُوْطٌ", latin: "Makhruuthun", arti: "Kerucut", contoh: "قُبَّعَةُ الْحَفْلَةِ مَخْرُوْطٌ", deskripsi: "Bentuk seperti topi ulang tahun atau tumpeng." },
          { id: 8, arab: "أُسْطُوَانَةٌ", latin: "Usthuwaanatun", arti: "Tabung", contoh: "الْكُوْبُ شَكْلُهُ أُسْطُوَانَةٌ", deskripsi: "Bangun ruang seperti gelas atau pipa." },
          { id: 9, arab: "بَيْضَوِيٌّ", latin: "Baidhawiyyun", arti: "Oval", contoh: "الْبَيْضَةُ شَكْلُهَا بَيْضَوِيٌّ", deskripsi: "Bentuk yang menyerupai telur." },
          { id: 10, arab: "خَطٌّ", latin: "Khaththun", arti: "Garis", contoh: "أَرْسُمُ خَطًّا بِالْمِسْطَرَةِ", deskripsi: "Coretan panjang yang lurus." },
        ]
      },
      24: {
        title: "Peralatan Dapur", titleAr: "أَدَوَاتُ المَطْبَخِ", data: [

          { id: 2, arab: "صِيْنِيَّةٌ", latin: "Shiiniyyatun", arti: "Nampan", contoh: "أَحْمِلُ الْأَكْوَابَ بِالصِّيْنِيَّةِ", deskripsi: "Wadah datar lebar untuk membawa makanan/minuman." },

          { id: 5, arab: "فُرْنٌ", latin: "Furnun", arti: "Oven", contoh: "نَخْبِزُ الْكَعْكَةَ فِي الْفُرْنِ", deskripsi: "Alat pemanggang kue atau roti." },

          { id: 8, arab: "كِبْرِيْتٌ", latin: "Kibriitun", arti: "Korek Api", contoh: "أُشْعِلُ النَّارَ بِالْكِبْرِيْتِ", deskripsi: "Alat pemantik api berukuran kecil." },

          { id: 10, arab: "سَلَّةٌ", latin: "Sallatun", arti: "Keranjang", contoh: "أَضَعُ الْفَوَاكِهَ فِي السَّلَّةِ", deskripsi: "Wadah anyaman untuk menaruh barang." },
        ]
      },
      25: {
        title: "Bagian Rumah", titleAr: "أَجْزَاءُ البَيْتِ", data: [
          { id: 1, arab: "جِدَارٌ", latin: "Jidaarun", arti: "Dinding", contoh: "الْجِدَارُ لَوْنُهُ أَبْيَضُ", deskripsi: "Tembok penyekat ruangan di dalam rumah." },

          { id: 6, arab: "بَاحَةٌ", latin: "Baahatun", arti: "Halaman", contoh: "أَلْعَبُ فِي بَاحَةِ الْبَيْتِ", deskripsi: "Ruang terbuka di depan atau belakang rumah." },
          { id: 7, arab: "مَطْبَخٌ", latin: "Mathbakhun", arti: "Dapur", contoh: "أُمِّي فِي الْمَطْبَخِ الآنَ", deskripsi: "Ruangan khusus untuk memasak makanan." },
          { id: 8, arab: "حَمَّامٌ", latin: "Hammaamun", arti: "Kamar Mandi", contoh: "أَغْتَسِلُ فِي الْحَمَّامِ", deskripsi: "Ruangan untuk membersihkan diri." },
          { id: 9, arab: "غُرْفَةُ النَّوْمِ", latin: "Ghurfatun Naumi", arti: "Kamar Tidur", contoh: "أَنَامُ فِي غُرْفَةِ النَّوْمِ", deskripsi: "Ruangan tertutup untuk istirahat dan tidur." },

        ]
      },
      26: {
        title: "Kesehatan & Penyakit", titleAr: "الصِّحَّةُ وَالمَرَضُ", data: [
          { id: 1, arab: "دَوَاءٌ", latin: "Dawaa-un", arti: "Obat", contoh: "أَشْرَبُ الدَّوَاءَ لِأَشْفَى", deskripsi: "Sesuatu yang diminum agar sembuh dari sakit." },
          { id: 2, arab: "صُدَاعٌ", latin: "Shudaa'un", arti: "Sakit Kepala", contoh: "أَشْعُرُ بِصُدَاعٍ شَدِيْدٍ", deskripsi: "Rasa sakit atau pening di bagian kepala." },

          { id: 8, arab: "دَمٌ", latin: "Damun", arti: "Darah", contoh: "خَرَجَ الدَّمُ مِنَ الْجُرْحِ", deskripsi: "Cairan berwarna merah di dalam tubuh." },

        ]
      },

        ]

      28: {

          { id: 6, arab: "عَنْكَبُوْتٌ", latin: "'Ankabuutun", arti: "Laba-laba", contoh: "الْعَنْكَبُوْتُ يَبْنِي شَبَكَةً", deskripsi: "Hewan berkaki banyak yang pintar membuat jaring." },
          { id: 7, arab: "صُرْصُوْرٌ", latin: "Shurshuurun", arti: "Kecoa", contoh: "أَخَافُ مِنَ الصُّرْصُوْرِ", deskripsi: "Serangga berwarna cokelat yang bisa merayap cepat." },
          { id: 8, arab: "جَرَادَةٌ", latin: "Jaraadatun", arti: "Belalang", contoh: "الْجَرَادَةُ تَقْفِزُ فِي الْحَدِيْقَةِ", deskripsi: "Serangga pelompat pemakan daun-daunan." },
          { id: 9, arab: "دُوْدَةٌ", latin: "Duudatun", arti: "Ulat", contoh: "الدُّوْدَةُ تَأْكُلُ وَرَقَ الشَّجَرِ", deskripsi: "Hewan kecil tak berkaki yang memakan daun." },
          { id: 10, arab: "حَلَزُوْنٌ", latin: "Halazuunun", arti: "Siput", contoh: "الْحَلَزُوْنُ يَمْشِي بِبُطْءٍ", deskripsi: "Hewan lunak bercangkang yang berjalan sangat lambat." },
        ]
      },
      30: {
        title: "Hewan", titleAr: "الحَيَوَانَاتُ", data: [
          { id: 1, arab: "أَسَدٌ", latin: "Asadun", arti: "Singa", contoh: "الأَسَدُ مَلِكُ الْغَابَةِ", deskripsi: "Hewan buas pemakan daging." },
          { id: 2, arab: "فِيْلٌ", latin: "Fiilun", arti: "Gajah", contoh: "الْفِيْلُ حَيَوَانٌ كَبِيْرٌ", deskripsi: "Hewan besar belalai panjang." },
          { id: 3, arab: "قِطٌّ", latin: "Qittun", arti: "Kucing", contoh: "عِنْدِي قِطٌّ جَمِيْلٌ", deskripsi: "Hewan piaraan yang lucu." },
          { id: 4, arab: "بَقَرَةٌ", latin: "Baqaratun", arti: "Sapi", contoh: "الْبَقَرَةُ تُعْطِيْنَا اللَّبَنَ", deskripsi: "Hewan ternak penghasil susu." },
          { id: 5, arab: "حِصَانٌ", latin: "Hishaanun", arti: "Kuda", contoh: "الْحِصَانُ يَجْرِي سَرِيْعًا", deskripsi: "Hewan yang kuat lari cepat." },
          { id: 6, arab: "جَمَلٌ", latin: "Jamalun", arti: "Unta", contoh: "الْجَمَلُ يَعِيْشُ فِي الصَّحْرَاءِ", deskripsi: "Hewan padang pasir." },
          { id: 7, arab: "دَجَاجَةٌ", latin: "Dajaajatun", arti: "Ayam", contoh: "الدَّجَاجَةُ تَبِيْضُ كُلَّ يَوْمٍ", deskripsi: "Unggas penghasil telur." },
          { id: 8, arab: "أَرْنَبٌ", latin: "Arnabun", arti: "Kelinci", contoh: "الأَرْنَبُ يُحِبُّ الْجَزَرَ", deskripsi: "Hewan bertelinga panjang." },
          { id: 9, arab: "غَنَمٌ", latin: "Ghanamun", arti: "Kambing", contoh: "الْغَنَمُ يَأْكُلُ الْعُشْبَ", deskripsi: "Hewan ternak pemakan rumput." },
          { id: 10, arab: "طَائِرٌ", latin: "Thaa-irun", arti: "Burung", contoh: "الطَّائِرُ يَطِيْرُ فِي السَّمَاءِ", deskripsi: "Hewan bersayap." },
        ]
      }
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('alfal_session_name'));
      
      const [participantName, setParticipantName] = useState(() => {
        return localStorage.getItem('alfal_session_name') || "";
      });
      
      const [inputToken, setInputToken] = useState("");
      const [loginError, setLoginError] = useState("");
      
      const [activeTab, setActiveTab] = useState('home');
      const [selectedDay, setSelectedDay] = useState(1);
      const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth > 768);
      
      // Quiz States
      const [quizStep, setQuizStep] = useState(0); 
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [score, setScore] = useState(0);
      
      // Sinkronisasi data sejak pertama aplikasi dirender
      const [myScores, setMyScores] = useState(() => syncLocalAndState(localStorage.getItem('alfal_session_name')));
      
      const [quizQuestions, setQuizQuestions] = useState([]);

      // Scramble Game States
      const [scrambledLetters, setScrambledLetters] = useState([]);
      const [currentGuess, setCurrentGuess] = useState([]);
      const [availableVoices, setAvailableVoices] = useState([]);
      const [isProcessing, setIsProcessing] = useState(false);

      // Voice Quiz States (Pemanasan Setor Hafalan)
      const [rekamStep, setRekamStep] = useState(0); 
      const [voiceQuizList, setVoiceQuizList] = useState([]);
      const [currentVoiceQuestion, setCurrentVoiceQuestion] = useState(0);
      const [isListeningQuiz, setIsListeningQuiz] = useState(false);
      const [recognizedText, setRecognizedText] = useState("");
      const [voiceQuizFeedback, setVoiceQuizFeedback] = useState(null);

      // Audio Recording States
      const [isRecording, setIsRecording] = useState(false);
      const [audioUrl, setAudioUrl] = useState(null);
      const [audioBase64, setAudioBase64] = useState("");
      const [isAudioSent, setIsAudioSent] = useState(false);
      const [showIosHint, setShowIosHint] = useState(false);
      const [hasShownIosHint, setHasShownIosHint] = useState(false);
      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);

      const currentMufrodatList = MUFRODAT_DB[selectedDay].data;

      // FUNGSI UNTUK MENGECEK APAKAH HARI TERBUKA ATAU TERKUNCI
      const checkDayUnlocked = (day) => {
        if (day === 1) return true; // Hari 1 selalu terbuka
        // Cek apakah hari sebelumnya sudah mendapat nilai >= 80
        return myScores.some(s => s.day == (day - 1) && s.score >= 80);
      };

      // FUNGSI UNTUK TEXT-TO-SPEECH
      const playAudio = (text) => {
        if (!('speechSynthesis' in window)) {
          alert("Maaf, peramban kamu tidak mendukung fitur suara.");
          return;
        }

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIOS && !hasShownIosHint) {
           setShowIosHint(true);
           setHasShownIosHint(true);
           setTimeout(() => setShowIosHint(false), 6000);
        }

        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ar-SA';
        utterance.rate = 0.85; 
        utterance.pitch = 1;
        utterance.volume = 1;

        if (availableVoices.length > 0) {
          const arabicVoice = availableVoices.find(voice => voice.lang.includes('ar'));
          if (arabicVoice) utterance.voice = arabicVoice;
        }
        
        window.speechSynthesis.speak(utterance);
      };

      const unlockAudioContext = () => {
        if ('speechSynthesis' in window) {
           const utterance = new SpeechSynthesisUtterance('');
           utterance.volume = 0;
           window.speechSynthesis.speak(utterance);
        }
      };

      useEffect(() => {
        if(!auth) return;
        const initAuth = async () => {
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        };
        initAuth();
        
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // EFEK SINKRONISASI FIRESTORE DAN LOCAL STORAGE (MAKSIMAL)
      useEffect(() => {
        if (!isLoggedIn || !participantName) return;

        const cleanName = participantName.trim().toLowerCase();
        const localHistoryKey = getHistoryKey(participantName);

        // Pastikan kita muat kembali dari memori HP sebagai lapis pengaman pertama
        setMyScores(syncLocalAndState(participantName));

        if (db && user) {
          const scoresCol = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
          const q = query(scoresCol);
          
          const unsubscribe = onSnapshot(q, (snapshot) => {
            const allScores = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // Saring dan paskan format agar persis sama dengan memori HP
            const filtered = allScores
              .filter(s => s.name && s.name.trim().toLowerCase() === cleanName)
              .map(s => ({
                ...s,
                timestamp: typeof s.timestamp === 'number' ? s.timestamp : (s.timestamp?.seconds ? s.timestamp.seconds * 1000 : Date.now())
              }));
            
            const latestLocal = JSON.parse(localStorage.getItem(localHistoryKey)) || [];
            const combinedMap = new Map();
            
            // Gabungkan menggunakan Hari-Skor sebagai pengunci unik agar data tidak kembar
            latestLocal.forEach(item => combinedMap.set(`${item.day}-${item.score}`, item));
            filtered.forEach(item => combinedMap.set(`${item.day}-${item.score}`, item));

            const combined = Array.from(combinedMap.values());
            combined.sort((a, b) => b.timestamp - a.timestamp);
            
            setMyScores(combined);
            localStorage.setItem(localHistoryKey, JSON.stringify(combined));
          }, (err) => {
             console.error("Firestore Error:", err);
          });
          
          return () => unsubscribe();
        }
      }, [user, isLoggedIn, participantName, db]);

      // MUAT PERTANYAAN KUIS
      useEffect(() => {
        if (quizStep === 1 && currentQuestion % 2 !== 0 && quizQuestions.length > 0) {
          const target = quizQuestions[currentQuestion].arab;
          const lettersArray = target.match(/\p{L}\p{M}*/gu) || target.split('');
          const letters = lettersArray.map((l, i) => ({ id: i, char: l }));
          const shuffled = [...letters].sort(() => Math.random() - 0.5);
          setScrambledLetters(shuffled);
          setCurrentGuess([]);
        }
      }, [currentQuestion, quizStep, selectedDay, quizQuestions]);

      // LOGIKA REKAM HAFALAN
      const startRecording = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mediaRecorder = new MediaRecorder(stream);
          mediaRecorderRef.current = mediaRecorder;
          audioChunksRef.current = [];

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) audioChunksRef.current.push(event.data);
          };

          mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
            const url = URL.createObjectURL(audioBlob);
            setAudioUrl(url);
            
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => setAudioBase64(reader.result);
            
            stream.getTracks().forEach(track => track.stop());
          };

          mediaRecorder.start();
          setIsRecording(true);
        } catch (error) {
          alert("Gagal mengakses mikrofon. Pastikan kamu sudah memberikan izin akses mikrofon di perambanmu.");
          console.error(error);
        }
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.stop();
          setIsRecording(false);
        }
      };

      const deleteRecording = () => {
        setAudioUrl(null);
        setAudioBase64("");
        setIsAudioSent(false);
      };

      // FUNGSI PENGENAL SUARA UNTUK LATIHAN
      const startListeningVoiceQuiz = () => {
         const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
         if (!SpeechRecognition) {
            alert("Maaf, peramban kamu tidak mendukung fitur koreksi suara (Gunakan Google Chrome). Namun kamu tetap bisa menggunakan Setor Hafalan di langkah berikutnya.");
            setRekamStep(1);
            return;
         }

         setIsListeningQuiz(true);
         setRecognizedText("");
         setVoiceQuizFeedback(null);

         const recognition = new SpeechRecognition();
         recognition.lang = 'ar-SA';
         recognition.interimResults = false;
         recognition.maxAlternatives = 1;

         recognition.start();

         recognition.onresult = (event) => {
            const speechResult = event.results[0][0].transcript;
            setRecognizedText(speechResult);
            
            // Pengecekan dengan normalisasi agar huruf yang dibaca oleh Google Speech (tanpa harakat, ta marbuthoh jadi ha, dll) bisa tetap valid
            const targetWord = normalizeArabic(voiceQuizList[currentVoiceQuestion].arab);
            const spokenWord = normalizeArabic(speechResult);

            if (spokenWord.includes(targetWord) || targetWord.includes(spokenWord)) {
               setVoiceQuizFeedback('correct');
               setTimeout(() => {
                 if (currentVoiceQuestion < 4) {
                    setCurrentVoiceQuestion(q => q + 1);
                    setRecognizedText("");
                    setVoiceQuizFeedback(null);
                 } else {
                    setRekamStep(1); 
                 }
               }, 2500); // Waktu diperpanjang sedikit agar siswa bisa melihat & merekam di otak tulisan Arab yang sempurna
            } else {
               setVoiceQuizFeedback('wrong');
            }
         };

         recognition.onspeechend = () => {
            recognition.stop();
            setIsListeningQuiz(false);
         };

         recognition.onerror = (event) => {
            console.error("Speech recognition error", event.error);
            setVoiceQuizFeedback('error');
            setIsListeningQuiz(false);
         };
      };

      // --- LOGIKA LOGIN / LOGOUT ANTI-HILANG ---
      const handleLogin = (e) => {
        e.preventDefault();
        unlockAudioContext();

        const cleanName = participantName.trim();
        
        if (!cleanName) {
          setLoginError("Nama lengkap tidak boleh kosong.");
          return;
        }
        if (inputToken !== VALID_TOKEN) {
          setLoginError("Token akses salah. Silakan hubungi Admin.");
          return;
        }
        
        setParticipantName(cleanName);
        localStorage.setItem('alfal_session_name', cleanName);
        
        // Panggil fungsi sinkronisasi utama
        setMyScores(syncLocalAndState(cleanName));

        setIsLoggedIn(true);
        setLoginError("");
      };

      const handleLogout = () => {
        if (window.confirm("Apakah kamu yakin ingin keluar?")) {
          // Hanya menghapus identitas Sesi, bukan membuang riwayatnya
          localStorage.removeItem('alfal_session_name');
          setIsLoggedIn(false);
          setParticipantName("");
          setInputToken("");
          setActiveTab('home');
          setMyScores([]);
        }
      };

      const handleResetHistory = () => {
        if (window.confirm("Yakin ingin menghapus semua riwayat belajar? Data yang dihapus tidak dapat dikembalikan.")) {
          const localHistoryKey = getHistoryKey(participantName);
          localStorage.removeItem(localHistoryKey);
          setMyScores([]);
        }
      };

      const sendToGoogleSheet = async (name, scoreValue, category, audioData, day, type) => {
        if (!GOOGLE_SCRIPT_URL) {
          console.warn("GOOGLE_SCRIPT_URL kosong, data tidak dikirim ke Google Sheets.");
          return;
        }
        
        const payload = { 
          nama: name, 
          skor: scoreValue, 
          materi: category, 
          day: day,
          waktu: new Date().toLocaleString('id-ID'),
          audio: audioData || "",
          tipe: type || "Kuis"
        };
        
        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            mode: 'no-cors', 
            headers: {
              'Content-Type': 'text/plain;charset=utf-8',
            }
          });
        } catch (err) {
          console.error("Gagal mengirim ke Google Sheet:", err);
          throw err;
        }
      };

      const submitHafalan = async () => {
        if (isProcessing) return;
        setIsProcessing(true);
        try {
          const cleanName = participantName.trim();
          const category = `Hafalan Hari ${selectedDay}: ${MUFRODAT_DB[selectedDay].title}`;
          await sendToGoogleSheet(cleanName, "-", category, audioBase64, selectedDay, "Hafalan");
          setIsAudioSent(true);
        } catch (error) {
          alert("Gagal mengirim rekaman ke server. Pastikan koneksi internet lancar lalu coba lagi.");
        } finally {
          setIsProcessing(false);
        }
      };

      const submitQuiz = async () => {
        if (isProcessing) return;
        setIsProcessing(true);
        
        const cleanName = participantName.trim();
        const finalScore = Math.round((score / 10) * 100); 
        const category = `Kuis Hari ${selectedDay}: ${MUFRODAT_DB[selectedDay].title}`;
        
        try {
          const localHistoryKey = getHistoryKey(cleanName);
          let existingHistory = JSON.parse(localStorage.getItem(localHistoryKey)) || [];
          
          const newRecord = {
            name: cleanName,
            score: finalScore,
            category: category,
            day: selectedDay,
            timestamp: Date.now() 
          };
          
          // Mencegah nilai terdobel untuk hari dan skor yang sama
          existingHistory = existingHistory.filter(item => !(item.day === selectedDay && item.score === finalScore));
          
          const updatedHistory = [...existingHistory, newRecord].sort((a,b) => b.timestamp - a.timestamp);
          localStorage.setItem(localHistoryKey, JSON.stringify(updatedHistory));
          setMyScores(updatedHistory);

          if(db && user) {
            const scoresCol = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
            await addDoc(scoresCol, newRecord); 
          }
          
          try {
            await sendToGoogleSheet(cleanName, finalScore, category, "", selectedDay, "Kuis");
          } catch(e) {
            console.warn("Gagal simpan ke Sheet.");
          }
          
          setQuizStep(3); 
        } catch (err) {
          alert("Gagal menyimpan nilai.");
          console.error(err);
        } finally {
          setIsProcessing(false);
        }
      };

      const handleChoiceAnswer = (isCorrect) => {
        if (isProcessing) return;
        setIsProcessing(true);
        
        let newScore = score;
        if (isCorrect) {
          newScore = score + 1;
          setScore(newScore);
        }
        
        setTimeout(() => {
          moveToNext();
          setIsProcessing(false);
        }, 150);
      };

      const moveToNext = () => {
        if (currentQuestion < 9) {
          setCurrentQuestion(q => q + 1);
        } else {
          setQuizStep(2);
        }
      };

      const addLetterToGuess = (letterObj) => {
        setCurrentGuess([...currentGuess, letterObj]);
        setScrambledLetters(scrambledLetters.filter(l => l.id !== letterObj.id));
      };

      const removeLetterFromGuess = (letterObj) => {
        setScrambledLetters([...scrambledLetters, letterObj]);
        setCurrentGuess(currentGuess.filter(l => l.id !== letterObj.id));
      };

      const checkScrambleAnswer = () => {
        if (isProcessing) return;
        setIsProcessing(true);
        
        const guessString = currentGuess.map(l => l.char).join('').replace(/\s+/g, '');
        const targetString = quizQuestions[currentQuestion].arab.replace(/\s+/g, '');
        
        let newScore = score;
        if (guessString === targetString) {
          newScore = score + 1;
          setScore(newScore);
        }
        
        setTimeout(() => {
          moveToNext();
          setIsProcessing(false);
        }, 150);
      };

      // Efek Pengenalan Suara Sedia
      useEffect(() => {
        if (activeTab === 'rekam' && quizStep === 0) {
           const shuffled = [...currentMufrodatList].sort(() => Math.random() - 0.5).slice(0, 5);
           setVoiceQuizList(shuffled);
           setCurrentVoiceQuestion(0);
           setRecognizedText("");
           setVoiceQuizFeedback(null);
           
           if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
              setRekamStep(1);
           } else {
              setRekamStep(0);
           }
        }
      }, [activeTab, selectedDay]);

      // Minta suara perangkat
      useEffect(() => {
        const loadVoices = () => {
          setAvailableVoices(window.speechSynthesis.getVoices());
        };
        loadVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      const SidebarItem = ({ id, icon: Icon, label }) => (
        <button
          onClick={() => { 
            setActiveTab(id); 
            if (id !== 'home' && quizStep !== 0) setQuizStep(0); 
          }}
          className={`w-full flex items-center space-x-3 p-4 rounded-2xl transition-all active:scale-95 touch-manipulation ${
            activeTab === id 
              ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-200' 
              : 'text-slate-500 hover:bg-emerald-50 hover:text-emerald-600'
          }`}
        >
          <Icon size={22} />
          <span className={`font-bold ${!isSidebarOpen && 'hidden'}`}>
            {label}
          </span>
        </button>
      );

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-emerald-600 flex items-center justify-center p-4 md:p-6 font-sans">
            <div className="bg-white w-full max-w-[95%] md:max-w-md rounded-3xl md:rounded-[2.5rem] shadow-2xl p-6 md:p-10 overflow-hidden relative border border-emerald-500/20">
              <div className="absolute top-0 left-0 w-full h-2 bg-emerald-400"></div>
              
              <div className="text-center mb-8 md:mb-10">
                <div className="w-16 h-16 md:w-20 md:h-20 bg-emerald-50 rounded-2xl md:rounded-3xl flex items-center justify-center text-emerald-600 mx-auto mb-4 md:mb-6 shadow-inner">
                  <Lock size={32} className="md:w-10 md:h-10" />
                </div>
                <h1 className="text-2xl md:text-3xl font-black text-slate-900 mb-2 tracking-tight">ALFAL.ID</h1>
                <p className="text-xs md:text-sm text-slate-400 font-medium leading-relaxed px-2 md:px-4">
                  Silakan masuk menggunakan Nama & Token Alfal.
                </p>
              </div>
              
              <form onSubmit={handleLogin} className="space-y-5 md:space-y-6">
                <div>
                  <label className="block text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest mb-1 md:mb-2 px-1">
                    Nama Lengkap
                  </label>
                  <div className="relative">
                    <User className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size={18} />
                    <input 
                      type="text" 
                      placeholder="Nama Lengkap Peserta" 
                      className="w-full pl-11 pr-4 py-3 md:py-4 bg-slate-50 border-2 border-slate-100 rounded-xl md:rounded-2xl outline-none focus:border-emerald-500 focus:bg-white transition-all font-bold text-sm md:text-base text-slate-800" 
                      value={participantName} 
                      onChange={(e) => setParticipantName(e.target.value)} 
                      required 
                    />
                  </div>
                </div>
                
                <div>
                  <label className="block text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest mb-1 md:mb-2 px-1">
                    Token Akses
                  </label>
                  <div className="relative">
                    <Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size={18} />
                    <input 
                      type="password" 
                      placeholder="Token Keamanan (123)" 
                      className="w-full pl-11 pr-4 py-3 md:py-4 bg-slate-50 border-2 border-slate-100 rounded-xl md:rounded-2xl outline-none focus:border-emerald-500 focus:bg-white transition-all font-bold text-sm md:text-base text-slate-800" 
                      value={inputToken} 
                      onChange={(e) => setInputToken(e.target.value)} 
                      required 
                    />
                  </div>
                </div>
                
                {loginError && (
                  <div className="text-red-500 bg-red-50 p-3 rounded-xl text-xs font-bold flex items-center space-x-2 animate-pulse">
                    <AlertCircle size={16}/>
                    <span>{loginError}</span>
                  </div>
                )}
                
                <button 
                  type="submit" 
                  className="w-full bg-emerald-600 text-white py-4 md:py-5 rounded-xl md:rounded-2xl font-black text-base md:text-lg shadow-xl hover:bg-emerald-700 transition-all active:scale-95 touch-manipulation"
                >
                  Masuk Sekarang
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F8FAFC] flex text-slate-800 font-sans relative pt-safe">
          
          {/* Notifikasi Peringatan Khusus Pengguna iPhone/Safari */}
          {showIosHint && (
            <div className="fixed top-safe left-1/2 transform -translate-x-1/2 mt-4 bg-blue-600 text-white px-6 py-4 rounded-2xl shadow-2xl z-[100] font-bold text-xs md:text-sm text-center w-[90%] max-w-sm border-2 border-blue-400 transition-all">
              📱 Pengguna Safari/iPhone:<br/>Pastikan <b>Tombol Mute/Hening</b> di samping HP Anda <b>dimatikan</b> agar suara mufrodat terdengar!
            </div>
          )}

          {/* Sidebar (Desktop Only) */}
          <aside className={`hidden md:flex ${isSidebarOpen ? 'w-72' : 'w-20'} bg-white border-r border-slate-100 transition-all duration-300 flex-col no-print`}>
            <div className="p-8 flex items-center space-x-3">
              <div className="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-inner">
                A
              </div>
              <span className={`text-xl font-black text-emerald-900 tracking-tight ${!isSidebarOpen && 'hidden'}`}>
                ALFAL.ID
              </span>
            </div>
            
            <nav className="flex-1 px-4 space-y-3">
              <SidebarItem id="home" icon={Home} label="Beranda" />
              <SidebarItem id="materi" icon={BookOpen} label="Materi Harian" />
              <SidebarItem id="rekam" icon={Mic} label="Setor Hafalan" />
              <SidebarItem id="quiz" icon={Award} label="Kuis Harian" />
              <SidebarItem id="riwayat" icon={History} label="Riwayat Nilai" />
            </nav>
            
            <div className="p-6 border-t border-slate-50 space-y-4">
              <button 
                onClick={handleLogout} 
                className="w-full py-3 bg-red-50 rounded-xl text-red-500 flex justify-center items-center space-x-2 font-bold transition-colors hover:bg-red-100 active:scale-95 touch-manipulation"
              >
                <LogOut size={18} />
                <span className={!isSidebarOpen ? 'hidden' : ''}>Keluar</span>
              </button>
              <button 
                onClick={() => setIsSidebarOpen(!isSidebarOpen)} 
                className="w-full py-2 bg-slate-50 rounded-xl text-slate-400 flex justify-center hover:text-emerald-600 transition-colors active:scale-95 touch-manipulation"
              >
                <ChevronRight className={`transition-transform ${isSidebarOpen ? 'rotate-180' : ''}`} />
              </button>
            </div>
          </aside>

          {/* Bottom Navigation (Mobile Only) */}
          <nav className="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-100 flex justify-around px-2 pt-2 pb-safe z-50 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)] no-print">
            {[
              { id: 'home', icon: Home, label: 'Beranda' },
              { id: 'materi', icon: BookOpen, label: 'Materi' },
              { id: 'rekam', icon: Mic, label: 'Hafalan' },
              { id: 'quiz', icon: Award, label: 'Kuis' },
              { id: 'riwayat', icon: History, label: 'Riwayat' }
            ].map(item => {
              const IconComponent = item.icon;
              const isActive = activeTab === item.id;
              return (
                <button
                  key={item.id}
                  onClick={() => { setActiveTab(item.id); if (item.id !== 'home' && quizStep !== 0) setQuizStep(0); }}
                  className={`flex flex-col items-center p-2 rounded-xl transition-all active:scale-90 touch-manipulation ${isActive ? 'text-emerald-600' : 'text-slate-400 hover:text-emerald-500'}`}
                >
                  <div className={`p-1.5 rounded-lg mb-1 ${isActive ? 'bg-emerald-50' : ''}`}>
                    <IconComponent size={20} />
                  </div>
                  <span className="text-[10px] font-black">{item.label}</span>
                </button>
              );
            })}
          </nav>

          {/* Main Content */}
          <main className="flex-1 h-screen overflow-y-auto p-4 md:p-10 pb-28 md:pb-10 relative">
            
            <header className="flex justify-between items-center mb-8 md:mb-10 no-print">
              <div className="flex items-center space-x-3 md:space-x-4">
                <div className="w-10 h-10 md:w-12 md:h-12 bg-emerald-100 rounded-xl md:rounded-2xl flex items-center justify-center text-emerald-700 font-black text-lg md:text-xl border border-emerald-200 shadow-sm shrink-0">
                  {participantName[0] || 'A'}
                </div>
                <div>
                  <h1 className="text-xl md:text-2xl font-black text-slate-900 tracking-tight leading-tight">Ahlan, {participantName.split(' ')[0]}!</h1>
                  <p className="text-xs md:text-sm text-slate-500 font-medium">Hari ini belajar apa kita?</p>
                </div>
              </div>
              <div className="hidden md:flex items-center bg-white border border-slate-100 px-4 py-2 rounded-2xl shadow-sm space-x-3">
                 <Calendar size={18} className="text-emerald-600" />
                 <span className="text-xs font-black text-slate-700 uppercase tracking-widest">
                   Misi Aktif: Hari {selectedDay}
                 </span>
              </div>
              {/* Tombol Logout Khusus HP */}
              <button onClick={handleLogout} className="md:hidden p-2.5 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-colors active:scale-95 touch-manipulation">
                <LogOut size={18} />
              </button>
            </header>

            {/* Tab Beranda */}
            {activeTab === 'home' && (
              <div className="space-y-6 md:space-y-8 animate-in fade-in duration-500">
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 md:gap-6">
                  {Object.keys(MUFRODAT_DB).map((day) => {
                    const dayNum = parseInt(day);
                    const isUnlocked = checkDayUnlocked(dayNum);
                    const isPassed = myScores.some(s => s.day == dayNum && s.score >= 80);

                    return (
                      <div 
                        key={day} 
                        className={`group relative rounded-[2rem] md:rounded-[3rem] p-6 md:p-8 overflow-hidden shadow-xl md:shadow-2xl transition-all hover:-translate-y-2 cursor-pointer 
                          ${selectedDay == day ? 'bg-emerald-600 text-white shadow-emerald-100' 
                             : !isUnlocked ? 'bg-slate-50 text-slate-500 border border-slate-200 opacity-80' 
                             : 'bg-white text-slate-800 border border-slate-100'}`}
                        onClick={() => { setSelectedDay(dayNum); setActiveTab('materi'); window.scrollTo(0,0); }}
                      >
                        <div className="relative z-10">
                          <div className="flex justify-between items-start mb-4">
                            <span className={`px-3 py-1 md:px-4 rounded-full text-[10px] font-black uppercase tracking-widest ${selectedDay == day ? 'bg-emerald-500/30 text-emerald-50' : 'bg-slate-200 text-slate-600'}`}>
                              HARI {day}
                            </span>
                            {isPassed ? (
                              <CheckCircle className={selectedDay == day ? "text-emerald-200" : "text-emerald-500"} size={20} />
                            ) : !isUnlocked ? (
                              <Lock className={selectedDay == day ? "text-emerald-200" : "text-slate-400"} size={18} />
                            ) : null}
                          </div>
                          <h3 className="text-2xl md:text-3xl font-arabic font-bold mb-1 tracking-tight" dir="rtl" style={{ color: selectedDay == day ? '#a7f3d0' : isUnlocked ? '#047857' : '#94a3b8' }}>
                            {MUFRODAT_DB[day].titleAr}
                          </h3>
                          <h2 className={`text-sm md:text-base font-bold mb-4 tracking-tight leading-tight ${selectedDay == day ? 'text-emerald-100' : isUnlocked ? 'text-slate-500' : 'text-slate-400'}`}>
                            {MUFRODAT_DB[day].title}
                          </h2>
                          <button 
                            className={`w-full py-2.5 md:py-3 rounded-xl font-black text-[10px] shadow-lg md:shadow-xl transition-all active:scale-95 touch-manipulation 
                              ${selectedDay == day ? 'bg-white text-emerald-700 hover:bg-emerald-50' 
                                 : !isUnlocked ? 'bg-slate-200 text-slate-500 hover:bg-slate-300 shadow-none'
                                 : 'bg-emerald-600 text-white hover:bg-emerald-700'}`}
                          >
                            {isPassed ? `Misi Selesai` : !isUnlocked ? `Lihat Materi` : `Pilih Misi ${day}`}
                          </button>
                        </div>
                        <BookOpen 
                          className={`absolute right-0 bottom-0 opacity-5 -mr-8 -mb-8 md:-mr-10 md:-mb-10 pointer-events-none transition-transform group-hover:scale-110 ${selectedDay == day ? 'text-white' : 'text-slate-900'}`} 
                          size={100} 
                        />
                      </div>
                    );
                  })}
                </div>

                <div className="bg-white p-6 md:p-8 rounded-[2rem] md:rounded-3xl border border-slate-100 shadow-sm">
                  <div className="flex items-center space-x-3 mb-5 md:mb-6">
                    <Trophy className="text-orange-500" size={20} />
                    <h3 className="text-base md:text-lg font-black text-slate-900">Statistik Belajarmu</h3>
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-6">
                    <div className="bg-slate-50 p-4 md:p-6 rounded-2xl">
                      <p className="text-slate-400 text-[10px] md:text-xs font-black uppercase mb-1">Misi Selesai</p>
                      <p className="text-xl md:text-2xl font-black text-slate-900">
                        {new Set(myScores.filter(s => s.score >= 80).map(s => s.day)).size} / {Object.keys(MUFRODAT_DB).length}
                      </p>
                    </div>
                    <div className="bg-slate-50 p-4 md:p-6 rounded-2xl">
                      <p className="text-slate-400 text-[10px] md:text-xs font-black uppercase mb-1">Rata-rata Skor</p>
                      <p className="text-xl md:text-2xl font-black text-slate-900">
                        {myScores.length > 0 ? Math.round(myScores.reduce((a, b) => a + b.score, 0) / myScores.length) : 0}%
                      </p>
                    </div>
                    <div className="bg-slate-50 p-4 md:p-6 rounded-2xl col-span-2 md:col-span-1">
                      <p className="text-slate-400 text-[10px] md:text-xs font-black uppercase mb-1">Mufrodat Dikuasai</p>
                      <p className="text-xl md:text-2xl font-black text-slate-900">
                        {new Set(myScores.filter(s => s.score >= 80).map(s => s.day)).size * 10} Kata
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Tab Materi */}
            {activeTab === 'materi' && (
              <div className="space-y-4 md:space-y-6 animate-in fade-in duration-500">
                <div className="grid grid-cols-1 sm:grid-cols-3 items-center bg-emerald-50 p-5 md:p-6 rounded-[2rem] md:rounded-3xl border border-emerald-100 mb-4 md:mb-6 gap-4">
                  
                  {/* Bagian Kiri: Label Hari */}
                  <div className="flex justify-start sm:self-start">
                    <h2 className="text-xs md:text-sm font-black text-emerald-700 uppercase tracking-widest bg-emerald-100/70 px-3 py-1.5 rounded-lg border border-emerald-200">
                      Materi Hari {selectedDay}
                    </h2>
                  </div>
                  
                  {/* Bagian Tengah: Judul & Arti Arab */}
                  <div className="flex flex-col items-center text-center">
                    <span className="font-arabic font-bold text-4xl md:text-5xl text-emerald-900 mb-2" dir="rtl">
                      {MUFRODAT_DB[selectedDay].titleAr}
                    </span>
                    <p className="text-base md:text-lg text-emerald-700 font-bold">
                      {MUFRODAT_DB[selectedDay].title}
                    </p>
                  </div>
                  
                  {/* Bagian Kanan: Tombol Setor */}
                  <div className="flex justify-end sm:self-center mt-2 sm:mt-0">
                    <button 
                      onClick={() => {setActiveTab('rekam'); window.scrollTo(0,0);}} 
                      className="w-full sm:w-auto bg-emerald-600 text-white px-6 py-3.5 md:py-3 rounded-xl font-black text-sm shadow-lg hover:bg-emerald-700 transition-all active:scale-95 touch-manipulation text-center flex justify-center items-center gap-2"
                    >
                      <Mic size={18}/> Setor Hafalan
                    </button>
                  </div>

                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                  {currentMufrodatList.map((item, idx) => (
                    <div key={idx} className="relative bg-white rounded-[1.5rem] md:rounded-[2rem] p-6 md:p-8 border border-slate-100 shadow-sm hover:shadow-lg transition-all group">
                      <div className="flex justify-between items-start mb-2 md:mb-4">
                        <div className="w-8 h-8 md:w-10 md:h-10 bg-slate-50 text-slate-400 rounded-lg md:rounded-xl flex items-center justify-center font-black text-xs group-hover:bg-emerald-50 group-hover:text-emerald-600 transition-colors">
                          {idx + 1}
                        </div>
                        <button 
                          onClick={() => playAudio(item.arab)}
                          className="p-2.5 md:p-3 bg-emerald-50 text-emerald-600 rounded-full hover:bg-emerald-100 hover:text-emerald-700 hover:scale-110 active:scale-95 touch-manipulation transition-all shadow-sm"
                          title="Dengarkan Cara Baca"
                        >
                          <Volume2 size={20} className="md:w-6 md:h-6" />
                        </button>
                      </div>
                      <div className="text-center mb-6 md:mb-8">
                        <h1 className="text-4xl md:text-5xl font-arabic text-emerald-900 mb-3 md:mb-4 leading-normal">{item.arab}</h1>
                        <h2 className="text-xl md:text-2xl font-black text-slate-700 tracking-tight">{item.latin}</h2>
                        <p className="text-emerald-600 font-bold text-base md:text-lg">{item.arti}</p>
                      </div>
                      <div className="bg-slate-50 p-4 md:p-6 rounded-xl md:rounded-2xl border border-slate-100">
                        <p className="text-xl md:text-2xl font-arabic text-slate-700 text-right leading-relaxed mb-2 tracking-wide" dir="rtl">
                          {item.contoh}
                        </p>
                        <p className="text-[10px] md:text-xs text-slate-400 italic font-medium">"{item.deskripsi}"</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Tab Rekam Hafalan */}
            {activeTab === 'rekam' && (
              <div className="max-w-2xl mx-auto pb-10">
                
                {/* Step 0: Pemanasan Suara */}
                {rekamStep === 0 && voiceQuizList.length > 0 && (
                  <div className="bg-white p-8 md:p-12 rounded-[2.5rem] md:rounded-[3.5rem] border border-slate-100 shadow-xl md:shadow-2xl text-center relative overflow-hidden animate-in fade-in duration-500">
                    
                    <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-100">
                       <div className="h-full bg-blue-500 transition-all duration-500 ease-out" style={{ width: `${((currentVoiceQuestion) / 5) * 100}%` }}></div>
                    </div>

                    <div className="flex justify-between items-center mb-6 mt-2 text-slate-400 font-black text-[10px] md:text-xs uppercase tracking-widest">
                       <span>Pemanasan {currentVoiceQuestion + 1} / 5</span>
                       <span className="text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">Ucapkan Arabnya</span>
                    </div>
                    
                    <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-2">Latihan Pengucapan</h2>
                    <p className="text-slate-500 text-sm md:text-base font-medium mb-8 max-w-md mx-auto">
                      Ketuk mikrofon di bawah dan ucapkan bahasa Arab dari kata berikut:
                    </p>
                    
                    <h3 className="text-3xl md:text-4xl font-black text-blue-600 mb-10 tracking-tight">
                      "{voiceQuizList[currentVoiceQuestion].arti}"
                    </h3>

                    <div className="flex flex-col items-center justify-center gap-6 mb-10">
                      <button
                        onClick={startListeningVoiceQuiz}
                        disabled={isListeningQuiz}
                        className={`w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center text-white transition-all shadow-xl touch-manipulation active:scale-95
                          ${isListeningQuiz 
                            ? 'bg-red-500 animate-pulse ring-8 ring-red-500/30 scale-105' 
                            : 'bg-gradient-to-br from-blue-500 to-blue-700 hover:scale-105 shadow-blue-200'}`}
                      >
                        {isListeningQuiz ? <Square size={32} /> : <Mic size={40} />}
                      </button>
                      
                      <div className="h-20 flex flex-col items-center justify-center">
                        {isListeningQuiz && <p className="text-sm font-bold text-red-500 animate-pulse">Mendengarkan suaramu...</p>}
                        {!isListeningQuiz && !recognizedText && <p className="text-sm font-bold text-slate-400">Ketuk untuk bicara</p>}
                        
                        {recognizedText && (
                           <div className="animate-in fade-in zoom-in duration-300 w-full flex flex-col items-center">
                             {voiceQuizFeedback === 'correct' ? (
                               <p className="text-3xl md:text-4xl font-arabic font-bold text-emerald-600 mb-2 animate-in zoom-in duration-300" dir="rtl">{voiceQuizList[currentVoiceQuestion].arab}</p>
                             ) : (
                               <p className="text-2xl md:text-3xl font-arabic font-bold text-slate-800 mb-2" dir="rtl">{recognizedText}</p>
                             )}
                             
                             {voiceQuizFeedback === 'correct' && <p className="text-emerald-500 font-bold text-sm md:text-base mt-1">⭐ Mumtaz! Pengucapan tepat.</p>}
                             {voiceQuizFeedback === 'wrong' && <p className="text-red-500 font-bold text-sm md:text-base mt-1">Kurang tepat, ayo coba lagi!</p>}
                             {voiceQuizFeedback === 'error' && <p className="text-orange-500 font-bold text-sm md:text-base mt-1">Suara tidak terdengar jelas.</p>}
                           </div>
                        )}
                      </div>
                    </div>

                    <button 
                      onClick={() => setRekamStep(1)} 
                      className="text-slate-400 text-xs md:text-sm font-bold underline hover:text-slate-600 transition-colors active:text-slate-800 touch-manipulation p-2"
                    >
                      Lewati Pemanasan & Langsung Setor Hafalan
                    </button>
                  </div>
                )}

                {/* Step 1: Setor Hafalan Utama */}
                {rekamStep === 1 && (
                  <div className="bg-white p-8 md:p-12 rounded-[2.5rem] md:rounded-[3.5rem] border border-slate-100 shadow-xl md:shadow-2xl text-center animate-in fade-in duration-500">
                    
                    {/* Cek Apakah Hari Ini Sudah Terbuka (Unlocked) */}
                    {!checkDayUnlocked(selectedDay) ? (
                       <div className="flex flex-col items-center justify-center py-6 md:py-10">
                         <div className="w-20 h-20 md:w-24 md:h-24 bg-slate-100 text-slate-400 rounded-full flex items-center justify-center mb-6 md:mb-8 ring-8 ring-slate-50">
                           <Lock size={40} className="md:w-[48px] md:h-[48px]" />
                         </div>
                         <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-4 tracking-tight">Setor Hafalan Terkunci</h2>
                         <p className="text-slate-500 mb-8 text-sm md:text-base text-center max-w-md px-4">
                           Kamu harus menyelesaikan <b>Kuis Hari {selectedDay - 1}</b> dengan nilai minimal 80 untuk membuka misi setor hafalan ini.
                         </p>
                         <button 
                           onClick={() => {setSelectedDay(selectedDay - 1); setActiveTab('quiz'); setQuizStep(0); window.scrollTo(0,0);}} 
                           className="w-full max-w-sm bg-slate-800 text-white py-4 md:py-5 rounded-xl md:rounded-2xl font-black text-base md:text-lg shadow-xl hover:bg-slate-900 transition-all active:scale-95 touch-manipulation flex items-center justify-center gap-2 mx-auto"
                         >
                           <Award size={20}/> Kerjakan Kuis Hari {selectedDay - 1}
                         </button>
                       </div>
                    ) : (
                      // Jika Terbuka, Tampilkan UI Rekam Hafalan Normal
                      <>
                        <div className="w-20 h-20 md:w-24 md:h-24 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 md:mb-8 shadow-inner ring-8 ring-emerald-50">
                          <Mic size={40} className="md:w-[48px] md:h-[48px]" />
                        </div>
                        <h2 className="text-3xl md:text-4xl font-black mb-6 md:mb-8 tracking-tight">Setor Hafalan Hari {selectedDay}</h2>
                        <div className="mb-8 md:mb-12 flex flex-col items-center gap-2">
                          <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-2">Tema</p>
                          <h3 className="font-arabic font-bold text-3xl md:text-4xl text-emerald-700" dir="rtl">{MUFRODAT_DB[selectedDay].titleAr}</h3>
                          <p className="text-slate-600 font-bold text-lg md:text-xl">{MUFRODAT_DB[selectedDay].title}</p>
                          <p className="text-slate-500 mt-6 text-sm md:text-base px-2 md:px-6">Tekan tombol rekam di bawah ini dan bacakan 10 hafalan mufrodat bahasa Arab beserta artinya dengan lantang!</p>
                        </div>

                        {!audioUrl ? (
                          <div className="flex flex-col items-center justify-center gap-6">
                            <button
                              onClick={isRecording ? stopRecording : startRecording}
                              className={`w-24 h-24 md:w-28 md:h-28 rounded-[2rem] flex items-center justify-center text-white shadow-xl transition-all touch-manipulation active:scale-95 ${isRecording ? 'bg-red-500 animate-pulse scale-110 shadow-red-200' : 'bg-emerald-600 hover:bg-emerald-700 hover:scale-105 shadow-emerald-200'}`}
                            >
                              {isRecording ? <Square size={32} className="md:w-10 md:h-10" /> : <Mic size={40} className="md:w-12 md:h-12" />}
                            </button>
                            <p className="text-sm md:text-base font-bold text-slate-400">
                              {isRecording ? "Sedang merekam... Tekan kotak untuk berhenti." : "Tekan ikon Mikrofon untuk mulai merekam"}
                            </p>
                          </div>
                        ) : (
                          <div className="flex flex-col items-center justify-center gap-6 w-full animate-in zoom-in-95">
                            <div className="bg-slate-50 p-4 rounded-2xl w-full max-w-md border border-slate-200 shadow-sm">
                               <audio src={audioUrl} controls className="w-full h-12 outline-none" />
                            </div>
                            
                            {!isAudioSent ? (
                              <div className="flex flex-col sm:flex-row gap-4 w-full max-w-md">
                                 <button onClick={deleteRecording} disabled={isProcessing} className="flex-1 py-3 md:py-4 bg-white border border-slate-200 text-slate-600 rounded-xl md:rounded-2xl font-black hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-colors flex justify-center items-center gap-2 disabled:opacity-50 touch-manipulation active:scale-95">
                                   <Trash2 size={18} /> Ulangi
                                 </button>
                                 <button onClick={submitHafalan} disabled={isProcessing} className="flex-[2] py-3 md:py-4 bg-emerald-600 text-white rounded-xl md:rounded-2xl font-black shadow-lg hover:bg-emerald-700 transition-colors flex justify-center items-center gap-2 disabled:opacity-50 touch-manipulation active:scale-95">
                                   {isProcessing ? "Mengirim..." : "Kirim Rekaman"} <ArrowRight size={18}/>
                                 </button>
                              </div>
                            ) : (
                              <div className="flex flex-col gap-4 w-full max-w-md fade-in-up">
                                 <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-4 rounded-xl font-bold flex justify-center items-center gap-2 shadow-sm">
                                    <CheckCircle size={24} /> Rekaman Berhasil Dikirim!
                                 </div>
                                 <button onClick={() => { setActiveTab('quiz'); setQuizStep(0); setCurrentQuestion(0); setScore(0); window.scrollTo(0,0); }} className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold shadow-lg hover:bg-emerald-600 transition-colors flex justify-center items-center gap-2 mt-2 touch-manipulation active:scale-95">
                                   Lanjut ke Kuis <ArrowRight size={18}/>
                                 </button>
                              </div>
                            )}
                          </div>
                        )}
                      </>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* Tab Kuis */}
            {activeTab === 'quiz' && (
              <div className="max-w-2xl mx-auto pb-10">
                {/* Step 0: Layar Mulai */}
                {quizStep === 0 && (
                   <div className="bg-white p-8 md:p-12 rounded-[2.5rem] md:rounded-[3.5rem] border border-slate-100 shadow-xl md:shadow-2xl text-center animate-in fade-in duration-500">
                     
                     {/* Cek Apakah Hari Ini Sudah Terbuka (Unlocked) */}
                     {!checkDayUnlocked(selectedDay) ? (
                       <div className="flex flex-col items-center justify-center py-6 md:py-10">
                         <div className="w-20 h-20 md:w-24 md:h-24 bg-slate-100 text-slate-400 rounded-full flex items-center justify-center mb-6 md:mb-8 ring-8 ring-slate-50">
                           <Lock size={40} className="md:w-[48px] md:h-[48px]" />
                         </div>
                         <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-4 tracking-tight">Kuis Terkunci</h2>
                         <p className="text-slate-500 mb-8 text-sm md:text-base text-center max-w-md px-4">
                           Kamu harus menyelesaikan <b>Kuis Hari {selectedDay - 1}</b> dengan nilai minimal 80 untuk membuka misi kuis ini.
                         </p>
                         <button 
                           onClick={() => {setSelectedDay(selectedDay - 1); setActiveTab('quiz'); setQuizStep(0); window.scrollTo(0,0);}} 
                           className="w-full max-w-sm bg-slate-800 text-white py-4 md:py-5 rounded-xl md:rounded-2xl font-black text-base md:text-lg shadow-xl hover:bg-slate-900 transition-all active:scale-95 touch-manipulation flex items-center justify-center gap-2 mx-auto"
                         >
                           <Award size={20}/> Kerjakan Kuis Hari {selectedDay - 1}
                         </button>
                       </div>
                     ) : (
                       // Jika Terbuka, Tampilkan UI Mulai Kuis Normal
                       <>
                         <div className="w-20 h-20 md:w-24 md:h-24 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 md:mb-8 shadow-inner ring-8 ring-orange-50">
                           <Trophy size={40} className="md:w-[48px] md:h-[48px]" />
                         </div>
                         <h2 className="text-3xl md:text-4xl font-black mb-6 md:mb-8 tracking-tight">Kuis Hari {selectedDay}</h2>
                         <div className="mb-8 md:mb-12 flex flex-col items-center gap-2">
                           <p className="text-slate-400 text-xs font-black uppercase tracking-widest mb-2">Tema</p>
                           <h3 className="font-arabic font-bold text-3xl md:text-4xl text-emerald-700" dir="rtl">{MUFRODAT_DB[selectedDay].titleAr}</h3>
                           <p className="text-slate-600 font-bold text-lg md:text-xl">{MUFRODAT_DB[selectedDay].title}</p>
                           <p className="text-slate-500 mt-4 text-sm md:text-base px-2 md:px-6">Selesaikan 10 soal tantangan campuran.</p>
                         </div>
                         <button 
                           onClick={() => { 
                             const shuffled = [...currentMufrodatList].sort(() => Math.random() - 0.5);
                             setQuizQuestions(shuffled);
                             setQuizStep(1); 
                             setScore(0); 
                             setCurrentQuestion(0); 
                           }} 
                           className="w-full bg-emerald-600 text-white py-5 md:py-6 rounded-2xl md:rounded-[2rem] font-black text-lg md:text-xl shadow-xl hover:bg-emerald-700 transition-all active:scale-95 touch-manipulation shadow-emerald-200"
                         >
                           Mulai Kuis Sekarang
                         </button>
                       </>
                     )}
                   </div>
                )}

                {/* Step 1: Layar Pertanyaan */}
                {quizStep === 1 && (
                   <div className="bg-white p-6 md:p-10 rounded-[2.5rem] md:rounded-[3rem] border border-slate-100 shadow-xl md:shadow-2xl relative overflow-hidden">
                     
                     <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-100">
                        <div className="h-full bg-emerald-500 transition-all duration-500 ease-out" style={{ width: `${((currentQuestion) / 10) * 100}%` }}></div>
                     </div>

                     <div className="flex justify-between items-center mb-6 md:mb-8 mt-2 text-slate-400 font-black text-[10px] md:text-xs uppercase tracking-widest">
                       <span>Soal {currentQuestion + 1} / 10</span>
                       <span className="text-emerald-600">
                         {currentQuestion % 2 === 0 ? "Pilihan Ganda" : "Susun Huruf"}
                       </span>
                     </div>

                     {currentQuestion % 2 === 0 ? (
                       // Pilihan Ganda
                       <div className="text-center animate-in fade-in duration-300" key={`mc-${currentQuestion}`}>
                         <p className="text-xs md:text-sm font-black text-slate-400 uppercase mb-3 md:mb-4 tracking-widest">Apa arti kata ini?</p>
                         <h1 className="text-5xl md:text-6xl font-arabic font-bold text-slate-800 mb-10 pb-2">{quizQuestions[currentQuestion]?.arab}</h1>
                         <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                           {[
                             quizQuestions[currentQuestion]?.arti, 
                             quizQuestions[(currentQuestion + 1) % 10]?.arti || "Buku", 
                             quizQuestions[(currentQuestion + 2) % 10]?.arti || "Pena", 
                             quizQuestions[(currentQuestion + 3) % 10]?.arti || "Meja"
                           ].sort().map((opt, i) => (
                             <button 
                               key={i} 
                               onClick={() => handleChoiceAnswer(opt === quizQuestions[currentQuestion]?.arti)} 
                               disabled={isProcessing}
                               className="w-full p-4 md:p-6 bg-slate-50 border-2 border-slate-100 rounded-2xl md:rounded-[1.5rem] font-black text-slate-700 hover:border-emerald-500 hover:text-emerald-700 hover:bg-emerald-50 transition-all text-base md:text-xl active:scale-95 touch-manipulation disabled:opacity-50"
                             >
                               {opt}
                             </button>
                           ))}
                         </div>
                       </div>
                     ) : (
                       // Permainan Susun Huruf
                       <div className="text-center animate-in slide-in-from-right-8 duration-300" key={`sc-${currentQuestion}`}>
                         <p className="text-xs md:text-sm font-black text-slate-400 uppercase mb-3 md:mb-4 tracking-widest">Susun Huruf Untuk Arti:</p>
                         <h2 className="text-2xl md:text-4xl font-black text-emerald-600 mb-8 md:mb-10 tracking-tight">
                           "{quizQuestions[currentQuestion]?.arti}"
                         </h2>
                         
                         <div className="flex justify-center flex-wrap gap-2 md:gap-4 mb-8 md:mb-12 min-h-[70px] md:min-h-[90px] p-4 md:p-6 bg-slate-50 rounded-2xl md:rounded-[2rem] border-2 border-dashed border-slate-200" dir="rtl">
                           {currentGuess.length === 0 && (
                             <span className="text-slate-400 font-medium self-center text-xs md:text-sm">Klik huruf Arab di bawah</span>
                           )}
                           {currentGuess.map((l, i) => (
                             <button 
                               key={i} 
                               onClick={() => removeLetterFromGuess(l)} 
                               disabled={isProcessing}
                               className="w-12 h-12 md:w-16 md:h-16 bg-white border-2 border-emerald-500 text-emerald-700 rounded-xl md:rounded-2xl flex items-center justify-center text-2xl md:text-3xl font-arabic shadow-sm hover:border-red-500 hover:text-red-500 hover:bg-red-50 transition-all transform hover:scale-110 active:scale-95 touch-manipulation disabled:opacity-50"
                             >
                               {l.char}
                             </button>
                           ))}
                         </div>
                         
                         <div className="flex justify-center flex-wrap gap-2 md:gap-4 mb-8 md:mb-12" dir="rtl">
                           {scrambledLetters.map((l, i) => (
                             <button 
                               key={i} 
                               onClick={() => addLetterToGuess(l)} 
                               disabled={isProcessing}
                               className="w-12 h-12 md:w-16 md:h-16 bg-emerald-600 text-white rounded-xl md:rounded-2xl flex items-center justify-center text-2xl md:text-3xl font-arabic shadow-md hover:bg-emerald-700 active:scale-90 touch-manipulation transition-all disabled:opacity-50"
                             >
                               {l.char}
                             </button>
                           ))}
                         </div>
                         
                         <div className="flex space-x-3 md:space-x-4">
                           <button 
                             onClick={() => { setScrambledLetters([...scrambledLetters, ...currentGuess]); setCurrentGuess([]); }} 
                             disabled={isProcessing}
                             className="flex-1 py-3 md:py-4 bg-slate-100 text-slate-500 rounded-xl md:rounded-2xl font-black flex items-center justify-center space-x-2 hover:bg-slate-200 transition-colors text-sm md:text-base active:scale-95 touch-manipulation disabled:opacity-50"
                           >
                             <RefreshCw size={18}/>
                             <span>Ulang</span>
                           </button>
                           <button 
                             onClick={checkScrambleAnswer} 
                             disabled={scrambledLetters.length > 0 || isProcessing} 
                             className="flex-[2] py-3 md:py-4 bg-emerald-600 text-white rounded-xl md:rounded-2xl font-black shadow-lg disabled:opacity-50 disabled:shadow-none hover:bg-emerald-700 transition-all active:scale-95 touch-manipulation text-sm md:text-base"
                           >
                             Kunci Jawaban
                           </button>
                         </div>
                       </div>
                     )}
                   </div>
                )}

                {/* Step 2: Layar "Kirim Kuis" Terpisah */}
                {quizStep === 2 && (
                   <div className="bg-white p-10 md:p-14 rounded-[2.5rem] md:rounded-[3rem] border border-slate-100 shadow-xl md:shadow-2xl text-center fade-in-up">
                     <div className="w-24 h-24 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6 ring-8 ring-blue-50">
                       <Award size={48} />
                     </div>
                     <h2 className="text-3xl font-black text-slate-800 mb-4">Kuis Selesai!</h2>
                     <p className="text-slate-500 mb-8 max-w-md mx-auto">Alhamdulillah, kamu telah menyelesaikan 10 soal kuis. Klik tombol di bawah ini untuk mengirim dan menyimpan nilaimu ke server.</p>
                     <button 
                       onClick={submitQuiz} 
                       disabled={isProcessing}
                       className="w-full max-w-sm mx-auto bg-emerald-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-emerald-700 transition-all active:scale-95 touch-manipulation disabled:opacity-50 flex items-center justify-center gap-2"
                     >
                       {isProcessing ? "Menyimpan Data..." : "Kirim Kuis Sekarang"} <ArrowRight size={20}/>
                     </button>
                   </div>
                )}

                {/* Step 3: Result / Barakallahu Fiikum */}
                {quizStep === 3 && (
                   <div className="bg-white p-8 md:p-16 rounded-[2.5rem] md:rounded-[3.5rem] border border-slate-100 shadow-xl md:shadow-2xl text-center animate-in zoom-in-95">
                     <div className="w-20 h-20 md:w-24 md:h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-5 md:mb-6">
                       <CheckCircle size={48} className="md:w-[60px] md:h-[60px]" />
                     </div>
                     <h1 className="text-2xl md:text-3xl font-black mb-2 tracking-tight">Barakallahu Fiikum!</h1>
                     <p className="text-slate-500 mb-6 md:mb-8 text-sm md:text-base font-bold uppercase tracking-widest leading-none">
                       {participantName}
                     </p>
                     <div className="bg-emerald-600 text-white p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] mb-8 md:mb-10 shadow-xl shadow-emerald-100">
                       <p className="text-[10px] md:text-xs font-black uppercase tracking-widest text-emerald-200 mb-2">
                         Skor Akhir Hari {selectedDay}
                       </p>
                       <h1 className="text-6xl md:text-8xl font-black">
                         {Math.round((score / 10) * 100)}%
                       </h1>
                     </div>
                     <div className="flex flex-col sm:flex-row gap-3 md:gap-4">
                       <button 
                         onClick={() => setQuizStep(0)} 
                         className="flex-1 py-4 md:py-5 bg-white border-2 border-slate-100 rounded-xl md:rounded-2xl font-black text-slate-600 hover:bg-slate-50 transition-colors active:scale-95 touch-manipulation"
                       >
                         Coba Lagi
                       </button>
                       <button 
                         onClick={() => {setActiveTab('riwayat'); window.scrollTo(0,0);}} 
                         className="flex-1 py-4 md:py-5 bg-emerald-600 text-white rounded-xl md:rounded-2xl font-black shadow-lg hover:bg-emerald-700 transition-all active:scale-95 touch-manipulation"
                       >
                         Lihat Riwayat
                       </button>
                     </div>
                   </div>
                )}
              </div>
            )}

            {/* Tab Riwayat */}
            {activeTab === 'riwayat' && (
              <div className="bg-white rounded-[2rem] md:rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden animate-in fade-in duration-500 mb-10">
                <div className="p-6 md:p-8 border-b border-slate-50 bg-slate-50/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                  <h2 className="text-xl md:text-2xl font-black text-slate-900 tracking-tight">Perjalanan Hafalanku</h2>
                  <div className="flex items-center gap-2 w-full sm:w-auto">
                    {myScores.length > 0 && (
                      <button
                        onClick={handleResetHistory}
                        className="flex items-center justify-center gap-2 bg-red-50 text-red-500 px-4 py-2 rounded-xl border border-red-100 font-bold text-[10px] md:text-sm shadow-sm hover:bg-red-100 transition-colors active:scale-95 touch-manipulation"
                      >
                        <Trash2 size={16} /> Reset
                      </button>
                    )}
                    <div className="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-100 font-black text-emerald-600 text-[10px] md:text-sm shadow-inner w-full sm:w-auto text-center">
                      {myScores.length} Kuis Selesai
                    </div>
                  </div>
                </div>
                
                <div className="overflow-x-auto">
                  <table className="w-full text-left min-w-[500px]">
                    <thead className="bg-slate-50/50">
                      <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th className="px-6 md:px-10 py-4 md:py-6">Materi</th>
                        <th className="px-6 md:px-10 py-4 md:py-6 text-center">Skor</th>
                        <th className="px-6 md:px-10 py-4 md:py-6 text-right">Predikat</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {myScores.map((s, i) => (
                        <tr key={i} className="hover:bg-slate-50 transition-colors">
                          <td className="px-6 md:px-10 py-4 md:py-6 font-black text-slate-700 text-sm md:text-base">
                            {s.category}
                          </td>
                          <td className="px-6 md:px-10 py-4 md:py-6 text-center font-black text-xl md:text-2xl text-emerald-600">
                            {s.score}%
                          </td>
                          <td className="px-6 md:px-10 py-4 md:py-6 text-right">
                            <span className={`px-3 py-1.5 md:px-4 md:py-2 rounded-lg md:rounded-xl text-[8px] md:text-[10px] font-black uppercase tracking-widest whitespace-nowrap ${s.score >= 80 ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-100 text-orange-700'}`}>
                              {s.score === 100 ? 'Mumtaz' : s.score >= 80 ? 'Jayyid' : 'Belajar Lagi'}
                            </span>
                          </td>
                        </tr>
                      ))}
                      {myScores.length === 0 && (
                        <tr>
                          <td colSpan="3" className="px-6 md:px-10 py-16 md:py-24 text-center text-slate-400 text-sm md:text-base font-medium italic">
                            Belum ada riwayat kuis. Ayo mulai misi Hari 1!
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
